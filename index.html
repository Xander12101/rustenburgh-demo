<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="robots" content="noindex, nofollow">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Rustenburgh — Karte Mockup</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#F6F3EE;--bg2:#FFFFFF;--bg3:#EDEAE4;--text:#1A1714;--text2:#6B6560;--text3:#A09990;--accent:#C4521A;--accent-light:#F9EDE5;--green:#3D6B4A;--green-light:#E8F2EB;--red:#B03A2E;--red-light:#FAECEA;--amber:#A0720A;--amber-light:#FDF3DC;--blue:#2560A0;--blue-light:#E8F0FB;--border:rgba(26,23,20,0.1);--border2:rgba(26,23,20,0.06);--shadow:0 1px 3px rgba(26,23,20,0.07),0 4px 16px rgba(26,23,20,0.04);--radius:14px;--radius-sm:9px;--font-display:'Playfair Display',Georgia,serif;--font-body:'DM Sans',-apple-system,BlinkMacSystemFont,sans-serif;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:var(--font-body);background:#C8C4BE;display:flex;justify-content:center;align-items:flex-start;min-height:100vh;padding:28px 16px;}
.phone{width:393px;min-height:852px;background:var(--bg);border-radius:48px;overflow:hidden;box-shadow:0 24px 72px rgba(0,0,0,0.28),0 0 0 1px rgba(0,0,0,0.12);position:relative;display:flex;flex-direction:column;height:852px;}
.status-bar{background:var(--bg);padding:16px 26px 8px;display:flex;justify-content:space-between;align-items:center;font-size:12px;font-weight:500;color:var(--text);flex-shrink:0;}
.status-icons{display:flex;align-items:center;gap:5px;}
.alert-bar{background:var(--accent);padding:9px 18px;display:flex;align-items:center;gap:10px;cursor:pointer;transition:background .18s;flex-shrink:0;}
.alert-bar:hover{background:#B5481A;}
.alert-pulse{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,0.95);flex-shrink:0;animation:pulse 2.2s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.4;transform:scale(0.85)}}
.alert-text{font-size:12px;color:rgba(255,255,255,0.95);line-height:1.35;flex:1;}
#app-screens{flex:1;display:flex;flex-direction:column;overflow:hidden;min-height:0;}
.screen{display:none;flex-direction:column;flex:1;overflow:hidden;min-height:0;}
.screen.active{display:flex;}
.scroll-area{overflow-y:auto;flex:1;-webkit-overflow-scrolling:touch;}
.scroll-area::-webkit-scrollbar{display:none;}
.scroll-area:focus,.screen:focus{outline:none;}
.top-bar{padding:14px 18px 12px;display:flex;align-items:center;gap:12px;background:var(--bg);border-bottom:0.5px solid var(--border);flex-shrink:0;}
.back-btn{width:34px;height:34px;border-radius:50%;background:var(--bg3);border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text);flex-shrink:0;transition:background .15s;}
.back-btn:hover{background:var(--border);}
.top-bar-title{font-family:var(--font-display);font-size:18px;font-weight:600;color:var(--text);}
.top-bar-sub{font-size:11px;color:var(--text3);margin-top:1px;}
.brand-header{padding:22px 20px 14px;background:var(--bg);}
.brand-name{font-family:var(--font-display);font-size:26px;font-weight:600;color:var(--text);letter-spacing:-0.5px;}
.brand-tagline-de{font-size:13px;color:var(--text2);margin-top:3px;line-height:1.4;}
.brand-tagline-en{font-size:11px;color:var(--text3);margin-top:2px;font-style:italic;}
.nav-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:0 16px 14px;}
.nav-card{background:var(--bg2);border-radius:var(--radius);padding:16px 14px 14px;border:0.5px solid var(--border2);cursor:pointer;transition:transform .14s,box-shadow .14s;box-shadow:var(--shadow);}
.nav-card:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(26,23,20,0.1);}
.nav-card:active{transform:scale(0.975);}
.nav-card.alert-card{border-color:rgba(196,82,26,0.25);}
.nav-icon-wrap{width:40px;height:40px;border-radius:11px;display:flex;align-items:center;justify-content:center;margin-bottom:11px;}
.nav-card-label{font-size:13px;font-weight:500;color:var(--text);}
.nav-card-hint{font-size:11px;color:var(--text3);margin-top:3px;}
.nav-card-hint.warn{color:var(--accent);}
.nav-card-hint.ok{color:var(--green);}
/* Full-width map preview card */
.map-preview-card{display:flex;align-items:center;gap:14px;padding:14px 16px;margin:0 16px 14px;background:var(--bg2);border-radius:var(--radius);border:0.5px solid rgba(196,82,26,0.2);cursor:pointer;transition:transform .14s,box-shadow .14s;box-shadow:var(--shadow);position:relative;overflow:hidden;}
.map-preview-card:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(26,23,20,0.1);}
.map-preview-card:active{transform:scale(0.99);}
.map-preview-card .nav-icon-wrap{margin-bottom:0;flex-shrink:0;}
.map-preview-bg{position:absolute;right:-10px;top:50%;transform:translateY(-50%);opacity:0.06;font-size:80px;pointer-events:none;}
.plan-preview{margin:0 16px 14px;background:var(--bg2);border-radius:var(--radius);padding:14px 16px;border:0.5px solid var(--border2);box-shadow:var(--shadow);cursor:pointer;}
.plan-preview-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:11px;}
.plan-preview-title{font-size:11px;font-weight:500;color:var(--text2);text-transform:uppercase;letter-spacing:0.9px;}
.plan-row{display:flex;align-items:center;justify-content:space-between;padding:6px 0;border-bottom:0.5px solid var(--border2);}
.plan-row:last-child{border-bottom:none;}
.plan-key{font-size:12px;color:var(--text2);}
.plan-val{font-size:12px;font-weight:500;}
.plan-val.empty{color:var(--accent);}
.plan-val.filled{color:var(--green);}
.tip-card{margin:0 16px 6px;background:var(--green-light);border-radius:var(--radius);padding:14px 16px;border:0.5px solid rgba(61,107,74,0.18);display:flex;gap:12px;align-items:flex-start;}
.tip-title{font-size:12px;font-weight:500;color:var(--green);margin-bottom:3px;}
.tip-text{font-size:12px;color:var(--text);line-height:1.5;}
.scenario-list{padding:8px 0 16px;}
.scenario-section-label{font-size:11px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:0.9px;padding:12px 20px 6px;}
.scenario-item{display:flex;align-items:center;padding:13px 20px;cursor:pointer;border-bottom:0.5px solid var(--border2);transition:background .13s;gap:14px;}
.scenario-item:hover{background:var(--bg3);}
.scenario-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.scenario-info{flex:1;}
.scenario-name{font-size:14px;font-weight:500;color:var(--text);}
.scenario-desc{font-size:11px;color:var(--text3);margin-top:2px;}
/* Overflow card: "Weitere Situationen" */
.scenario-overflow{background:var(--bg3);border-bottom:none;margin:8px 16px 0;border-radius:var(--radius-sm);padding:13px 16px;border:0.5px dashed var(--border);}
.scenario-overflow:hover{background:var(--bg2);}
.scenario-overflow .scenario-icon{width:28px;height:28px;border-radius:8px;background:var(--bg2);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.scenario-overflow .scenario-toggle{transition:transform .22s ease;color:var(--text3);}
.scenario-overflow.open .scenario-toggle{transform:rotate(180deg);}
.weitere-list{display:none;}
.weitere-list.open{display:block;animation:fadeIn .22s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateY(-4px);}to{opacity:1;transform:translateY(0);}}
.scenario-item.secondary-item{padding-left:32px;background:rgba(255,255,255,0.4);}
.scenario-item.secondary-item .scenario-dot{width:7px;height:7px;opacity:0.7;}
.scenario-item.secondary-item .scenario-name{font-weight:400;}
.section-tabs{display:flex;overflow-x:auto;padding:10px 14px;gap:6px;background:var(--bg);border-bottom:0.5px solid var(--border);flex-shrink:0;}
.section-tabs::-webkit-scrollbar{display:none;}
.tab-btn{flex-shrink:0;padding:5px 11px;border-radius:20px;border:0.5px solid var(--border);background:var(--bg2);font-size:11px;color:var(--text2);cursor:pointer;font-family:var(--font-body);transition:all .14s;white-space:nowrap;}
.tab-btn.active{background:var(--text);color:var(--bg);border-color:var(--text);font-weight:500;}
.tab-btn:hover:not(.active){background:var(--bg3);}
.section-content{padding:20px 20px 8px;}
.section-heading{font-size:11px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:0.9px;margin-bottom:13px;}
.section-body{font-size:14px;line-height:1.72;color:var(--text);}
.section-body p{margin-bottom:10px;}
.section-body p:last-child{margin-bottom:0;}
.steps{list-style:none;margin-bottom:4px;}
.step{display:flex;gap:11px;margin-bottom:10px;align-items:flex-start;}
.step-num{width:22px;height:22px;border-radius:50%;background:var(--accent);color:white;font-size:11px;font-weight:500;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;}
.step-text{font-size:13.5px;line-height:1.62;color:var(--text);}
.stay-go{background:var(--bg3);border-radius:var(--radius-sm);padding:13px 14px;margin-bottom:4px;}
.stay-go-row{display:flex;gap:10px;align-items:flex-start;margin-bottom:8px;}
.stay-go-row:last-child{margin-bottom:0;}
.badge{flex-shrink:0;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:500;white-space:nowrap;margin-top:2px;}
.badge-stay{background:var(--green-light);color:var(--green);}
.badge-go{background:var(--red-light);color:var(--red);}
.badge-warning{background:var(--amber-light);color:var(--amber);}
.stay-go-text{font-size:13px;line-height:1.5;color:var(--text);}
.warning-box{background:var(--amber-light);border-left:2.5px solid var(--amber);border-radius:0 var(--radius-sm) var(--radius-sm) 0;padding:11px 13px;margin:12px 0 4px;font-size:13px;line-height:1.52;color:var(--text);}
.kit-items{margin-bottom:4px;}
.kit-item{display:flex;align-items:center;gap:13px;padding:10px 0;border-bottom:0.5px solid var(--border2);cursor:pointer;}
.kit-item:last-child{border-bottom:none;}
.kit-icon-wrap{width:30px;height:30px;flex-shrink:0;display:flex;align-items:center;justify-content:center;}
.kit-name{font-size:13px;color:var(--text);flex:1;line-height:1.4;}
.kit-check{width:21px;height:21px;border-radius:6px;border:1.5px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s;background:var(--bg2);}
.kit-check.checked{background:var(--green);border-color:var(--green);}
.related-section{padding:16px 20px;border-top:0.5px solid var(--border2);}
.related-title{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:0.9px;margin-bottom:10px;}
.related-chips{display:flex;flex-wrap:wrap;gap:7px;}
.related-chip{padding:6px 12px;background:var(--bg3);border-radius:20px;font-size:12px;color:var(--text2);cursor:pointer;border:0.5px solid var(--border);transition:background .13s;}
.related-chip:hover{background:var(--border);}
.kit-full-section{padding:16px 18px 6px;}
.kit-full-title{font-size:11px;font-weight:500;color:var(--text2);text-transform:uppercase;letter-spacing:0.9px;margin-bottom:11px;}
.kit-full-card{background:var(--bg2);border-radius:var(--radius);padding:4px 16px;border:0.5px solid var(--border);margin-bottom:10px;box-shadow:var(--shadow);}
.kit-progress-label{font-size:12px;color:var(--text2);margin:12px 18px 7px;display:flex;justify-content:space-between;}
.kit-progress{margin:0 18px 16px;background:var(--bg3);border-radius:20px;height:5px;overflow:hidden;}
.kit-progress-bar{height:100%;background:var(--green);border-radius:20px;transition:width .35s ease;}
.plan-section{padding:18px 18px 6px;}
.plan-section-title{font-family:var(--font-display);font-size:16px;font-weight:600;color:var(--text);margin-bottom:4px;}
.plan-section-desc{font-size:12px;color:var(--text2);margin-bottom:16px;line-height:1.55;}
.field-group{margin-bottom:13px;}
.field-label{font-size:11px;font-weight:500;color:var(--text2);text-transform:uppercase;letter-spacing:0.7px;margin-bottom:6px;}
.field-input{width:100%;padding:11px 13px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--bg2);font-family:var(--font-body);font-size:14px;color:var(--text);outline:none;transition:border-color .15s;}
.field-input:focus{border-color:var(--accent);}
.field-input::placeholder{color:var(--text3);}
.field-hint{font-size:11px;color:var(--text3);margin-top:4px;line-height:1.45;}
.save-btn{width:calc(100% - 36px);margin:10px 18px 18px;padding:14px;background:var(--text);color:var(--bg);border:none;border-radius:var(--radius);font-family:var(--font-body);font-size:14px;font-weight:500;cursor:pointer;transition:background .15s;}
.save-btn:hover{background:#2A2623;}
.saved-msg{text-align:center;font-size:12px;color:var(--green);padding-bottom:4px;display:none;}
.divider{height:0.5px;background:var(--border2);margin:0 18px;}
.hilfe-card{margin:0 16px 10px;background:var(--bg2);border-radius:var(--radius);overflow:hidden;border:0.5px solid var(--border);box-shadow:var(--shadow);cursor:pointer;}
.hilfe-card-header{padding:14px 16px;display:flex;align-items:center;justify-content:space-between;gap:12px;}
.hilfe-card-icon{width:36px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.hilfe-card-info{flex:1;}
.hilfe-card-title{font-size:14px;font-weight:500;color:var(--text);}
.hilfe-card-sub{font-size:11px;color:var(--text3);margin-top:2px;}
.hilfe-toggle{color:var(--text3);transition:transform .2s;flex-shrink:0;}
.hilfe-card.open .hilfe-toggle{transform:rotate(180deg);}
.hilfe-body{display:none;padding:4px 16px 16px;border-top:0.5px solid var(--border2);}
.hilfe-card.open .hilfe-body{display:block;}
.hilfe-step{display:flex;gap:10px;padding:8px 0;border-bottom:0.5px solid var(--border2);align-items:flex-start;}
.hilfe-step:last-child{border-bottom:none;}
.hilfe-num{width:24px;height:24px;border-radius:50%;background:var(--red-light);color:var(--red);font-size:11px;font-weight:600;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px;}
.hilfe-text{font-size:13px;line-height:1.52;color:var(--text);padding-top:3px;}
.fast-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px;}
.fast-item{background:var(--red-light);border-radius:var(--radius-sm);padding:11px 12px;}
.fast-letter{font-family:var(--font-display);font-size:22px;font-weight:600;color:var(--red);}
.fast-word{font-size:11px;font-weight:500;color:var(--red);margin-top:1px;}
.fast-desc{font-size:11px;color:var(--text2);margin-top:4px;line-height:1.4;}
/* Weitere Hilfe — group card with nested sub-items */
.hilfe-card.group-card{background:var(--bg);border:0.5px dashed var(--border);box-shadow:none;}
.hilfe-card.group-card .hilfe-card-icon{background:var(--bg3);}
.hilfe-card.group-card.open .hilfe-card-icon{background:var(--accent-light);}
.hilfe-group{margin-top:14px;}
.hilfe-group:first-child{margin-top:4px;}
.hilfe-group-label{font-size:11px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:0.8px;display:flex;align-items:center;gap:7px;padding:6px 4px 9px;}
.hilfe-sub-card{background:var(--bg2);border-radius:var(--radius-sm);border:0.5px solid var(--border2);margin-bottom:6px;overflow:hidden;cursor:pointer;}
.hilfe-sub-card:last-child{margin-bottom:0;}
.hilfe-sub-header{padding:10px 12px;display:flex;align-items:center;gap:10px;}
.hilfe-sub-icon{width:28px;height:28px;border-radius:7px;background:var(--red-light);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.hilfe-sub-info{flex:1;min-width:0;}
.hilfe-sub-title{font-size:13px;font-weight:500;color:var(--text);}
.hilfe-sub-desc{font-size:10.5px;color:var(--text3);margin-top:1px;}
.hilfe-sub-toggle{color:var(--text3);transition:transform .2s;flex-shrink:0;}
.hilfe-sub-card.open .hilfe-sub-toggle{transform:rotate(180deg);}
.hilfe-sub-body{display:none;padding:0 12px 12px 50px;}
.hilfe-sub-card.open .hilfe-sub-body{display:block;}
.hilfe-sub-step{display:flex;gap:9px;padding:6px 0;align-items:flex-start;border-bottom:0.5px solid var(--border2);}
.hilfe-sub-step:last-child{border-bottom:none;}
.hilfe-sub-num{width:18px;height:18px;border-radius:50%;background:var(--red-light);color:var(--red);font-size:10px;font-weight:600;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px;}
.hilfe-sub-text{font-size:12px;line-height:1.5;color:var(--text);}
.bottom-nav{display:flex;background:var(--bg2);border-top:0.5px solid var(--border);padding:8px 0 22px;flex-shrink:0;}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;padding:5px 0;cursor:pointer;background:none;border:none;font-family:var(--font-body);transition:opacity .13s;}
.nav-btn:active{opacity:0.55;}
.nav-btn-label{font-size:9.5px;color:var(--text3);font-weight:400;}
.nav-btn.active .nav-btn-label{color:var(--accent);font-weight:500;}

/* =========================================
   MAP SCREEN STYLES
   ========================================= */
.map-filter-bar{display:flex;overflow-x:auto;padding:8px 12px;gap:6px;background:var(--bg);border-bottom:0.5px solid var(--border);flex-shrink:0;-webkit-overflow-scrolling:touch;}
.map-filter-bar::-webkit-scrollbar{display:none;}
.map-filter-chip{flex-shrink:0;padding:5px 10px;border-radius:20px;border:1px solid;font-size:11px;font-family:var(--font-body);font-weight:500;cursor:pointer;white-space:nowrap;transition:all .14s;display:flex;align-items:center;gap:4px;}
.map-filter-chip.dimmed{background:var(--bg2)!important;border-color:var(--border)!important;color:var(--text3)!important;opacity:0.65;}
.screen-map-inner{flex:1;position:relative;min-height:0;}
#map{position:absolute;top:0;left:0;right:0;bottom:0;}
.map-offline-badge{margin-left:auto;padding:3px 9px;background:var(--green-light);color:var(--green);border-radius:20px;font-size:10px;font-weight:500;flex-shrink:0;}
.map-attribution{position:absolute;bottom:8px;right:8px;font-size:9px;color:rgba(26,23,20,0.5);background:rgba(255,255,255,0.82);padding:2px 7px;border-radius:4px;pointer-events:none;z-index:10;font-family:var(--font-body);}
.map-center-dot{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:10px;height:10px;background:var(--accent);border-radius:50%;border:2px solid white;box-shadow:0 0 0 4px rgba(196,82,26,0.2);pointer-events:none;z-index:5;}
.map-info-bar{position:absolute;top:10px;left:50%;transform:translateX(-50%);background:rgba(255,255,255,0.92);border-radius:20px;padding:4px 12px;font-size:10px;color:var(--text2);font-family:var(--font-body);pointer-events:none;z-index:10;backdrop-filter:blur(4px);border:0.5px solid var(--border);white-space:nowrap;}

/* MapLibre popup override */
.maplibregl-popup-content{font-family:var(--font-body)!important;border-radius:10px!important;padding:10px 12px!important;box-shadow:0 4px 20px rgba(0,0,0,0.13)!important;border:0.5px solid var(--border)!important;}
.maplibregl-popup-close-button{font-size:16px;color:var(--text3);top:4px;right:6px;}
.maplibregl-ctrl-attrib{display:none!important;}
.maplibregl-ctrl-logo{display:none!important;}
.maplibregl-ctrl-bottom-right,.maplibregl-ctrl-bottom-left{display:none!important;}

/* POI marker */
.poi-marker{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,0.18);transition:transform .15s;border:1.5px solid;}
.poi-marker:hover{transform:scale(1.18);}
.home-dot-marker{width:12px;height:12px;border-radius:50%;background:var(--accent);border:2.5px solid white;box-shadow:0 0 0 4px rgba(196,82,26,0.22),0 2px 8px rgba(196,82,26,0.3);cursor:default;}

@media(max-width:430px){body{padding:0;background:var(--bg);}.phone{width:100%;border-radius:0;min-height:100vh;height:auto;box-shadow:none;}.screen{height:auto;}.screen-map-inner{height:400px;position:relative;flex:none;}}
</style>
</head>
<body>
<div class="phone">
  <div class="status-bar">

lich","Nicht aufhören bis Rettungsdienst übernimmt"]},{"icon":"brain","title":"Schlaganfall erkennen","subtitle":"FAST-Test und sofort 112","type":"fast","fast":[{"letter":"F","word":"Face","desc":"Gesicht hängt auf einer Seite?"},{"letter":"A","word":"Arms","desc":"Arm kann nicht gehalten werden?"},{"letter":"S","word":"Speech","desc":"Sprache verwaschen oder weg?"},{"letter":"T","word":"Time","desc":"Sofort 112 anrufen"}]},{"icon":"bandage","title":"Starke Blutung stoppen","subtitle":"Druck ausüben und Blutverlust bremsen","type":"steps","steps":["Einmalhandschuhe anziehen wenn verfügbar","Sauberste verfügbare Materialien direkt auf die Wunde drücken","Fest und dauerhaft Druck halten — nicht nachschauen","Wundverband aus dem Kit verwenden wenn vorhanden","112 anrufen falls noch nicht geschehen"]},{"icon":"activity","title":"Herzinfarkt erkennen","subtitle":"Brustschmerz, Atemnot, Schweißausbruch","type":"text","paragraphs":["Drückende Schmerzen in der Brust, ausstrahlend in den linken Arm, Kiefer oder Rücken. Begleitet von Übelkeit, Schweißausbruch oder Kurzatmigkeit.","Sofort 112 anrufen. Person hinsetzen oder hinlegen. Nicht allein lassen."]},{"icon":"lungs","title":"Atemnot","subtitle":"Wenn jemand kaum oder nicht richtig Luft bekommt","type":"steps","steps":["Person aufrecht hinsetzen — niemals flach hinlegen","Beengte Kleidung lockern (Kragen, Krawatte, Gürtel)","Beruhigend sprechen — Panik verstärkt die Atemnot stark","Asthma-Spray oder verschriebene Notfallmedikamente bereitlegen","112 anrufen wenn keine Besserung in 2 Minuten oder Lippen bläulich"]},{"icon":"choking","title":"Erstickung","subtitle":"Wenn die Atemwege blockiert sind","type":"steps","steps":["Person zum kräftigen Husten ermutigen, solange sie noch kann","Wenn Husten nicht mehr geht: 5x kräftig zwischen die Schulterblätter schlagen (Person nach vorn beugen)","Wenn nicht erfolgreich: Heimlich-Manöver — Faust zwischen Bauchnabel und Brustbein, ruckartig nach innen-oben","Im Wechsel 5 Schläge / 5 Stöße bis Gegenstand draußen ist","Bei Bewusstlosigkeit: HLW beginnen, 112 anrufen"]},{"icon":"person-collapsed","title":"Bewusstlosigkeit","subtitle":"Person reagiert nicht oder sackt zusammen","type":"steps","steps":["Laut ansprechen, vorsichtig an Schultern rütteln","Bei keiner Reaktion: sofort 112 anrufen","Atmung prüfen: Brust hebt sich? Hörst du Atem an Mund/Nase?","Bei normaler Atmung: stabile Seitenlage","Bei keiner oder nicht normaler Atmung: HLW sofort beginnen — 30 Drücke, 2 Beatmungen"]},{"icon":"grid","title":"Weitere Hilfe","subtitle":"Verbrennungen, Vergiftung, Kindernotfall und mehr","type":"group","groups":[{"title":"Verletzungen versorgen","icon":"bandage","items":[{"icon":"flame","title":"Verbrennungen","subtitle":"Kühlen, schützen, beobachten","type":"steps","steps":["10–15 Minuten unter lauwarmes Wasser — nicht eiskalt, kein Eis","Verbrannte Kleidung NICHT von der Haut ziehen wenn sie klebt","Locker mit sauberem Tuch abdecken — keine Salben, kein Mehl, kein Hausmittel","Brandblasen nicht aufstechen","112 wenn größer als die eigene Handfläche oder im Gesicht/an Genitalien"]},{"icon":"cut","title":"Schnittwunden","subtitle":"Reinigen und verbinden","type":"steps","steps":["Hände waschen oder Einmalhandschuhe anziehen","Wunde unter klares Wasser halten — Schmutz vorsichtig spülen","Mit sauberer Kompresse abdecken, Druck wenn es blutet","Pflaster oder Verband — sauber und trocken halten","112 oder 116 117 wenn tief, klafft, oder pulsierend blutet"]},{"icon":"head-alert","title":"Kopfverletzung","subtitle":"Sturz oder Schlag auf den Kopf","type":"steps","steps":["Person ruhig halten, Kopf möglichst nicht bewegen","Bei Bewusstseinsstörung, Erbrechen oder ungleichen Pupillen: sofort 112","Bei Wunde: locker abdecken, nur leichten Druck","24 Stunden beobachten — Schläfrigkeit, Sprachstörung, Sehstörung","Im Zweifel ärztlich abklären lassen — Kinder besonders"]},{"icon":"ankle","title":"Verstauchung","subtitle":"PECH-Regel","type":"steps","steps":["P — Pause: Gelenk nicht belasten","E — Eis: 15 Minuten, dann Pause, immer mit Tuch dazwischen","C — Compression: leichter elastischer Druckverband","H — Hochlagern: über Herzhöhe wenn möglich","Bei Fehlstellung, starker Schwellung oder Knacken: ärztlich abklären"]}]},{"title":"Besondere Situationen","icon":"triangle-alert","items":[{"icon":"poison","title":"Vergiftung","subtitle":"Medikamente, Chemie, Pflanzen","type":"steps","steps":["Giftnotruf anrufen — 030 19240 (Berlin) oder regionale Nummer","Was, wieviel, wann? Verpackung, Reste oder Erbrochenes aufheben","Kein Erbrechen herbeiführen — außer Notruf weist es ausdrücklich an","Keine Milch geben — kann Aufnahme mancher Stoffe beschleunigen","Bei Bewusstlosigkeit: stabile Seitenlage und 112"]},{"icon":"baby","title":"Kindernotfall","subtitle":"Kinder reagieren anders als Erwachsene","type":"steps","steps":["Ruhe bewahren — Kinder spüren Panik sofort","Bei Atemnot aufrecht halten, nicht zwingen sich hinzulegen","Bei Fieberkrampf: nichts in den Mund, weich lagern, Zeit messen","Bei Verschlucken kleiner Gegenstände: Mund inspizieren, nicht blind greifen","Im Zweifel 112 — Disponenten sind speziell auf Kinder geschult"]},{"icon":"allergy","title":"Allergie","subtitle":"Anaphylaxie kann lebensbedrohlich werden","type":"steps","steps":["Auslöser entfernen — Bienenstachel, Nahrungsrest, Medikament","Adrenalin-Pen wenn verschrieben — sofort, nicht warten und beobachten","Person flach hinlegen, Beine hoch — bei Atemnot lieber sitzen","112 anrufen — auch wenn der Pen geholfen hat, zweite Welle möglich","Bei Bewusstlosigkeit ohne Atmung: HLW sofort"]},{"icon":"lightning","title":"Krampfanfall","subtitle":"Schützen, nicht festhalten","type":"steps","steps":["Umgebung sichern — harte und scharfe Gegenstände aus dem Weg","Kopf weich polstern (Jacke, Kissen)","NICHT festhalten, NICHTS in den Mund schieben","Zeit messen — Anfall länger als 5 Minuten oder Folgeanfall: 112","Nach dem Anfall: stabile Seitenlage, ruhig zureden, dabei bleiben"]},{"icon":"thermometer-hot","title":"Hitzschlag","subtitle":"Lebensgefahr — sofort kühlen","type":"steps","steps":["Sofort in Schatten oder kühlen Raum bringen","Kleidung lockern oder ausziehen","Mit feuchten Tüchern kühlen — besonders Hals, Achseln, Leiste","Wenn ansprechbar: schluckweise Wasser","112 bei Verwirrtheit, Bewusstlosigkeit, Krampf oder hoher Körpertemperatur"]},{"icon":"thermometer-cold","title":"Unterkühlung","subtitle":"Langsam wärmen, nicht massieren","type":"steps","steps":["In trockenen, warmen Raum bringen","Nasse Kleidung vorsichtig entfernen — nicht reiben","In Decken oder Schlafsack einwickeln, Kopf bedecken","Warme süße Getränke wenn ansprechbar — kein Alkohol","112 bei Verwirrtheit, Bewusstlosigkeit oder steifen Gliedmaßen"]}]}]}],"scenarios":[{"key":"stromausfall","name":"Stromausfall","desc":"Kein Strom für Stunden oder länger","color":"#C4521A","related":["kommunikation","heizungsausfall","unwetter"],"sections":[{"type":"text","paragraphs":["Der Strom ist weg und könnte Stunden oder Tage wegbleiben. Das betrifft Heizung, Kühlschrank, Beleuchtung, Laden von Handys und die Möglichkeit zu bezahlen.","Das klingt dramatischer als es ist. Mit deinem Kit ist das sehr gut zu bewältigen."]},{"type":"text","paragraphs":["Lampen und Geräte hören plötzlich auf zu funktionieren. Nachbarn sind ebenfalls betroffen — es ist nicht nur deine Sicherung. Straßenlaternen sind aus. Die NINA-App zeigt Warnungen für deine Region."]},{"type":"steps","steps":["Sicherungskasten prüfen — eigenen Defekt ausschließen","Nachbarn fragen — Ausfall bestätigen","NINA-App öffnen, auf offizielle Updates warten","Kühlschrank auf kälteste Stufe — und nicht mehr öffnen","Alle im Haushalt ruhig informieren"]},{"type":"stay_go","stay":{"label":"Bleiben","text":"Wasser vorhanden, kein Frost, Vorräte für mehrere Tage"},"go":{"label":"Gehen","text":"Winter, Wohnung unter 10°C, medizinische Geräte nötig"}},{"type":"text","paragraphs":["Batterie-Lampe zentral aufstellen. Powerbank laden. Badewanne und Behälter mit Wasser füllen — Pumpen können später ausfallen.","Kühlschrankinhalt zuerst essen. Batterie-Radio für Updates (Bayern 1, HR1 bleiben auf Sendung). Jemanden außerhalb der Region kurz informieren."]},{"type":"kit_ref","items":["flashlight","battery-charging","radio","droplets","archive","flame"]},{"type":"text_plan","paragraphs":["SMS verbraucht weniger Netzkapazität als Anrufe — zuerst SMS versuchen. Wenn Handys ausfallen: Treffpunkt aus deinem Plan.","Kinder beruhigen. Ältere Nachbarn kontrollieren — sie sind am stärksten gefährdet."],"plan_ref":"treffpunkt"},{"type":"text_warning","paragraphs":["Lampen und Geräte funktionieren wieder. Offizielle Entwarnung über NINA oder Radio."],"warning":"Kühlschrank prüfen — alles Verderbliche über 2h über 4°C muss weg. Kit sofort wieder auffüllen."}]},{"key":"hochwasser","name":"Hochwasser","desc":"Wasser steigt in deiner Umgebung oder im Haus","color":"#2E6FA0","related":["evakuierung","unwetter","kommunikation"],"sections":[{"type":"text","paragraphs":["Ein Fluss oder eine Drainage überläuft. Anders als die meisten Notfälle gibt Hochwasser oft etwas Vorwarnzeit. Nutze sie.","Sobald Wasser in dein Haus eindringt oder Straßen blockiert, schwinden deine Optionen schnell."]},{"type":"text","paragraphs":["NINA sendet eine Hochwasserwarnung. Behörden mit Lautsprecherfahrzeugen. Der nahe Fluss steigt ungewöhnlich schnell. Nachbarn bewegen Autos oder Sandsäcke. Wasser erscheint im Keller oder Erdgeschoss."]},{"type":"steps","steps":["NINA öffnen und Warnstufe für deine Region lesen","Gas und Strom abschalten wenn Wasser eindringt","Dokumente, Wertsachen und Kit in den obersten Stock","Auto JETZT auf höheres Gelände — nicht später","Nicht in den Keller wenn Wasser steigt"],"warning":"Nie durch überflutete Straßen fahren. 30 cm fließendes Wasser kann ein Auto mitreißen."},{"type":"stay_go","stay":{"label":"Bleiben","text":"Im Obergeschoss, keine Evakuierungsanordnung, kein Wasser im Gebäude"},"go":{"label":"Sofort gehen","text":"Behörden ordnen Evakuierung an. Wasser dringt ins Erdgeschoss. Fluchtweg könnte bald gesperrt sein."}},{"type":"text","paragraphs":["Bei Evakuierung: Kit, Dokumente, Medikamente, Handy und warme Kleidung — nicht mehr. Nur offizielle Routen. Nicht in Hochwasserwasser waten — es enthält Abwasser und Chemikalien.","Schäden sofort fotografieren für die Versicherung sobald es sicher ist."]},{"type":"kit_ref","items":["package","folder","pill","droplets","radio","battery-charging"]},{"type":"text_plan","paragraphs":["Jetzt wird dein Familienplan wichtig. Im Notfallzentrum sofort registrieren damit getrennte Familienmitglieder dich finden können."],"plan_ref":"treffpunkt"},{"type":"text_warning","paragraphs":["Offizielle Entwarnung über NINA oder Radio. Wasser vollständig zurückgegangen."],"warning":"Vor Betreten: Gaskontrolle, Strukturschäden prüfen. Strom erst nach Fachinspektion einschalten."}]},{"key":"unwetter","name":"Unwetter","desc":"Sturm, Starkregen oder schwerer Schaden draußen","color":"#6B6560","related":["stromausfall","hochwasser","evakuierung"],"sections":[{"type":"text","paragraphs":["Ein schwerer Sturm mit extremem Wind, Starkregen oder Hagel. In Deutschland meist ein Sturmtief, manchmal bis Orkan. In der Regel nach einem Tag vorbei.","Die meisten Menschen können das sicher zu Hause aussitzen — wenn sie drinnen bleiben."]},{"type":"text","paragraphs":["DWD oder NINA sendet eine Sturmwarnung. Wind nimmt spürbar und schnell zu. Bäume in der Nähe knacken oder fallen. Lokales Radio sendet Sicherheitswarnungen."]},{"type":"steps","steps":["DWD oder NINA für Schweregrad und Dauer prüfen","Sofort rein und drinnen bleiben","Alle Fenster und Rollläden schließen","Balkon und Garten räumen — alles was zum Geschoss werden könnte","Auto von Bäumen wegparken wenn schnell möglich"]},{"type":"stay_go","stay":{"label":"Fast immer bleiben","text":"Dein Haus ist beim Sturm der sicherste Ort. Draußen gehen ist die Gefahr."},"go":{"label":"Nur gehen wenn","text":"Dach sichtbar beschädigt. Behörden ordnen Evakuierung an. Du bist in einem Mobilheim."},"warning":"Nicht bei Orkan fahren. Umgestürzte Bäume verursachen die meisten Sturmtoten."},{"type":"text","paragraphs":["Von Fenstern fernbleiben während des Sturmschwerpunkts. Bei Stromausfall: Stromausfall-Guide befolgen. Erst nach offiziellem Sturm-Ende nach draußen — nicht in einer kurzen Flaute."]},{"type":"kit_ref","items":["radio","flashlight","battery-charging","droplets","archive"]},{"type":"text","paragraphs":["Sicherstellen dass alle zu Hause sind bevor der Sturm seinen Höhepunkt erreicht. Älteren Nachbarn vorher Bescheid geben — nicht während."]},{"type":"text_warning","paragraphs":["DWD hebt die Sturmwarnung auf. Wind hat deutlich und gleichmäßig nachgelassen."],"warning":"Vor dem Hinausgehen nach oben schauen — Schäden können noch stundenlang herabfallen."}]},{"key":"evakuierung","name":"Evakuierung","desc":"Behörden ordnen an, dass du gehen musst","color":"#A07520","related":["hochwasser","industrie","kommunikation"],"sections":[{"type":"text","paragraphs":["Evakuierung bedeutet: Behörden sagen dir, sofort zu gehen. In Deutschland passiert das öfter als man denkt — WWII-Bomben werden mehrmals jährlich gefunden.","Deutsche Behörden sind sehr gut organisiert. Dein Job ist es, schnell und ruhig zu gehen."]},{"type":"text","paragraphs":["NINA sendet eine Evakuierungswarnung für deine Postleitzahl. Polizei oder Feuerwehr mit Lautsprechern in deiner Straße. Lokales Radio kündigt einen Evakuierungsradius an — und deine Adresse liegt darin."]},{"type":"steps","steps":["Warnung über NINA oder Radio bestätigen","Vorgepacktes Kit greifen — dafür ist es da","Gas, Strom und Wasser am Haupthahn abschalten","Medikamente und Dokumente mitnehmen falls nicht im Kit","Haus abschließen und gehen — nicht zögern"],"warning":"Der häufigste Fehler: zu lange warten. Frühes Gehen hält Straßen frei für Rettungskräfte."},{"type":"stay_go","go_only":true,"go":{"label":"Gehen — immer","text":"Bei einer Evakuierungsanordnung gibt es keine Bleiben-Option. Behörden haben das Risiko bewertet."},"note":{"label":"Einzige Frage","text":"Wie schnell kannst du gehen?"}},{"type":"text","paragraphs":["Offizielle Evakuierungsroute nehmen. Zur ausgewiesenen Notunterkunft gehen — wird über NINA und Radio bekannt gegeben. Sofort registrieren. Erst zurückkehren wenn Behörden es explizit sagen."]},{"type":"kit_ref","items":["package","folder","pill","battery-charging"]},{"type":"text_plan","paragraphs":["Das ist der Moment wo dein Familienplan am meisten zählt. Im Notfallzentrum sofort registrieren."],"plan_ref":"treffpunkt"},{"type":"text_warning","paragraphs":["Behörden erteilen offiziell Entwarnung. Bei Bombenentschärfungen: meist innerhalb weniger Stunden."],"warning":"Haus vor dem Betreten prüfen. Gas- und Stromleitungen nach einer Evakuierung inspizieren lassen."}]},{"key":"kommunikation","name":"Kommunikationsausfall","desc":"Kein Netz, kein Internet, kein Festnetz","color":"#1A7A7A","related":["stromausfall","evakuierung","unterwegs"],"sections":[{"type":"text","paragraphs":["Kein Mobilfunknetz, kein Internet, kein Festnetz. Keine Anrufe, keine Nachrichten, keine Karten, keine Online-Zahlungen.","Desorientierend mehr als gefährlich — aber es legt bloß wie abhängig der Alltag von Konnektivität ist."]},{"type":"text","paragraphs":["Dein Handy zeigt kein Signal oder 'Nur Notrufe'. SMS senden nicht. Du kannst niemanden auf digitalem Weg erreichen. Andere um dich herum haben dasselbe Problem — es ist nicht dein Gerät."]},{"type":"steps","steps":["Bestätigen es ist ein Netzproblem — mit Nachbarn prüfen","Sofort Batterie-Radio einschalten — deine einzige zuverlässige Informationsquelle","Handy-Akku schonen: Flugzeugmodus, weniger Helligkeit, Apps schließen","Wenn mitten in Notfall: zur nächsten Polizei- oder Feuerwache gehen","Familienplan in Erinnerung rufen — du hast für diesen Moment vorbereitet"],"warning":"Das einzige Szenario wo dein vorher vereinbarter Treffpunkt und Zeitpunkt alles bedeuten."},{"type":"stay_go","stay":{"label":"Zu Hause bleiben","text":"Zu Hause sind deine Vorräte und dort suchen Familienmitglieder dich."},"go":{"label":"Zum Treffpunkt","text":"Wenn du von der Familie getrennt warst als es begann und das ist der vereinbarte Plan."}},{"type":"text","paragraphs":["Batterie-Radio auf Deutschlandfunk (90,2 FM). Handy-Akku rücksichtslos schonen.","SMS vor Anrufen versuchen wenn Signal kurz zurückkommt. Bargeld ist jetzt unerlässlich — Kartenzahlung funktioniert nicht."]},{"type":"kit_ref","items":["radio","battery-charging","banknote","file-text"]},{"type":"text_plan","paragraphs":["Dieses Szenario dreht sich fast ganz um Vorbereitung vor dem Notfall. Wichtige Nummern physisch notiert haben. Feste Treffzeit vereinbart haben.","Wenn getrennt: alle gehen zum Treffpunkt zur vereinbarten Uhrzeit."],"plan_ref":"treffpunkt","plan_ref2":"uhrzeit"},{"type":"text_warning","paragraphs":["Signal kehrt zurück und aufgehaltene Nachrichten beginnen einzutreffen. Radio bestätigt Netzwerkwiederherstellung."],"warning":"Familienplan jetzt vervollständigen. Heute Telefonnummern aufschreiben."}]},{"key":"wasserausfall","name":"Wasserausfall","desc":"Kein Wasser oder Trinkwasser nicht sicher","color":"#1A7A7A","related":["stromausfall","versorgungsengpass","wasserknappheit"],"sections":[{"type":"text","paragraphs":["Aus dem Hahn kommt nichts, oder es kommt etwas — aber Behörden sagen, du sollst es nicht trinken. Das passiert in Deutschland öfter als die meisten denken: Rohrbruch, Verunreinigung, Wartung.","Meist ist das Problem nach Stunden bis einem Tag behoben. Mit dem Vorrat aus deinem Kit ist das gut zu überbrücken."]},{"type":"text","paragraphs":["Hahn läuft nur tropfweise oder gar nicht. Stadtwerke senden ein Abkochgebot per NINA, Radio oder Aushang. Wasser ist trüb, riecht oder schmeckt ungewöhnlich. Nachbarn bestätigen dasselbe Problem."]},{"type":"steps","steps":["NINA und lokale Stadtwerke prüfen — was ist betroffen, wie lange?","Restdruck nutzen: Badewanne, Eimer, alle Flaschen sofort füllen","Bei Abkochgebot: nur abgekochtes oder Flaschenwasser trinken — auch zum Zähneputzen","Wasservorrat aus dem Kit prüfen — wie lange reicht er?","Geschirrspüler und Waschmaschine nicht starten"]},{"type":"stay_go","stay":{"label":"Bleiben","text":"Vorräte vorhanden, Ausfall voraussichtlich kurz, niemand auf medizinisches Wasser angewiesen."},"go":{"label":"Gehen erwägen","text":"Medizinische Geräte (Dialyse, Inhalation) brauchen sauberes Wasser. Ausfall dauert über deine Vorräte hinaus."}},{"type":"text","paragraphs":["Trinkwasser rationieren: 3 Liter pro Person und Tag ist das absolute Minimum — Trinken, Kochen, Zähneputzen.","Toilette nur sparsam spülen, ggf. mit Eimer Regen- oder Brauchwasser. Pflanzen und Haustiere mit eingeplanen Vorräten versorgen — sie brauchen weniger als du denkst."]},{"type":"kit_ref","items":["droplets","archive","banknote","radio"]},{"type":"text","paragraphs":["Ältere Verwandte und Nachbarn haben oft kleinere Vorräte als du — kurz prüfen ob sie zurechtkommen.","Kinder beruhigen: das ist unangenehm, aber kein Notfall. Familienmitglieder draußen kurz informieren, dass sie zu Hause nichts trinken."]},{"type":"text_warning","paragraphs":["Stadtwerke geben Entwarnung über NINA, Radio oder Aushang. Bei Abkochgebot: erst nach offiziellem Ende wieder direkt aus dem Hahn trinken."],"warning":"Erste Liter aus der Leitung ablaufen lassen — Stagnationswasser nicht trinken. Kit-Wasservorrat sofort wieder auffüllen."}]},{"key":"gasausfall","name":"Gasausfall","desc":"Kein Gas für Heizung, Warmwasser oder Herd","color":"#A07520","related":["heizungsausfall","stromausfall","versorgungsengpass"],"sections":[{"type":"text","paragraphs":["Die Gasversorgung fällt aus. Es gibt zwei sehr unterschiedliche Fälle: ein flächendeckender Versorgungsausfall (vom Anbieter), oder ein Leck bei dir oder im Haus. Die Reaktion ist komplett anders.","Bei Leckage zählen Sekunden. Bei Versorgungsausfall hast du Zeit, ruhig zu planen."]},{"type":"text","paragraphs":["Heizung läuft nicht mehr, Herd zündet nicht, Warmwasser bleibt kalt. Bei Versorgungsausfall melden Stadtwerke und NINA.","Bei Leckage: deutlicher Geruch nach faulen Eiern (Schwefelbeimischung), Zischen aus Leitungen oder Geräten, Schwindel oder Kopfschmerzen ohne Grund."]},{"type":"steps","steps":["Bei Geruch oder Zischen: keine Schalter betätigen — kein Licht, kein Handy, keine Klingel","Hauptabsperrhahn schließen (meist im Keller oder am Zähler)","Alle Fenster und Türen sofort weit öffnen","Alle aus der Wohnung — von draußen 112 oder Gas-Notruf des Anbieters","Bei reinem Versorgungsausfall: NINA prüfen, Kit aktivieren, ruhig warten"],"warning":"Kein offenes Feuer, keine elektrischen Schalter, kein Handy in der Wohnung — Funken können das Gas-Luft-Gemisch zünden."},{"type":"stay_go","stay":{"label":"Bleiben (Versorgungsausfall)","text":"Reiner Versorgungsausfall ohne Leckage. Wohnung über 15°C. Vorräte für mehrere Tage."},"go":{"label":"Sofort gehen (Leckage)","text":"Bei Geruch, Zischen oder Verdacht — alle raus, Nachbarn warnen, von draußen Notruf wählen."}},{"type":"text","paragraphs":["Bei Versorgungsausfall: Wohnung warm halten — Türen zu unbenutzten Räumen schließen, alle in einen Raum. Schichten anziehen.","Kalt essen oder mit Camping-Kocher draußen oder am offenen Fenster kochen — niemals mit Gas in geschlossenen Räumen improvisieren."]},{"type":"kit_ref","items":["layers","flashlight","archive","radio","banknote"]},{"type":"text_plan","paragraphs":["Bei Leckage: alle Familienmitglieder informieren — niemand betritt das Haus bevor die Feuerwehr freigibt. Treffpunkt aus deinem Plan nutzen.","Bei Versorgungsausfall: Notruf nicht blockieren — geh über NINA und Radio."],"plan_ref":"treffpunkt"},{"type":"text_warning","paragraphs":["Bei Leckage: Feuerwehr gibt das Haus frei. Bei Versorgungsausfall: Stadtwerke melden Wiederherstellung."],"warning":"Nach Leckage: Geräte vom Fachbetrieb prüfen lassen, bevor du Heizung oder Herd wieder benutzt."}]},{"key":"heizungsausfall","name":"Heizungsausfall","desc":"Die Wohnung wird kalt oder bleibt kalt","color":"#2560A0","related":["stromausfall","gasausfall","wintereinbruch"],"sections":[{"type":"text","paragraphs":["Die Heizung funktioniert nicht — Defekt, Stromausfall, Gasausfall oder Brennstoff alle. In den kalten Monaten von November bis März ein echtes Problem, im Sommer eher unangenehm.","Mit ein paar einfachen Schritten bleibt die Wohnung lange genug warm, um zu überbrücken."]},{"type":"text","paragraphs":["Heizkörper werden nicht warm, obwohl Thermostat aufgedreht ist. Raumtemperatur sinkt unter 18°C. Boden und Wände fühlen sich kühler an als sonst — die Wärme strahlt nirgends mehr nach."]},{"type":"steps","steps":["Ursache prüfen: Strom da? Gas da? Brenner zeigt Fehler?","Vermieter, Hausverwaltung oder Heizungsfirma anrufen","Türen zu unbenutzten Räumen schließen","Familie und Aktivität in einen Raum zusammenziehen — gemeinsam wärmer","Fenster nur kurz und kräftig stoßlüften, nicht dauerhaft kippen"]},{"type":"stay_go","stay":{"label":"Bleiben","text":"Raumtemperatur über 14°C, kurzer Ausfall absehbar, niemand gesundheitlich besonders gefährdet."},"go":{"label":"Gehen erwägen","text":"Säuglinge, ältere Personen oder chronisch Kranke im Haushalt. Temperatur sinkt unter 12°C. Ausfall dauert länger als einen Tag."}},{"type":"text","paragraphs":["Schichten statt einer dicken Jacke — drei dünne Schichten halten besser warm als ein Pullover. Mütze und Socken nicht vergessen, der meiste Wärmeverlust geht über Kopf und Füße.","Heißgetränke in regelmäßigen Abständen. Bewegung wärmt mehr als Stillsitzen. Schlafsack auf Sofa oder Bett legen — auch tagsüber."]},{"type":"kit_ref","items":["layers","flashlight","archive","banknote","radio"]},{"type":"text","paragraphs":["Familienmitglieder mit gesundheitlichen Risiken zuerst — Säuglinge, ältere Personen, Menschen mit Atemwegsproblemen.","Nachbarn fragen, ob ein warmer Raum geteilt werden kann. In Deutschland gibt es bei längeren Ausfällen oft kommunale Wärmepunkte."]},{"type":"text_warning","paragraphs":["Heizung läuft wieder. Raumtemperatur stabil über 18°C — das dauert nach längerem Ausfall ein paar Stunden."],"warning":"Niemals Grill, Camping-Kocher oder offenes Feuer in der Wohnung als Heizungsersatz benutzen — Erstickungsgefahr durch Kohlenmonoxid."}]},{"key":"industrie","name":"Industrieunfall","desc":"Chemische oder industrielle Gefahr in der Nähe","color":"#6B3D7A","related":["evakuierung","kommunikation"],"sections":[{"type":"text","paragraphs":["Eine nahe Fabrik oder chemische Anlage hat etwas Gefährliches freigesetzt. Die Schlüsselanweisung ist das Gegenteil der meisten Notfälle: nicht nach draußen gehen. Dich einschließen.","Du wirst das wahrscheinlich nie erleben — aber wenn doch, zählen die ersten 10 Minuten enorm."]},{"type":"text","paragraphs":["NINA sendet eine Warnung mit spezifischen Anweisungen. Laute Explosion gehört oder große Rauchwolke gesehen. Ungewöhnlicher Geruch draußen — chemisch oder brennend. Rettungsfahrzeuge in großer Zahl in eine Richtung."]},{"type":"steps","steps":["Sofort rein wenn du draußen bist — Kinder und Tiere mitnehmen","Alle Fenster, Türen und Lüftungsöffnungen vollständig schließen","Mechanische Lüftung und Klimaanlage ausschalten","NINA und Radio für spezifische Anweisungen — Empfehlung variiert je nach Stoff","Von Fenstern fernbleiben"],"warning":"Die Gefahr kann unsichtbar, geruchlos oder schon über dem sicheren Expositionslevel liegen."},{"type":"stay_go","stay":{"label":"Drinnen bleiben","text":"In den meisten Fällen — In-door-Schutz (Schutzraum) laut deutschem Zivilschutz."},"go":{"label":"Nur gehen wenn","text":"Behörden explizit Evakuierung anordnen. Direktes Brandrisiko für dein Gebäude."}},{"type":"text","paragraphs":["Bei ernstem Alarm: Türspalten mit nassen Handtüchern oder Klebeband abdichten. Telefon nur für Notfälle nutzen.","Offiziellen Anweisungen genau folgen — sie sagen dir wann gelüftet werden kann."]},{"type":"kit_ref","items":["radio","battery-charging","mask","hand","droplets"]},{"type":"text","paragraphs":["Wenn Familienmitglieder draußen sind: per SMS anweisen sofort ins nächste Gebäude zu gehen. Nicht fahren um sie abzuholen.","Schulen und Arbeitsplätze haben eigene Schutzraum-Protokolle — vertraue darauf."]},{"type":"text_warning","paragraphs":["NINA oder Radio erteilen explizite Entwarnung. Fenster erst öffnen nach offiziellem Freigabe — auch wenn der Geruch weg ist."],"warning":"Wenn jemand Symptome hatte: beim Hausarzt oder 116 117 melden und untersuchen lassen."}]},{"key":"hitzewelle","name":"Hitzewelle","desc":"Gefährliche Hitze für mehrere Tage","color":"#C4521A","related":["stromausfall","wasserknappheit"],"sections":[{"type":"text","paragraphs":["Mehrere Tage über 30°C, oft mit warmen Nächten über 20°C. In Deutschland zunehmend häufig — und gefährlicher als die meisten denken. Hitzewellen fordern jedes Jahr mehr Tote als Stürme oder Hochwasser.","Das Risiko steigt langsam und ist nicht spektakulär. Genau deshalb wird es unterschätzt."]},{"type":"text","paragraphs":["DWD sendet eine Hitzewarnung für deine Region. Wohnung kühlt nachts nicht mehr ab. Bei dir oder Familienmitgliedern: Kopfschmerzen, Müdigkeit, Übelkeit, Schwindel, weniger Urin als sonst — alles frühe Warnzeichen."]},{"type":"steps","steps":["Fenster und Rollläden tagsüber komplett zu — Hitze draußen halten","Nachts und früh morgens (vor 8 Uhr) kräftig stoßlüften","Wasserflasche immer in Reichweite — auch ohne Durst trinken","Anstrengung und Sport draußen verschieben oder ausfallen lassen","Kühlsten Raum identifizieren — meist Nordseite, Erdgeschoss oder Keller"]},{"type":"stay_go","stay":{"label":"Bleiben","text":"Wohnung bleibt unter 28°C, jeder kommt klar, niemand zeigt Symptome."},"go":{"label":"Klimatisierten Ort aufsuchen","text":"Wohnung über 30°C auch nachts. Bibliothek, Einkaufszentrum, Museum, Kirche, Schwimmbad sind kühlere Optionen."}},{"type":"text","paragraphs":["Mindestens alle zwei Stunden trinken, auch wenn kein Durst — Durst ist bei Hitze ein verspätetes Signal. Salzige Snacks dazu, du verlierst Salz mit dem Schweiß.","Lauwarme Duschen — kalte verengen Gefäße und wärmen am Ende mehr. Nasse Tücher um Hand- und Fußgelenke, leichte Baumwollkleidung, kühle Kompressen im Nacken."]},{"type":"kit_ref","items":["droplets","archive"]},{"type":"text","paragraphs":["Ältere Verwandte und Nachbarn täglich kontrollieren — sie spüren Durst weniger und kühlen schlechter ab. Ein Anruf reicht oft.","Kinder beobachten, sie überhitzen schneller. Haustiere brauchen Schatten, frisches Wasser, abends spazieren statt mittags. Auto bei Hitze niemals als Wartezimmer."]},{"type":"text_warning","paragraphs":["DWD hebt Hitzewarnung auf. Nachttemperaturen unter 18°C, Tageswerte erträglich."],"warning":"Bei anhaltenden Symptomen — starker Kopfschmerz, Verwirrtheit, kein Schwitzen — Hausarzt oder 116 117. Bei Bewusstseinsstörung 112."}]},{"key":"unterwegs","name":"Unterwegs feststecken","desc":"Du kommst nicht weiter oder nicht nach Hause","color":"#6B6560","related":["kommunikation","unwetter","wintereinbruch"],"sections":[{"type":"text","paragraphs":["Du bist nicht zu Hause und kommst nicht zurück — Bahnausfall, Sturm, gesperrte Straßen, Streik. Das passiert öfter als die schlimmen Szenarien und kann von ein paar Stunden bis zu mehreren Tagen dauern.","Die meiste Vorbereitung dafür hast du schon: Plan, Kontakte, Bargeld. Es geht jetzt um Ruhe und sinnvolle Schritte."]},{"type":"text","paragraphs":["Zug fällt aus, Bahnhof gesperrt. Stau ohne Ende, Tankstellen leer. Hotels in der Region ausgebucht. Familie zu Hause meldet, du kommst heute nicht zurück."]},{"type":"steps","steps":["Tief durchatmen — du bist in keinem akuten Notfall","Telefon-Akku checken, Stromsparmodus an, Helligkeit runter","Familie informieren wo du bist und wie der Stand ist","Verkehrsapps und NINA prüfen — wie lange dauert die Störung?","Festen Anhaltspunkt suchen: Bahnhof, Hotel-Lobby, Krankenhaus, Polizei"]},{"type":"stay_go","stay":{"label":"Bleiben","text":"In einem sicheren öffentlichen Gebäude. Bei Nacht, Sturm oder fremder Umgebung — bleiben ist fast immer richtig."},"go":{"label":"Weitergehen wenn","text":"Tageslicht, bekannter Weg, klares erreichbares Ziel. Niemals zu Fuß auf Autobahnen oder bei extremem Wetter."}},{"type":"text","paragraphs":["Wasser und Snacks kaufen wenn möglich — Bargeld ist hier dein bester Freund. Warme Schicht wenn nachts kalt, Notfalldecke aus dem Kit nutzen wenn dabei.","Kontakt außerhalb der Region informieren — sie können vermitteln wenn die Familie zu Hause dich nicht erreicht. Schlafplatz: Hotel, Bekannte, Notunterkunft (Bahnhöfe öffnen oft bei großen Störungen)."]},{"type":"kit_ref","items":["banknote","file-text","battery-charging","layers"]},{"type":"text_plan","paragraphs":["Treffpunkt-Strategie umkehren: nicht du gehst zum Treffpunkt, sondern Familie weiß wo du bist und kommt klar. Falls Verbindung wackelt: feste Uhrzeit für nächsten Anruf vereinbaren.","Kontakt außerhalb der Region als Vermittler nutzen — ein Anruf statt zehn."],"plan_ref":"kontakt"},{"type":"text_warning","paragraphs":["Verbindung wieder offen, Verkehr läuft, du bist auf dem Weg nach Hause oder am sicheren Ziel."],"warning":"Beim nächsten Mal: kleines Notfallpaket im Auto oder Rucksack. Eine Powerbank, eine Notfalldecke, 50€ Bargeld machen einen großen Unterschied."}]}],"scenarios_secondary":[{"key":"wintereinbruch","name":"Wintereinbruch","desc":"Schnee, Eis oder extreme Kälte","color":"#5A8AB5","related":["heizungsausfall","unwetter","stromausfall"],"sections":[{"type":"text","paragraphs":["Plötzliche extreme Kälte, viel Schnee oder Eis. Der Verkehr bricht zusammen, Stromleitungen können brechen, Heizungen geraten an Grenzen.","In Deutschland regional sehr unterschiedlich, aber in den letzten Jahren häufig spektakulärer geworden."]},{"type":"text","paragraphs":["DWD-Warnung vor Schnee, Glätte oder extremer Kälte. Verkehrsmeldungen häufen sich. Schulen melden früher Schluss. Streufahrzeuge im Dauereinsatz."]},{"type":"steps","steps":["Vorräte prüfen — bei Schneefall könntest du 1-2 Tage nicht einkaufen","Heizung checken: läuft, Reserve da?","Wege ums Haus räumen und streuen","Auto: gefüllt tanken, Schneeketten oder Winterausrüstung griffbereit","Nicht unbedingt nötige Fahrten verschieben"]},{"type":"kit_ref","items":["layers","flashlight","archive","droplets"]}]},{"key":"strahlenunfall","name":"Strahlenunfall","desc":"Radiologische oder nukleare Freisetzung","color":"#6B3D7A","related":["industrie","evakuierung"],"sections":[{"type":"text","paragraphs":["Eine radiologische oder nukleare Anlage hat etwas freigesetzt — sehr selten, aber wenn es passiert, sind die ersten Stunden entscheidend. Behörden in Deutschland reagieren sehr schnell.","Deine Aufgabe ist einfach: rein, dicht machen, NINA hören."]},{"type":"text","paragraphs":["NINA sendet eine spezifische Warnung mit klaren Anweisungen. Sirenen heulen mit dem Signal für Schutzraum (Heulton, dann Pause). Behörden in Lautsprecherwagen oder über das Radio."]},{"type":"steps","steps":["Sofort rein — Kinder, Haustiere mitnehmen","Alle Fenster, Türen, Lüftungen schließen, Klimaanlage aus","NINA und Radio einschalten — auf spezifische Anweisungen warten","Innenraum aufsuchen, möglichst ohne Außenfenster (Bad, Innenflur)","Erst Jodtabletten nehmen wenn Behörden es ausdrücklich anordnen — nicht prophylaktisch"],"warning":"Niemals selbst entscheiden zu evakuieren — Behörden wissen, wo es sicher ist und wo nicht."},{"type":"stay_go","stay":{"label":"Drinnen bleiben","text":"Im Zweifel immer drinnen — Wände schirmen viel ab. Bis Behörden anders anordnen."},"go":{"label":"Nur gehen wenn","text":"Behörden ausdrücklich Evakuierung anordnen, mit klarer Route und Ziel."}}]},{"key":"wasserknappheit","name":"Wasserknappheit","desc":"Trinkwasser wird knapp oder eingeschränkt","color":"#1A7A7A","related":["wasserausfall","hitzewelle","versorgungsengpass"],"sections":[{"type":"text","paragraphs":["Anders als ein plötzlicher Ausfall: Wasser wird über Tage oder Wochen knapper oder rationiert. In Deutschland bisher eher in trockenen Sommern und in einzelnen Regionen.","Die gute Nachricht: das entwickelt sich langsam genug, dass du planen kannst."]},{"type":"text","paragraphs":["Behörden ordnen Sparmaßnahmen an — kein Rasensprengen, keine Autowäsche, kein Pool. Druck im Hahn niedriger als sonst, abends teilweise nichts mehr. Lokale Berichte über trockene Brunnen."]},{"type":"steps","steps":["Vorrat aufstocken — nicht hamstern, nur eine Reserve aufbauen","Verbrauch ehrlich anschauen: kürzer duschen, Spülkasten reduzieren","Spül- und Waschmaschine nur voll laufen lassen","Garten und Pflanzen mit Regenwasser oder Brauchwasser","Behördenanweisungen genau befolgen — Verstöße werden geahndet"]},{"type":"kit_ref","items":["droplets","archive"]}]},{"key":"vegetationsbrand","name":"Vegetationsbrand","desc":"Feuer oder Rauch in deiner Region","color":"#B05E1A","related":["evakuierung","industrie","unwetter"],"sections":[{"type":"text","paragraphs":["Wald-, Heide- oder Feldbrand in der Nähe — oder Rauch von einem entfernten Brand zieht über deine Region. In Deutschland wegen trockener Sommer zunehmend häufiger.","Der Rauch ist oft das größere Problem für Anwohner als das Feuer selbst — und er kann hunderte Kilometer weit ziehen."]},{"type":"text","paragraphs":["NINA-Warnung oder DWD-Hinweis. Brandgeruch in der Luft, Sicht durch Rauch eingeschränkt. Asche fällt sichtbar zu Boden. Husten, Augenreizung, Kratzen im Hals."]},{"type":"steps","steps":["Fenster und Türen schließen, Lüftung aus","Bei Atemwegsproblemen: feuchtes Tuch oder FFP2 vor Mund und Nase","NINA hören — Evakuierung droht? Wind dreht?","Sportliche Aktivität draußen vermeiden","Nicht selbst zum Brand fahren um zu schauen — du blockierst Einsatzkräfte"]},{"type":"stay_go","stay":{"label":"Bleiben","text":"Brand weit entfernt, nur Rauch — drinnen mit geschlossenen Fenstern."},"go":{"label":"Gehen wenn","text":"Behörden Evakuierung anordnen oder Feuer sichtbar näher kommt."}}]},{"key":"versorgungsengpass","name":"Versorgungsengpass","desc":"Einkaufen, Lieferungen oder Alltag fallen aus","color":"#3D6B4A","related":["wasserknappheit","stromausfall","kommunikation"],"sections":[{"type":"text","paragraphs":["Lieferketten stocken: Supermarktregale dauerhaft leer in bestimmten Bereichen, Apotheken können Medikamente nicht vorrätig halten, Tankstellen melden Engpässe.","Nichts explodiert, aber der Alltag wird zäh. Mit gut bestücktem Kit fast unsichtbar."]},{"type":"text","paragraphs":["Bestimmte Produkte fehlen über Wochen — nicht nur in einem Geschäft. Apotheken vertrösten bei Standardmedikamenten. Lieferdienste melden Verzögerungen. Berichte in Lokalmedien."]},{"type":"steps","steps":["Vorräte ehrlich prüfen — keine Hamsterkäufe, aber Reserven sinnvoll auffüllen","Medikamente: rechtzeitig Rezepte erneuern, nicht erst wenn leer","Bargeld bereithalten — bei Lieferengpässen kann Kartenzahlung wackeln","Alternative Quellen: Wochenmärkte, Hofläden, Online-Direktbezug","Solidarisch bleiben — Engpass wird schlimmer wenn alle hamstern"]},{"type":"kit_ref","items":["archive","pill","banknote","droplets"]}]},{"key":"infektionsausbruch","name":"Infektionsausbruch","desc":"Ansteckende Krankheit im Haushalt oder in der Region","color":"#A04A6B","related":["versorgungsengpass","kommunikation"],"sections":[{"type":"text","paragraphs":["Eine ansteckende Krankheit verbreitet sich — im Haushalt, im Wohngebiet oder regional. Reicht von schwerer Grippe bis zu seltenen Erregern. Behörden geben Hinweise.","Hier zählt: ruhige Hygiene und das Befolgen offizieller Anweisungen — keine Panik, kein Heldentum."]},{"type":"text","paragraphs":["RKI oder Gesundheitsamt warnen. Symptome im Umfeld häufen sich. Hausarzt empfiehlt Schutzmaßnahmen. Schulen oder Kitas melden Ausbruch."]},{"type":"steps","steps":["Offizielle Quellen lesen —       CATEGORIES = L.categories;
      POI_DATA   = L.pois;
    } catch(e) {
      document.getElementById('app-screens').innerHTML =
        '<div style="padding:40px 20px;font-size:14px;color:#B03A2E;">Standortdaten konnten nicht geladen werden.<br>Bitte starte über einen lokalen Server: <code>python3 -m http.server 8000</code></div>';
      return;
    }
  }

  activeCategories = new Set(CATEGORIES.filter(c => c.default_on !== false).map(c => c.id));
  render();
  restoreFromStorage();
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  const el = document.getElementById('screen-' + id);
  if (el) {
    el.classList.add('active');
    const sa = el.querySelector('.scroll-area');
    if (sa) sa.scrollTop = 0;
    el.querySelectorAll('.nav-btn').forEach((b,i) => {
      b.classList.toggle('active', ['home','notfaelle','kit','hilfe','karte','plan'][i] === id
        || (id === 'scenario' && i === 1));
    });
    state.screen = id;
    if (id === 'karte') setTimeout(() => initMap(), 80);
  }
}

// ============================================================
// MAP INIT (lazy — loads MapLibre only when Karte screen opens)
// ============================================================
let mapObj = null;
let mapReady = false;
const markersByCategory = {};

function generateCircle(cLng, cLat, radiusKm, n=72) {
  const coords = [];
  for (let i = 0; i <= n; i++) {
    const a = (i / n) * 2 * Math.PI;
    const dLat = radiusKm / 110.574;
    const dLng = radiusKm / (111.32 * Math.cos(cLat * Math.PI / 180));
    coords.push([cLng + dLng * Math.cos(a), cLat + dLat * Math.sin(a)]);
  }
  return { type:'Feature', geometry:{ type:'Polygon', coordinates:[coords] }, properties:{} };
}

function initMap() {
  if (mapReady) {
    if (mapObj) setTimeout(() => mapObj && mapObj.resize(), 50);
    return;
  }
  if (!window.maplibregl) {
    if (!document.getElementById('maplibre-js')) {
      const css = document.createElement('link');
      css.rel = 'stylesheet';
      css.href = 'https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css';
      document.head.appendChild(css);
      const js = document.createElement('script');
      js.id = 'maplibre-js';
      js.src = 'https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js';
      js.onload = () => _doInitMap();
      document.head.appendChild(js);
    }
    return;
  }
  _doInitMap();
}

function _doInitMap() {
  if (mapReady) return;
  const container = document.getElementById('map');
  if (!container || container.offsetHeight === 0) {
    setTimeout(_doInitMap, 60);
    return;
  }
  mapReady = true;

  mapObj = new maplibregl.Map({
    container: 'map',
    // PRODUCTION: swap style for Protomaps PMTiles source:
    // style: { version:8, sources:{ pm:{ type:'vector', url:'pmtiles://your.pmtiles' }}, layers:[...] }
    style: 'https://basemaps.cartocdn.com/gl/positron-gl-style/style.json',
    center: [MAP_CENTER.lng, MAP_CENTER.lat],
    zoom: 11.2,
    attributionControl: false,
  });

  mapObj.on('load', () => {
    // 20 km radius ring
    mapObj.addSource('radius', { type:'geojson', data: generateCircle(MAP_CENTER.lng, MAP_CENTER.lat, 20) });
    mapObj.addLayer({ id:'radius-fill', type:'fill', source:'radius',
      paint:{ 'fill-color':'#C4521A', 'fill-opacity':0.05 }
    });
    mapObj.addLayer({ id:'radius-line', type:'line', source:'radius',
      paint:{ 'line-color':'#C4521A', 'line-width':1.5, 'line-dasharray':[4,3], 'line-opacity':0.6 }
    });

    // Home dot
    const homeDot = document.createElement('div');
    homeDot.className = 'home-dot-marker';
    new maplibregl.Marker({ element:homeDot, anchor:'center' })
      .setLngLat([MAP_CENTER.lng, MAP_CENTER.lat])
      .addTo(mapObj);

    // POI markers
    CATEGORIES.forEach(cat => {
      markersByCategory[cat.id] = [];
      POI_DATA[cat.id].forEach(poi => {
        const el = document.createElement('div');
        el.className = 'poi-marker';
        el.style.background = cat.bg;
        el.style.borderColor = cat.color;
        el.innerHTML = ic(cat.icon, cat.color, 14, 1.5);

        const popup = new maplibregl.Popup({ offset:18, closeButton:true, maxWidth:'200px' })
          .setHTML(`<div style="font-family:'DM Sans',sans-serif;">
            <div style="font-size:13px;font-weight:500;color:#1A1714;margin-bottom:3px;">${poi.name}</div>
            <div style="font-size:11px;color:#6B6560;line-height:1.4;">${poi.addr}</div>
            ${poi.phone !== '–' ? `<div style="font-size:12px;color:${cat.color};margin-top:6px;font-weight:500;">📞 ${poi.phone}</div>` : ''}
          </div>`);

        const marker = new maplibregl.Marker({ element:el, anchor:'center' })
          .setLngLat([poi.lng, poi.lat])
          .setPopup(popup)
          .addTo(mapObj);

        markersByCategory[cat.id].push(marker);
      });
    });

    updateInfoBar();
  });
}

function toggleCategory(id) {
  if (activeCategories.has(id)) {
    activeCategories.delete(id);
  } else {
    activeCategories.add(id);
  }
  CATEGORIES.forEach(cat => {
    const visible = activeCategories.has(cat.id);
    (markersByCategory[cat.id] || []).forEach(m => {
      m.getElement().style.display = visible ? 'flex' : 'none';
    });
  });
  document.querySelectorAll('.map-filter-chip').forEach(chip => {
    const cid = chip.dataset.cat;
    const cat = CATEGORIES.find(c => c.id === cid);
    if (!cat) return;
    chip.classList.toggle('dimmed', !activeCategories.has(cid));
    if (activeCategories.has(cid)) {
      chip.style.background = cat.bg;
      chip.style.borderColor = cat.color;
      chip.style.color = cat.color;
    }
  });
  updateInfoBar();
}

function updateInfoBar() {
  const bar = document.getElementById('map-info-bar');
  if (!bar) return;
  const total = [...activeCategories].reduce((sum, id) => sum + (POI_DATA[id]?.length || 0), 0);
  bar.textContent = `${total} Standorte sichtbar · ${MAP_CENTER.name || (MAP_CENTER.lat.toFixed(4) + ", " + MAP_CENTER.lng.toFixed(4))} · 20 km`;
}

  <div class="divider"></div>
  ${sections}
  <button class="save-btn" onclick="A.savePlan()">${C.ui.plan_save_button}</button>
  <div class="saved-msg" id="saved-msg">${C.ui.plan_saved_message}</div>
</div>
${navBar()}</div>`;
}

// ============================================================
// ACTIONS
// ============================================================
const A = {
  findScenario(key) {
    return C.scenarios.find(x => x.key === key)
        || (C.scenarios_secondary || []).find(x => x.key === key);
  },
  showScenario(key) {
    const s = this.findScenario(key);
    if (!s) return;
    state.scenario = key;
    document.getElementById('scenario-title').textContent = s.name;
    const tabs = document.getElementById('section-tabs');
    tabs.innerHTML = s.sections.map((sec,i) =>
      `<button class="tab-btn${i===0?' active':''}" onclick="A.switchTab(${i})">${C.ui.tab_labels[i]||('Tab '+(i+1))}</button>`).join('');
    this.renderTab(s, 0);
    const chips = document.getElementById('related-chips');
    chips.innerHTML = (s.related||[]).map(r => {
      const rel = this.findScenario(r);
      return rel ? `<div class="related-chip" onclick="A.showScenario('${r}')">${rel.name}</div>` : '';
    }).join('');
    showScreen('scenario');
  },

  switchTab(i) {
    const s = this.findScenario(state.scenario);
    if (!s) return;
    state.tab = i;
    document.querySelectorAll('#section-tabs .tab-btn').forEach((b,j) => b.classList.toggle('active', j===i));
    this.renderTab(s, i);
    document.querySelector('#screen-scenario .scroll-area').scrollTop = 0;
  },

  renderTab(s, i) {
    const sec = s.sections[i];
    if (!sec) return;
    const el = document.getElementById('scenario-content');
    el.innerHTML = `<div class="section-heading">${C.ui.tab_full_labels[i]||''}</div>` + this.renderSection(sec);
  },

  renderSection(sec) {
    if (sec.type === 'text' || sec.type === 'text_warning') {
      let html = `<div class="section-body">${sec.paragraphs.map(p=>`<p>${p}</p>`).join('')}</div>`;
      if (sec.warning) html += `<div class="warning-box">${sec.warning}</div>`;
      return html;
    }
    if (sec.type === 'text_plan') {
      let html = `<div class="section-body">${sec.paragraphs.map(p=>`<p>${p}</p>`).join('')}</div>`;
      if (sec.plan_ref) {
        const v = state.planValues[sec.plan_ref] || '';
        html += `<div style="background:var(--accent-light);border-radius:var(--radius-sm);padding:11px 13px;margin-top:12px;font-size:13px;">
          <span style="color:var(--text2);">Dein Treffpunkt: </span>
          <span data-plan-preview="${sec.plan_ref}" style="color:${v?'var(--green)':'var(--accent)'};">${v||C.ui.plan_ref_not_entered}</span>
        </div>`;
      }
      return html;
    }
    if (sec.type === 'steps') {
      let html = `<ul class="steps">${sec.steps.map((s,i)=>`<li class="step"><div class="step-num">${i+1}</div><div class="step-text">${s}</div></li>`).join('')}</ul>`;
      if (sec.warning) html += `<div class="warning-box">${sec.warning}</div>`;
      return html;
    }
    if (sec.type === 'stay_go') {
      let rows = '';
      if (sec.go_only) {
        rows = `<div class="stay-go-row"><span class="badge badge-go">${sec.go.label}</span><span class="stay-go-text">${sec.go.text}</span></div>`;
        if (sec.note) rows += `<div class="stay-go-row"><span class="badge badge-warning">${sec.note.label}</span><span class="stay-go-text">${sec.note.text}</span></div>`;
      } else {
        rows = `<div class="stay-go-row"><span class="badge badge-stay">${sec.stay.label}</span><span class="stay-go-text">${sec.stay.text}</span></div>
                <div class="stay-go-row"><span class="badge badge-go">${sec.go.label}</span><span class="stay-go-text">${sec.go.text}</span></div>`;
        if (sec.warning) rows += `<div class="warning-box">${sec.warning}</div>`;
      }
      return `<div class="stay-go">${rows}</div>`;
    }
    if (sec.type === 'kit_ref') {
      const allItems = [...C.kit.items_included, ...C.kit.items_personal];
      const items = sec.items.map(key => {
        const it = allItems.find(x => x.icon === key);
        return it ? `<div class="kit-item" style="cursor:default;">
          <div class="kit-icon-wrap">${ic(it.icon,it.color,22)}</div>
          <span class="kit-name">${it.label}</span>
        </div>` : '';
      }).join('');
      return `<div class="section-body"><p>Hol diese Sachen aus deinem Kit:</p></div><div class="kit-full-card kit-items" style="margin-top:4px;">${items}</div>`;
    }
    return '';
  },

  toggleKit(item) {
    const check = item.querySelector('.kit-check');
    check.classList.toggle('checked');
    this.updateKitProgress();
    this.saveKitState();
  },

  saveKitState() {
    try {
      const checks = [...document.querySelectorAll('#screen-kit .kit-item')].map(item => ({
        label: item.querySelector('.kit-name').textContent,
        checked: item.querySelector('.kit-check').classList.contains('checked')
      }));
      localStorage.setItem('rustenburgh_kit', JSON.stringify(checks));
    } catch(e) {}
  },

  updateKitProgress() {
    const all = document.querySelectorAll('#screen-kit .kit-check');
    const done = document.querySelectorAll('#screen-kit .kit-check.checked');
    const pct = Math.round((done.length / all.length) * 100);
    if (document.getElementById('kit-progress-bar')) {
      document.getElementById('kit-progress-bar').style.width = pct + '%';
      document.getElementById('kit-count-label').textContent = `${done.length} ${C.ui.kit_progress_of} ${all.length} ${C.ui.kit_progress_done}`;
      document.getElementById('kit-percent-label').textContent = pct + '%';
      const hint = document.getElementById('kit-nav-hint');
      if (hint) { hint.textContent = pct===100 ? C.ui.kit_nav_complete : `${done.length} ${C.ui.kit_progress_of} ${all.length}`; hint.className = pct===100 ? 'nav-card-hint ok' : 'nav-card-hint'; }
    }
  },

  toggleHilfe(card) { card.classList.toggle('open'); },

  toggleHilfeSub(e, card) {
    e.stopPropagation();
    card.classList.toggle('open');
  },

  toggleWeitere() {
    const list = document.getElementById('weitere-list');
    const toggle = document.getElementById('weitere-toggle');
    if (!list || !toggle) return;
    list.classList.toggle('open');
    toggle.classList.toggle('open');
  },

  updatePreview() {
    const allFields = C.plan_fields.flatMap(s => s.fields);
    allFields.forEach(f => {
      const input = document.getElementById(`plan-${f.id}`);
      if (!input) return;
      state.planValues[f.id] = input.value;
      if (f.preview) {
        const el = document.getElementById(`preview-${f.id}`);
        if (el) { el.textContent = input.value || C.ui.plan_not_entered; el.className = 'plan-val ' + (input.value ? 'filled' : 'empty'); }
      }
    });
    document.querySelectorAll('[data-plan-preview]').forEach(el => {
      const key = el.dataset.planPreview;
      const val = state.planValues[key] || '';
      el.textContent = val || C.ui.plan_ref_not_entered;
      el.style.color = val ? 'var(--green)' : 'var(--accent)';
    });
  },

  savePlan() {
    this.updatePreview();
    const required = C.plan_fields.flatMap(s => s.fields).filter(f => f.preview);
    const missing = required.filter(f => !state.planValues[f.id]?.trim()).length;
    const hint = document.getElementById('plan-nav-hint');
    if (hint) {
      hint.textContent = missing === 0 ? C.ui.plan_complete : `${missing} ${missing===1 ? C.ui.plan_missing_singular : C.ui.plan_missing_plural}`;
      hint.className = missing === 0 ? 'nav-card-hint ok' : 'nav-card-hint warn';
    }
    try { localStorage.setItem('rustenburgh_plan', JSON.stringify(state.planValues)); } catch(e) {}
    const msg = document.getElementById('saved-msg');
    if (msg) { msg.style.display = 'block'; setTimeout(() => msg.style.display = 'none', 3000); }
  },

  ninaAlert() {
    alert(`${C.ui.alert_popup_title}\n\n${C.ui.alert_popup_body}`);
  }
};

// ============================================================
// RESTORE FROM STORAGE
// ============================================================
function restoreFromStorage() {
  try {
    const saved = localStorage.getItem('rustenburgh_plan');
    if (saved) {
      const values = JSON.parse(saved);
      Object.entries(values).forEach(([id, val]) => {
        const input = document.getElementById(`plan-${id}`);
        if (input && val) { input.value = val; state.planValues[id] = val; }
      });
      A.updatePreview();
      const required = C.plan_fields.flatMap(s => s.fields).filter(f => f.preview);
      const missing = required.filter(f => !state.planValues[f.id]?.trim()).length;
      const hint = document.getElementById('plan-nav-hint');
      if (hint) {
        hint.textContent = missing === 0 ? C.ui.plan_complete : `${missing} ${missing===1 ? C.ui.plan_missing_singular : C.ui.plan_missing_plural}`;
        hint.className = missing === 0 ? 'nav-card-hint ok' : 'nav-card-hint warn';
      }
    }
  } catch(e) {}
  try {
    const saved = localStorage.getItem('rustenburgh_kit');
    if (saved) {
      const checks = JSON.parse(saved);
      const kitItems = [...document.querySelectorAll('#screen-kit .kit-item')];
      checks.forEach(({ label, checked }) => {
        const item = kitItems.find(el => el.querySelector('.kit-name').textContent === label);
        if (item && checked) {
          const c = item.querySelector('.kit-check');
          c.classList.add('checked');
          c.innerHTML = ic('check','white',13);
        }
      });
      A.updateKitProgress();
    }
  } catch(e) {}
}

init();
</script>
</body>
</html>
