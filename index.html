<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="robots" content="noindex, nofollow">
<!-- CHANGE: removed maximum-scale=1.0 — blocked user zoom, WCAG 1.4.4 failure -->
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rustenburgh — Karte Mockup</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#F6F3EE;--bg2:#FFFFFF;--bg3:#EDEAE4;--text:#1A1714;--text2:#6B6560;--text3:#716A63;--accent:#C4521A;--accent-light:#F9EDE5;--green:#3D6B4A;--green-light:#E8F2EB;--red:#B03A2E;--red-light:#FAECEA;--amber:#A0720A;--amber-light:#FDF3DC;--blue:#2560A0;--blue-light:#E8F0FB;--border:rgba(26,23,20,0.1);--border2:rgba(26,23,20,0.06);--shadow:0 1px 3px rgba(26,23,20,0.07),0 4px 16px rgba(26,23,20,0.04);--radius:14px;--radius-sm:9px;--font-display:'Playfair Display',Georgia,serif;--font-body:'DM Sans',-apple-system,BlinkMacSystemFont,sans-serif;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:var(--font-body);background:#C8C4BE;display:flex;justify-content:center;align-items:flex-start;min-height:100vh;padding:28px 16px;}
.phone{width:393px;min-height:852px;background:var(--bg);border-radius:48px;overflow:hidden;box-shadow:0 24px 72px rgba(0,0,0,0.28),0 0 0 1px rgba(0,0,0,0.12);position:relative;display:flex;flex-direction:column;height:852px;}
/* CHANGE: safe-area-inset-top for notch/Dynamic Island */
.status-bar{background:var(--bg);padding:calc(16px + env(safe-area-inset-top,0px)) 26px 8px;display:flex;justify-content:space-between;align-items:center;font-size:12px;font-weight:500;color:var(--text);flex-shrink:0;}
.status-icons{display:flex;align-items:center;gap:5px;}
/* CHANGE: alert-bar is now a <button>; cursor/border/background/width reset needed */
button.alert-bar{width:100%;background:var(--accent);padding:9px 18px;display:flex;align-items:center;gap:10px;cursor:pointer;transition:background .18s;flex-shrink:0;border:none;font-family:var(--font-body);text-align:left;-webkit-appearance:none;appearance:none;}
button.alert-bar:hover{background:#B5481A;}
.alert-pulse{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,0.95);flex-shrink:0;animation:pulse 2.2s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.4;transform:scale(0.85)}}
.alert-text{font-size:12px;color:rgba(255,255,255,0.95);line-height:1.35;flex:1;}
#app-screens{flex:1;display:flex;flex-direction:column;overflow:hidden;min-height:0;}
.screen{display:none;flex-direction:column;flex:1;overflow:hidden;min-height:0;}
.screen.active{display:flex;}
.scroll-area{overflow-y:auto;flex:1;-webkit-overflow-scrolling:touch;scroll-padding-bottom:calc(72px + env(safe-area-inset-bottom,0px));}
.scroll-area::-webkit-scrollbar{display:none;}
.top-bar{padding:14px 18px 12px;display:flex;align-items:center;gap:12px;background:var(--bg);border-bottom:0.5px solid var(--border);flex-shrink:0;}
/* CHANGE: back-btn is already a button, adding focus-visible */
.back-btn{width:34px;height:34px;border-radius:50%;background:var(--bg3);border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text);flex-shrink:0;transition:background .15s;}
.back-btn:hover{background:var(--border);}
.top-bar-title{font-family:var(--font-display);font-size:18px;font-weight:600;color:var(--text);}
.top-bar-sub{font-size:11px;color:var(--text3);margin-top:1px;}
.brand-header{padding:22px 20px 14px;background:var(--bg);}
.brand-name{font-family:var(--font-display);font-size:26px;font-weight:600;color:var(--text);letter-spacing:-0.5px;}
.brand-tagline-de{font-size:13px;color:var(--text2);margin-top:3px;line-height:1.4;}
.brand-tagline-en{font-size:11px;color:var(--text3);margin-top:2px;font-style:italic;}
.nav-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:0 16px 14px;}
/* CHANGE: nav-card is now a <button>; reset button defaults while keeping visual styles */
button.nav-card{background:var(--bg2);border-radius:var(--radius);padding:16px 14px 14px;border:0.5px solid var(--border2);cursor:pointer;transition:transform .14s,box-shadow .14s;box-shadow:var(--shadow);font-family:var(--font-body);text-align:left;-webkit-appearance:none;appearance:none;color:inherit;width:100%;}
button.nav-card:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(26,23,20,0.1);}
button.nav-card:active{transform:scale(0.975);}
button.nav-card.alert-card{border-color:rgba(196,82,26,0.25);}
.nav-icon-wrap{width:40px;height:40px;border-radius:11px;display:flex;align-items:center;justify-content:center;margin-bottom:11px;}
.nav-card-label{font-size:13px;font-weight:500;color:var(--text);}
.nav-card-hint{font-size:11px;color:var(--text3);margin-top:3px;}
.nav-card-hint.warn{color:var(--accent);}
.nav-card-hint.ok{color:var(--green);}
/* CHANGE: map-preview-card is now a <button> */
button.map-preview-card{display:flex;align-items:center;gap:14px;padding:14px 16px;margin:0 16px 14px;background:var(--bg2);border-radius:var(--radius);border:0.5px solid rgba(196,82,26,0.2);cursor:pointer;transition:transform .14s,box-shadow .14s;box-shadow:var(--shadow);position:relative;overflow:hidden;width:calc(100% - 32px);font-family:var(--font-body);text-align:left;-webkit-appearance:none;appearance:none;color:inherit;}
button.map-preview-card:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(26,23,20,0.1);}
button.map-preview-card:active{transform:scale(0.99);}
button.map-preview-card .nav-icon-wrap{margin-bottom:0;flex-shrink:0;}
.map-preview-bg{position:absolute;right:-10px;top:50%;transform:translateY(-50%);opacity:0.06;font-size:80px;pointer-events:none;}
/* CHANGE: plan-preview is now a <button> */
button.plan-preview{margin:0 16px 14px;background:var(--bg2);border-radius:var(--radius);padding:14px 16px;border:0.5px solid var(--border2);box-shadow:var(--shadow);cursor:pointer;width:calc(100% - 32px);font-family:var(--font-body);text-align:left;-webkit-appearance:none;appearance:none;color:inherit;}
.plan-preview-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:11px;}
.plan-preview-title{font-size:11px;font-weight:500;color:var(--text2);text-transform:uppercase;letter-spacing:0.9px;}
.plan-row{display:flex;align-items:center;justify-content:space-between;padding:6px 0;border-bottom:0.5px solid var(--border2);}
.plan-row:last-child{border-bottom:none;}
.plan-key{font-size:12px;color:var(--text2);}
.plan-val{font-size:12px;font-weight:500;}
.plan-val.empty{color:var(--accent);}
.plan-val.filled{color:var(--green);}
.tip-card{margin:0 16px 6px;background:var(--green-light);border-radius:var(--radius);padding:14px 16px;border:0.5px solid rgba(61,107,74,0.18);display:flex;gap:12px;align-items:flex-start;}
.tip-title{font-size:12px;font-weight:500;color:var(--green);margin-bottom:3px;}
.tip-text{font-size:12px;color:var(--text);line-height:1.5;}
.scenario-list{padding:8px 0 16px;}
.scenario-section-label{font-size:11px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:0.9px;padding:12px 20px 6px;}
/* CHANGE: scenario-item is now a <button> */
button.scenario-item{display:flex;align-items:center;padding:13px 20px;border:none;border-bottom:0.5px solid var(--border2);transition:background .13s;gap:14px;background:transparent;width:100%;font-family:var(--font-body);text-align:left;cursor:pointer;-webkit-appearance:none;appearance:none;color:inherit;}
button.scenario-item:hover{background:var(--bg3);}
.scenario-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.scenario-info{flex:1;}
.scenario-name{font-size:14px;font-weight:500;color:var(--text);}
.scenario-desc{font-size:11px;color:var(--text3);margin-top:2px;}
/* CHANGE: scenario-overflow is now a <button> */
button.scenario-overflow{background:var(--bg3);border-bottom:none;margin:8px 16px 0;border-radius:var(--radius-sm);padding:13px 16px;border:0.5px dashed var(--border);width:calc(100% - 32px);}
button.scenario-overflow:hover{background:var(--bg2);}
button.scenario-overflow .scenario-icon{width:28px;height:28px;border-radius:8px;background:var(--bg2);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
button.scenario-overflow .scenario-toggle{transition:transform .22s ease;color:var(--text3);}
button.scenario-overflow.open .scenario-toggle{transform:rotate(180deg);}
.weitere-list{display:none;}
.weitere-list.open{display:block;animation:fadeIn .22s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateY(-4px);}to{opacity:1;transform:translateY(0);}}
button.scenario-item.secondary-item{padding-left:32px;background:rgba(255,255,255,0.4);}
button.scenario-item.secondary-item .scenario-dot{width:7px;height:7px;opacity:0.7;}
button.scenario-item.secondary-item .scenario-name{font-weight:400;}
.section-tabs{display:flex;overflow-x:auto;padding:10px 14px;gap:6px;background:var(--bg);border-bottom:0.5px solid var(--border);flex-shrink:0;}
.section-tabs::-webkit-scrollbar{display:none;}
/* CHANGE: tab-btn already a button, add role/aria in JS */
.tab-btn{flex-shrink:0;padding:5px 11px;border-radius:20px;border:0.5px solid var(--border);background:var(--bg2);font-size:11px;color:var(--text2);cursor:pointer;font-family:var(--font-body);transition:all .14s;white-space:nowrap;}
.tab-btn.active,.tab-btn[aria-selected="true"]{background:var(--text);color:var(--bg);border-color:var(--text);font-weight:500;}
.tab-btn:hover:not(.active):not([aria-selected="true"]){background:var(--bg3);}
.section-content{padding:20px 20px 8px;}
.section-heading{font-size:11px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:0.9px;margin-bottom:13px;}
.section-body{font-size:14px;line-height:1.72;color:var(--text);}
.section-body p{margin-bottom:10px;}
.section-body p:last-child{margin-bottom:0;}
.steps{list-style:none;margin-bottom:4px;}
.step{display:flex;gap:11px;margin-bottom:10px;align-items:flex-start;}
.step-num{width:22px;height:22px;border-radius:50%;background:var(--accent);color:white;font-size:11px;font-weight:500;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;}
.step-text{font-size:13.5px;line-height:1.62;color:var(--text);}
.stay-go{background:var(--bg3);border-radius:var(--radius-sm);padding:13px 14px;margin-bottom:4px;}
.stay-go-row{display:flex;gap:10px;align-items:flex-start;margin-bottom:8px;}
.stay-go-row:last-child{margin-bottom:0;}
.badge{flex-shrink:0;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:500;white-space:nowrap;margin-top:2px;}
.badge-stay{background:var(--green-light);color:var(--green);}
.badge-go{background:var(--red-light);color:var(--red);}
.badge-warning{background:var(--amber-light);color:var(--amber);}
.stay-go-text{font-size:13px;line-height:1.5;color:var(--text);}
.warning-box{background:var(--amber-light);border-left:2.5px solid var(--amber);border-radius:0 var(--radius-sm) var(--radius-sm) 0;padding:11px 13px;margin:12px 0 4px;font-size:13px;line-height:1.52;color:var(--text);}
.kit-items{margin-bottom:4px;}
/* CHANGE: kit-item is now a <button> with aria-pressed */
button.kit-item{display:flex;align-items:center;gap:13px;padding:10px 0;border:none;border-bottom:0.5px solid var(--border2);cursor:pointer;width:100%;background:transparent;font-family:var(--font-body);text-align:left;-webkit-appearance:none;appearance:none;color:inherit;}
button.kit-item:last-child{border-bottom:none;}
.kit-icon-wrap{width:30px;height:30px;flex-shrink:0;display:flex;align-items:center;justify-content:center;}
.kit-name{font-size:13px;color:var(--text);flex:1;line-height:1.4;}
.kit-check{width:21px;height:21px;border-radius:6px;border:1.5px solid #BCBAB6;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s;background:var(--bg2);}
.kit-check.checked{background:var(--green);border-color:var(--green);}
/* Non-interactive kit item (kit_ref display only) */
.kit-item-display{display:flex;align-items:center;gap:13px;padding:10px 0;border-bottom:0.5px solid var(--border2);}
.kit-item-display:last-child{border-bottom:none;}
.related-section{padding:16px 20px;border-top:0.5px solid var(--border2);}
.related-title{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:0.9px;margin-bottom:10px;}
.related-chips{display:flex;flex-wrap:wrap;gap:7px;}
/* CHANGE: related-chip is now a <button> */
button.related-chip{padding:6px 12px;background:var(--bg3);border-radius:20px;font-size:12px;color:var(--text2);cursor:pointer;border:0.5px solid var(--border);transition:background .13s;font-family:var(--font-body);-webkit-appearance:none;appearance:none;}
button.related-chip:hover{background:var(--border);}
.kit-full-section{padding:16px 18px 6px;}
.kit-full-title{font-size:11px;font-weight:500;color:var(--text2);text-transform:uppercase;letter-spacing:0.9px;margin-bottom:11px;}
.kit-full-card{background:var(--bg2);border-radius:var(--radius);padding:4px 16px;border:0.5px solid var(--border);margin-bottom:10px;box-shadow:var(--shadow);}
.kit-progress-label{font-size:12px;color:var(--text2);margin:12px 18px 7px;display:flex;justify-content:space-between;}
.kit-progress{margin:0 18px 16px;background:var(--bg3);border-radius:20px;height:5px;overflow:hidden;}
.kit-progress-bar{height:100%;background:var(--green);border-radius:20px;transition:width .35s ease;}
.plan-section{padding:18px 18px 6px;}
.plan-section-title{font-family:var(--font-display);font-size:16px;font-weight:600;color:var(--text);margin-bottom:4px;}
.plan-section-desc{font-size:12px;color:var(--text2);margin-bottom:16px;line-height:1.55;}
.field-group{margin-bottom:13px;}
/* CHANGE: field-label is now rendered as <label> in JS */
.field-label{font-size:11px;font-weight:500;color:var(--text2);text-transform:uppercase;letter-spacing:0.7px;margin-bottom:6px;display:block;}
.field-input{width:100%;padding:11px 13px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--bg2);font-family:var(--font-body);font-size:14px;color:var(--text);outline:none;transition:border-color .15s;}
.field-input:focus{border-color:var(--accent);}
.field-input::placeholder{color:var(--text3);}
.field-hint{font-size:11px;color:var(--text3);margin-top:4px;line-height:1.45;}
.save-btn{width:calc(100% - 36px);margin:10px 18px 18px;padding:14px;background:var(--text);color:var(--bg);border:none;border-radius:var(--radius);font-family:var(--font-body);font-size:14px;font-weight:500;cursor:pointer;transition:background .15s;}
.save-btn:hover{background:#2A2623;}
.saved-msg{text-align:center;font-size:12px;color:var(--green);padding-bottom:4px;display:none;}
.divider{height:0.5px;background:var(--border2);margin:0 18px;}
/* CHANGE: hilfe-card is a container; header becomes a <button> */
.hilfe-card{margin:0 16px 10px;background:var(--bg2);border-radius:var(--radius);overflow:hidden;border:0.5px solid var(--border);box-shadow:var(--shadow);}
/* CHANGE: hilfe-card-header is now a <button> */
button.hilfe-card-header{padding:14px 16px;display:flex;align-items:center;justify-content:space-between;gap:12px;width:100%;background:transparent;border:none;font-family:var(--font-body);cursor:pointer;text-align:left;-webkit-appearance:none;appearance:none;color:inherit;transition:background .15s;}
button.hilfe-card-header:hover{background:var(--bg3);}
.hilfe-card-icon{width:36px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.hilfe-card-info{flex:1;}
.hilfe-card-title{font-size:14px;font-weight:500;color:var(--text);}
.hilfe-card-sub{font-size:11px;color:var(--text3);margin-top:2px;}
.hilfe-toggle{color:var(--text3);transition:transform .2s;flex-shrink:0;}
.hilfe-card.open .hilfe-toggle{transform:rotate(180deg);}
.hilfe-body{display:none;padding:4px 16px 16px;border-top:0.5px solid var(--border2);}
.hilfe-card.open .hilfe-body{display:block;}
.hilfe-step{display:flex;gap:10px;padding:8px 0;border-bottom:0.5px solid var(--border2);align-items:flex-start;}
.hilfe-step:last-child{border-bottom:none;}
.hilfe-num{width:24px;height:24px;border-radius:50%;background:var(--red-light);color:var(--red);font-size:11px;font-weight:600;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px;}
.hilfe-text{font-size:13px;line-height:1.52;color:var(--text);padding-top:3px;}
.fast-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px;}
.fast-item{background:var(--red-light);border-radius:var(--radius-sm);padding:11px 12px;}
.fast-letter{font-family:var(--font-display);font-size:22px;font-weight:600;color:var(--red);}
.fast-word{font-size:11px;font-weight:500;color:var(--red);margin-top:1px;}
.fast-desc{font-size:11px;color:var(--text2);margin-top:4px;line-height:1.4;}
.hilfe-card.group-card{background:var(--bg);border:0.5px dashed var(--border);box-shadow:none;}
.hilfe-card.group-card .hilfe-card-icon{background:var(--bg3);}
.hilfe-card.group-card.open .hilfe-card-icon{background:var(--accent-light);}
.hilfe-group{margin-top:14px;}
.hilfe-group:first-child{margin-top:4px;}
.hilfe-group-label{font-size:11px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:0.8px;display:flex;align-items:center;gap:7px;padding:6px 4px 9px;}
/* CHANGE: hilfe-sub-card container; header becomes a <button> */
.hilfe-sub-card{background:var(--bg2);border-radius:var(--radius-sm);border:0.5px solid var(--border2);margin-bottom:6px;overflow:hidden;}
.hilfe-sub-card:last-child{margin-bottom:0;}
/* CHANGE: hilfe-sub-header is now a <button> */
button.hilfe-sub-header{padding:10px 12px;display:flex;align-items:center;gap:10px;width:100%;background:transparent;border:none;font-family:var(--font-body);cursor:pointer;text-align:left;-webkit-appearance:none;appearance:none;color:inherit;}
.hilfe-sub-icon{width:28px;height:28px;border-radius:7px;background:var(--red-light);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.hilfe-sub-info{flex:1;min-width:0;}
.hilfe-sub-title{font-size:13px;font-weight:500;color:var(--text);}
/* CHANGE: hilfe-sub-desc font-size raised from 10.5px to 11px */
.hilfe-sub-desc{font-size:11px;color:var(--text3);margin-top:1px;}
.hilfe-sub-toggle{color:var(--text3);transition:transform .2s;flex-shrink:0;}
.hilfe-sub-card.open .hilfe-sub-toggle{transform:rotate(180deg);}
.hilfe-sub-body{display:none;padding:0 12px 12px 50px;}
.hilfe-sub-card.open .hilfe-sub-body{display:block;}
.hilfe-sub-step{display:flex;gap:9px;padding:6px 0;align-items:flex-start;border-bottom:0.5px solid var(--border2);}
.hilfe-sub-step:last-child{border-bottom:none;}
.hilfe-sub-num{width:18px;height:18px;border-radius:50%;background:var(--red-light);color:var(--red);font-size:10px;font-weight:600;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px;}
.hilfe-sub-text{font-size:12px;line-height:1.5;color:var(--text);}
/* CHANGE: bottom-nav is now a <nav>; safe-area-inset-bottom for home indicator */
nav.bottom-nav{display:flex;background:var(--bg2);border-top:0.5px solid var(--border);padding:8px 0 calc(22px + env(safe-area-inset-bottom,0px));flex-shrink:0;}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;padding:5px 0;cursor:pointer;background:none;border:none;font-family:var(--font-body);transition:opacity .13s;}
.nav-btn:active{opacity:0.55;}
/* CHANGE: nav-btn-label font-size raised from 9.5px to 11px */
.nav-btn-label{font-size:11px;color:var(--text3);font-weight:400;}
.nav-btn.active .nav-btn-label{color:var(--accent);font-weight:500;}
/* CHANGE: global focus-visible ring for keyboard accessibility */
:focus-visible{outline:2px solid var(--accent);outline-offset:2px;}
[tabindex="-1"]:focus-visible{outline:none;}

/* =========================================
   MAP SCREEN STYLES
   ========================================= */
.map-filter-bar{display:flex;overflow-x:auto;padding:8px 12px;gap:6px;background:var(--bg);border-bottom:0.5px solid var(--border);flex-shrink:0;-webkit-overflow-scrolling:touch;}
.map-filter-bar::-webkit-scrollbar{display:none;}
/* CHANGE: map-filter-chip is already a <button>; add font-family reset */
button.map-filter-chip{flex-shrink:0;padding:5px 10px;border-radius:20px;border:1px solid;font-size:11px;font-family:var(--font-body);font-weight:500;cursor:pointer;white-space:nowrap;transition:all .14s;display:flex;align-items:center;gap:4px;-webkit-appearance:none;appearance:none;}
button.map-filter-chip.dimmed{background:var(--bg2)!important;border-color:var(--border)!important;color:var(--text3)!important;opacity:0.65;}
.screen-map-inner{flex:1;position:relative;min-height:0;}
#map{position:absolute;top:0;left:0;right:0;bottom:0;}
.map-offline-badge{margin-left:auto;padding:3px 9px;background:var(--green-light);color:var(--green);border-radius:20px;font-size:11px;font-weight:500;flex-shrink:0;}
.chip-count{display:inline-block;background:rgba(0,0,0,0.09);border-radius:8px;padding:0 5px;font-size:9.5px;margin-left:3px;font-weight:600;line-height:16px;}
button.map-filter-chip.dimmed .chip-count{background:rgba(0,0,0,0.06);}
.map-count-bar{padding:7px 14px 6px;display:flex;align-items:center;justify-content:space-between;background:var(--bg);border-bottom:0.5px solid var(--border);flex-shrink:0;}
.map-count-total{font-family:var(--font-display);font-size:15px;font-weight:600;color:var(--text);letter-spacing:-0.2px;}
.map-count-total span{color:var(--accent);}
.map-count-sub{font-size:10.5px;color:var(--text3);}
.map-count-radius{display:flex;align-items:center;gap:5px;font-size:10.5px;color:var(--text2);background:var(--bg2);border:0.5px solid var(--border);border-radius:12px;padding:3px 9px;}
/* CHANGE: map-attribution font-size raised from 9px to 11px */
.map-attribution{position:absolute;bottom:8px;right:8px;font-size:11px;color:rgba(26,23,20,0.5);background:rgba(255,255,255,0.82);padding:2px 7px;border-radius:4px;pointer-events:none;z-index:10;font-family:var(--font-body);}
.map-center-dot{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:10px;height:10px;background:var(--accent);border-radius:50%;border:2px solid white;box-shadow:0 0 0 4px rgba(196,82,26,0.2);pointer-events:none;z-index:5;}
/* CHANGE: map-info-bar font-size raised from 10px to 11px */
.map-info-bar{position:absolute;top:10px;left:50%;transform:translateX(-50%);background:rgba(255,255,255,0.92);border-radius:20px;padding:4px 12px;font-size:11px;color:var(--text2);font-family:var(--font-body);pointer-events:none;z-index:10;backdrop-filter:blur(4px);border:0.5px solid var(--border);white-space:nowrap;}

/* MapLibre overrides — !important needed to beat vendor specificity */
.maplibregl-popup-content{font-family:var(--font-body)!important;border-radius:10px!important;padding:10px 12px!important;box-shadow:0 4px 20px rgba(0,0,0,0.13)!important;border:0.5px solid var(--border)!important;}
.maplibregl-popup-close-button{font-size:16px;color:var(--text3);top:4px;right:6px;}
.maplibregl-ctrl-attrib{display:none!important;}
.maplibregl-ctrl-logo{display:none!important;}
.maplibregl-ctrl-bottom-right,.maplibregl-ctrl-bottom-left{display:none!important;}

.poi-marker{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,0.18);transition:transform .15s;border:1.5px solid;}
.poi-marker:hover{transform:scale(1.18);}
.home-dot-marker{width:12px;height:12px;border-radius:50%;background:var(--accent);border:2.5px solid white;box-shadow:0 0 0 4px rgba(196,82,26,0.22),0 2px 8px rgba(196,82,26,0.3);cursor:default;}

@media(max-width:430px){body{padding:0;background:var(--bg);}.phone{width:100%;border-radius:0;min-height:100vh;height:auto;box-shadow:none;}.screen{height:auto;}.screen-map-inner{height:400px;position:relative;flex:none;}}

lich","Nicht aufhören bis Rettungsdienst übernimmt"]},{"icon":"brain","title":"Schlaganfall erkennen","subtitle":"FAST-Test und sofort 112","type":"fast","fast":[{"letter":"F","word":"Face","desc":"Gesicht hängt auf einer Seite?"},{"letter":"A","word":"Arms","desc":"Arm kann nicht gehalten werden?"},{"letter":"S","word":"Speech","desc":"Sprache verwaschen oder weg?"},{"letter":"T","word":"Time","desc":"Sofort 112 anrufen"}]},{"icon":"bandage","title":"Starke Blutung stoppen","subtitle":"Druck ausüben und Blutverlust bremsen","type":"steps","steps":["Einmalhandschuhe anziehen wenn verfügbar","Sauberste verfügbare Materialien direkt auf die Wunde drücken","Fest und dauerhaft Druck halten — nicht nachschauen","Wundverband aus dem Kit verwenden wenn vorhanden","112 anrufen falls noch nicht geschehen"]},{"icon":"activity","title":"Herzinfarkt erkennen","subtitle":"Brustschmerz, Atemnot, Schweißausbruch","type":"text","paragraphs":["Drückende Schmerzen in der Brust, ausstrahlend in den linken Arm, Kiefer oder Rücken. Begleitet von Übelkeit, Schweißausbruch oder Kurzatmigkeit.","Sofort 112 anrufen. Person hinsetzen oder hinlegen. Nicht allein lassen."]},{"icon":"lungs","title":"Atemnot","subtitle":"Wenn jemand kaum oder nicht richtig Luft bekommt","type":"steps","steps":["Person aufrecht hinsetzen — niemals flach hinlegen","Beengte Kleidung lockern (Kragen, Krawatte, Gürtel)","Beruhigend sprechen — Panik verstärkt die Atemnot stark","Asthma-Spray oder verschriebene Notfallmedikamente bereitlegen","112 anrufen wenn keine Besserung in 2 Minuten oder Lippen bläulich"]},{"icon":"choking","title":"Erstickung","subtitle":"Wenn die Atemwege blockiert sind","type":"steps","steps":["Person zum kräftigen Husten ermutigen, solange sie noch kann","Wenn Husten nicht mehr geht: 5x kräftig zwischen die Schulterblätter schlagen (Person nach vorn beugen)","Wenn nicht erfolgreich: Heimlich-Manöver — Faust zwischen Bauchnabel und Brustbein, ruckartig nach innen-oben","Im Wechsel 5 Schläge / 5 Stöße bis Gegenstand draußen ist","Bei Bewusstlosigkeit: HLW beginnen, 112 anrufen"]},{"icon":"person-collapsed","title":"Bewusstlosigkeit","subtitle":"Person reagiert nicht oder sackt zusammen","type":"steps","steps":["Laut ansprechen, vorsichtig an Schultern rütteln","Bei keiner Reaktion: sofort 112 anrufen","Atmung prüfen: Brust hebt sich? Hörst du Atem an Mund/Nase?","Bei normaler Atmung: stabile Seitenlage","Bei keiner oder nicht normaler Atmung: HLW sofort beginnen — 30 Drücke, 2 Beatmungen"]},{"icon":"grid","title":"Weitere Hilfe","subtitle":"Verbrennungen, Vergiftung, Kindernotfall und mehr","type":"group","groups":[{"title":"Verletzungen versorgen","icon":"bandage","items":[{"icon":"flame","title":"Verbrennungen","subtitle":"Kühlen, schützen, beobachten","type":"steps","steps":["10–15 Minuten unter lauwarmes Wasser — nicht eiskalt, kein Eis","Verbrannte Kleidung NICHT von der Haut ziehen wenn sie klebt","Locker mit sauberem Tuch abdecken — keine Salben, kein Mehl, kein Hausmittel","Brandblasen nicht aufstechen","112 wenn größer als die eigene Handfläche oder im Gesicht/an Genitalien"]},{"icon":"cut","title":"Schnittwunden","subtitle":"Reinigen und verbinden","type":"steps","steps":["Hände waschen oder Einmalhandschuhe anziehen","Wunde unter klares Wasser halten — Schmutz vorsichtig spülen","Mit sauberer Kompresse abdecken, Druck wenn es blutet","Pflaster oder Verband — sauber und trocken halten","112 oder 116 117 wenn tief, klafft, oder pulsierend blutet"]},{"icon":"head-alert","title":"Kopfverletzung","subtitle":"Sturz oder Schlag auf den Kopf","type":"steps","steps":["Person ruhig halten, Kopf möglichst nicht bewegen","Bei Bewusstseinsstörung, Erbrechen oder ungleichen Pupillen: sofort 112","Bei Wunde: locker abdecken, nur leichten Druck","24 Stunden beobachten — Schläfrigkeit, Sprachstörung, Sehstörung","Im Zweifel ärztlich abklären lassen — Kinder besonders"]},{"icon":"ankle","title":"Verstauchung","subtitle":"PECH-Regel","type":"steps","steps":["P — Pause: Gelenk nicht belasten","E — Eis: 15 Minuten, dann Pause, immer mit Tuch dazwischen","C — Compression: leichter elastischer Druckverband","H — Hochlagern: über Herzhöhe wenn möglich","Bei Fehlstellung, starker Schwellung oder Knacken: ärztlich abklären"]}]},{"title":"Besondere Situationen","icon":"triangle-alert","items":[{"icon":"poison","title":"Vergiftung","subtitle":"Medikamente, Chemie, Pflanzen","type":"steps","steps":["Giftnotruf anrufen — 030 19240 (Berlin) oder regionale Nummer","Was, wieviel, wann? Verpackung, Reste oder Erbrochenes aufheben","Kein Erbrechen herbeiführen — außer Notruf weist es ausdrücklich an","Keine Milch geben — kann Aufnahme mancher Stoffe beschleunigen","Bei Bewusstlosigkeit: stabile Seitenlage und 112"]},{"icon":"baby","title":"Kindernotfall","subtitle":"Kinder reagieren anders als Erwachsene","type":"steps","steps":["Ruhe bewahren — Kinder spüren Panik sofort","Bei Atemnot aufrecht halten, nicht zwingen sich hinzulegen","Bei Fieberkrampf: nichts in den Mund, weich lagern, Zeit messen","Bei Verschlucken kleiner Gegenstände: Mund inspizieren, nicht blind greifen","Im Zweifel 112 — Disponenten sind speziell auf Kinder geschult"]},{"icon":"allergy","title":"Allergie","subtitle":"Anaphylaxie kann lebensbedrohlich werden","type":"steps","steps":["Auslöser entfernen — Bienenstachel, Nahrungsrest, Medikament","Adrenalin-Pen wenn verschrieben — sofort, nicht warten und beobachten","Person flach hinlegen, Beine hoch — bei Atemnot lieber sitzen","112 anrufen — auch wenn der Pen geholfen hat, zweite Welle möglich","Bei Bewusstlosigkeit ohne Atmung: HLW sofort"]},{"icon":"lightning","title":"Krampfanfall","subtitle":"Schützen, nicht festhalten","type":"steps","steps":["Umgebung sichern — harte und scharfe Gegenstände aus dem Weg","Kopf weich polstern (Jacke, Kissen)","NICHT festhalten, NICHTS in den Mund schieben","Zeit messen — Anfall länger als 5 Minuten oder Folgeanfall: 112","Nach dem Anfall: stabile Seitenlage, ruhig zureden, dabei bleiben"]},{"icon":"thermometer-hot","title":"Hitzschlag","subtitle":"Lebensgefahr — sofort kühlen","type":"steps","steps":["Sofort in Schatten oder kühlen Raum bringen","Kleidung lockern oder ausziehen","Mit feuchten Tüchern kühlen — besonders Hals, Achseln, Leiste","Wenn ansprechbar: schluckweise Wasser","112 bei Verwirrtheit, Bewusstlosigkeit, Krampf oder hoher Körpertemperatur"]},{"icon":"thermometer-cold","title":"Unterkühlung","subtitle":"Langsam wärmen, nicht massieren","type":"steps","steps":["In trockenen, warmen Raum bringen","Nasse Kleidung vorsichtig entfernen — nicht reiben","In Decken oder Schlafsack einwickeln, Kopf bedecken","Warme süße Getränke wenn ansprechbar — kein Alkohol","112 bei Verwirrtheit, Bewusstlosigkeit oder steifen Gliedmaßen"]}]}]}],"scenarios":[{"key":"stromausfall","name":"Stromausfall","desc":"Kein Strom für Stunden oder länger","color":"#C4521A","related":["kommunikation","heizungsausfall","unwetter"],"sections":[{"type":"text","paragraphs":["Der Strom ist weg und kann Stunden bis Tage wegbleiben. Betroffen sind Heizung, Kühlschrank, Licht, Handy-Laden und meist auch Kartenzahlung.","Klingt schlimmer als es ist. Mit deinem Kit lässt sich das gut überbrücken — auch über eine Nacht."]},{"type":"text","paragraphs":["Lampen und Geräte gehen plötzlich aus. Nachbarn sind ebenfalls dunkel — es ist nicht deine Sicherung. Straßenlaternen sind aus. NINA meldet einen Ausfall für deine Region."]},{"type":"steps","steps":["Sicherungskasten prüfen — eigenen Defekt ausschließen","Kurz mit Nachbarn abgleichen, ob der Ausfall größer ist","NINA und Batterieradio öffnen — Updates laufen über UKW weiter","Kühlschrank und Gefrierschrank geschlossen halten — nicht öffnen","Allen im Haushalt ruhig sagen, was Sache ist"]},{"type":"stay_go","stay":{"label":"Bleiben","text":"Kein Frost, Wasser kommt noch, Vorräte für mindestens einen Tag, niemand auf Strom für Medizingeräte angewiesen."},"go":{"label":"Gehen","text":"Wohnung droht unter 10 °C zu fallen, jemand braucht ein elektrisches Medizingerät, Ausfall zieht sich über Tage."}},{"type":"text","paragraphs":["Eine Stirnlampe oder Laterne zentral aufstellen — punktuelles Licht reicht überraschend weit. Powerbank an, Handy in Flugzeugmodus.","Was im Kühlschrank schnell verdirbt, jetzt essen. Badewanne und Eimer mit Wasser füllen, falls Hauspumpen später ausfallen. Eine Person außerhalb der Region kurz informieren — ein Anruf, dann Ruhe."]},{"type":"kit_ref","items":["flashlight","battery-charging","radio","droplets","archive","flame"]},{"type":"text_plan","paragraphs":["SMS gehen oft durch, wenn Anrufe scheitern — verbrauchen weniger Netzkapazität. Wenn auch SMS scheitern: euer Treffpunkt aus dem Plan.","Kinder beruhigen — Kerzenschein hilft mehr als Erklärungen. Bei älteren Nachbarn kurz klingeln; sie sind oft schlechter ausgestattet."],"plan_ref":"treffpunkt"},{"type":"text_warning","paragraphs":["Lampen gehen wieder, Heizung springt an, NINA gibt Entwarnung."],"warning":"Kühlschrank prüfen: alles, was über zwei Stunden über 4 °C lag, gehört weg. Tiefkühl: wenn noch Eiskristalle dran sind, ist es OK. Kit gleich wieder auffüllen, solange du dran denkst."}]},{"key":"hochwasser","name":"Hochwasser","desc":"Wasser steigt in deiner Umgebung oder im Haus","color":"#1A6BA0","related":["evakuierung","unwetter","kommunikation"],"sections":[{"type":"text","paragraphs":["Ein Fluss, ein Bach oder die Kanalisation laufen über. Anders als die meisten Notlagen kündigt sich Hochwasser meist Stunden vorher an. Diese Stunden sind wertvoll.","Sobald Wasser ins Haus eindringt oder Straßen überflutet, schrumpfen deine Optionen schnell. Lieber zu früh handeln als zu spät."]},{"type":"text","paragraphs":["NINA sendet eine Hochwasserwarnung. Lautsprecherwagen in der Straße. Der Pegel des nahen Flusses steigt sichtbar. Nachbarn räumen Keller oder bringen Autos höher. Wasser im Keller oder am Hauseingang."]},{"type":"steps","steps":["NINA öffnen, Warnstufe für deine Postleitzahl lesen","Auto jetzt auf höheres Gelände — nicht später","Dokumente, Wertsachen, Kit, Medikamente in den obersten Stock","Strom für Erdgeschoss/Keller am Sicherungskasten abschalten, bevor Wasser kommt","Keller meiden, sobald Wasser eindringt — Stromschlag- und Einschlussgefahr"],"warning":"Niemals durch überflutete Straßen fahren. 30 cm fließendes Wasser können ein Auto wegspülen, auch ein SUV."},{"type":"stay_go","stay":{"label":"Bleiben","text":"Mehrstöckiges Haus mit trockenem Obergeschoss, keine Evakuierungsanordnung, Vorräte oben, Fluchtweg noch offen."},"go":{"label":"Gehen","text":"Behörden ordnen Evakuierung an, Wasser dringt ins Erdgeschoss, der einzige Fluchtweg könnte bald geschlossen sein, oder du wohnst ebenerdig."}},{"type":"text","paragraphs":["Bei Evakuierung mitnehmen: Kit, Dokumente, Medikamente, Handy, warme Kleidung — nicht mehr. Nur ausgewiesene Routen.","Nicht durch Hochwasser waten, wenn vermeidbar — es enthält Abwasser, Kraftstoff und manchmal scharfe Trümmer. Schäden fotografieren, sobald es sicher ist; das hilft später bei der Versicherung."]},{"type":"kit_ref","items":["package","folder","pill","droplets","radio","battery-charging","flashlight"]},{"type":"text_plan","paragraphs":["Im Notfallzentrum sofort registrieren — so finden dich getrennte Familienmitglieder. Den Kontakt außerhalb der Region informieren, dass ihr in Sicherheit seid.","Wenn die Familie verteilt ist: nicht alle versuchen, durchzukommen. Wer sicher ist, bleibt sicher."],"plan_ref":"treffpunkt"},{"type":"text_warning","paragraphs":["Behörden geben Entwarnung über NINA und Radio. Wasser ist sichtbar zurückgegangen."],"warning":"Bevor du wieder einziehst: Gas und Strom vom Fachbetrieb prüfen lassen. Schimmel- und Statikrisiko unterschätzen die meisten — bei Zweifel an der Bausubstanz nicht hineingehen."}]},{"key":"unwetter","name":"Unwetter","desc":"Sturm, Starkregen oder schwerer Schaden draußen","color":"#5A4A7A","related":["stromausfall","hochwasser","evakuierung"],"sections":[{"type":"text","paragraphs":["Ein schwerer Sturm mit hohem Wind, Starkregen oder Hagel. In Deutschland meist ein Sturmtief, gelegentlich Orkanstärke. Nach einigen Stunden bis einem Tag in der Regel vorbei.","Die meisten können das zu Hause sicher aussitzen — wenn sie drin bleiben. Draußen ist die Gefahr."]},{"type":"text","paragraphs":["DWD oder NINA sendet eine Unwetterwarnung. Wind nimmt spürbar und schnell zu. Bäume biegen sich oder knacken. Lokales Radio sendet Sicherheitsdurchsagen."]},{"type":"steps","steps":["DWD oder NINA für Schwere und Dauer prüfen","Sofort rein und drin bleiben","Fenster und Rollläden schließen","Balkon und Garten räumen — alles, was zum Geschoss werden könnte","Auto wenn möglich von Bäumen wegparken — wenn schnell, sonst lassen"]},{"type":"stay_go","stay":{"label":"Bleiben","text":"Festes Haus mit geschlossenen Fenstern. Drinnen bleiben ist beim Sturm fast immer richtig."},"go":{"label":"Gehen","text":"Dach sichtbar beschädigt, Behörden ordnen Evakuierung an, oder du bist in einem Mobilheim oder Wohnwagen."}},{"type":"text","paragraphs":["Während des Höhepunkts von Fenstern wegbleiben — Glasbruch durch Trümmer ist die häufigste Verletzung. Bei Stromausfall den Stromausfall-Plan abarbeiten.","Erst nach offiziellem Ende rausgehen, nicht in einer kurzen Flaute zwischen zwei Bändern. Auge eines Tiefs ist trügerisch."]},{"type":"kit_ref","items":["radio","flashlight","battery-charging","droplets","archive"]},{"type":"text","paragraphs":["Vor dem Höhepunkt sicherstellen, dass alle drinnen sind. Älteren Nachbarn vorher Bescheid sagen, nicht während — danach klopfen, schauen ob alles in Ordnung ist."]},{"type":"text_warning","paragraphs":["DWD hebt die Warnung auf, Wind hat deutlich und gleichmäßig nachgelassen."],"warning":"Beim Rausgehen nach oben schauen — lockerer Dachziegel, abgebrochene Äste oder beschädigte Werbeschilder fallen oft Stunden später noch. Stromleitungen am Boden niemals berühren, immer 112 melden."}]},{"key":"evakuierung","name":"Evakuierung","desc":"Behörden ordnen an, dass du gehen musst","color":"#A03A3A","related":["hochwasser","industrie","kommunikation"],"sections":[{"type":"text","paragraphs":["Behörden sagen dir, sofort zu gehen. In Deutschland passiert das öfter, als man denkt — Bomben aus dem Zweiten Weltkrieg werden mehrmals jährlich gefunden, dazu kommen Brände und Hochwasser.","Die deutsche Logistik ist gut. Dein Job ist: ruhig und schnell rausgehen."]},{"type":"text","paragraphs":["NINA-Warnung mit Evakuierungsanordnung für deine Postleitzahl. Polizei oder Feuerwehr mit Lautsprecherdurchsagen in der Straße. Lokales Radio nennt einen Radius — und deine Adresse liegt drin."]},{"type":"steps","steps":["Anordnung über NINA, Radio oder direkten Behördenkontakt bestätigen","Vorgepacktes Kit greifen — dafür ist es da","Gas, Strom und Wasser am Haupthahn abschalten","Medikamente und Dokumente mitnehmen, falls nicht im Kit","Haus abschließen und gehen — nicht zögern, nicht zurückkommen"],"warning":"Häufigster Fehler: zu lange warten. Frühes Gehen hält die Straßen frei für Rettungskräfte und schützt dich selbst."},{"type":"stay_go","go_only":true,"go":{"label":"Gehen — sofort","text":"Bei einer behördlichen Evakuierungsanordnung gibt es keine Bleiben-Option. Die Risikobewertung haben Behörden für dich gemacht."},"note":{"label":"Einzige Frage","text":"Wie schnell kannst du gehen?"}},{"type":"text","paragraphs":["Die offizielle Route nehmen, nicht die schnellste laut Navi — Sperrungen sind oft nicht in Apps. Zur ausgewiesenen Notunterkunft gehen, dort sofort registrieren.","Erst zurück, wenn Behörden ausdrücklich Entwarnung geben. Auch wenn die Straße ruhig aussieht."]},{"type":"kit_ref","items":["package","folder","pill","battery-charging","banknote"]},{"type":"text_plan","paragraphs":["Jetzt zählt euer Familienplan am meisten. In der Notunterkunft sofort registrieren, dann den Kontakt außerhalb der Region informieren.","Wenn Familienmitglieder beim Evakuierungsbefehl getrennt waren: alle gehen zur ausgewiesenen Sammelstelle, niemand fährt zurück, um andere zu holen."],"plan_ref":"treffpunkt"},{"type":"text_warning","paragraphs":["Behörden geben offizielle Entwarnung. Bei Bombenentschärfungen meist innerhalb weniger Stunden."],"warning":"Vor dem Wiedereinzug: Gas, Strom, Wasser von Fachleuten prüfen lassen, falls länger abgestellt. Bei Bränden oder Chemieeinsatz auch die Luft ein paar Stunden gut durchlüften."}]},{"key":"kommunikation","name":"Kommunikationsausfall","desc":"Kein Netz, kein Internet, kein Festnetz","color":"#3D6B7A","related":["stromausfall","evakuierung","unterwegs"],"sections":[{"type":"text","paragraphs":["Kein Mobilfunknetz, kein Internet, kein Festnetz. Keine Anrufe, keine Karten, keine Online-Zahlungen.","Mehr desorientierend als gefährlich — aber es legt offen, wie sehr der Alltag von Konnektivität abhängt. Vorbereitung wirkt hier extrem stark."]},{"type":"text","paragraphs":["Handy zeigt 'Kein Netz' oder 'Nur Notrufe'. SMS bleiben unzustellbar. Andere Geräte um dich herum haben dasselbe Problem — es ist nicht dein Telefon."]},{"type":"steps","steps":["Mit Nachbarn kurz abgleichen — ist es das Netz oder dein Gerät?","Batterieradio einschalten — Updates kommen jetzt nur noch über UKW","Handy-Akku schonen: Flugzeugmodus, Helligkeit runter, Apps zu","Wenn akuter Notfall: zur nächsten Polizei- oder Feuerwache gehen, dort funktioniert Kommunikation immer","An den Familienplan halten — Treffpunkt und Uhrzeiten sind genau für diesen Moment"],"warning":"Das einzige Szenario, wo der vorher vereinbarte Treffpunkt und ein fester Zeitplan alles bedeuten können."},{"type":"stay_go","stay":{"label":"Bleiben","text":"Zu Hause sind deine Vorräte, und dort suchen Familienmitglieder dich."},"go":{"label":"Gehen","text":"Du warst beim Ausfall getrennt von der Familie und ihr habt einen Treffpunkt vereinbart — dann dorthin."}},{"type":"text","paragraphs":["Batterieradio auf Deutschlandfunk (UKW, regional unterschiedliche Frequenz) oder den lokalen ARD-Sender. SMS hartnäckig versuchen — sie gehen oft durch, wenn Anrufe scheitern.","Bargeld ist jetzt unverzichtbar — Karten- und Smartphone-Zahlung funktionieren nicht. Wer keins hat, fragt vertraute Geschäfte oder Nachbarn."]},{"type":"kit_ref","items":["radio","battery-charging","banknote","file-text","flashlight"]},{"type":"text_plan","paragraphs":["Dieser Notfall lebt von Vorbereitung: wichtige Nummern auf Papier, ein vereinbarter Treffpunkt, eine vereinbarte Zeit, ein Kontakt außerhalb der Region als Vermittler.","Wenn ihr getrennt seid: alle gehen zur vereinbarten Zeit zum Treffpunkt. Wer es nicht schafft, geht zur nächsten festen Zeit. Niemand sucht aktiv."],"plan_ref":"treffpunkt"},{"type":"text_warning","paragraphs":["Signal kommt zurück, gestaute Nachrichten landen plötzlich gleichzeitig. Radio bestätigt die Wiederherstellung."],"warning":"Familienplan jetzt schreiben, falls noch nicht geschehen. Wichtige Nummern heute auf Papier — das kostet 5 Minuten und überlebt jeden Akku."}]},{"key":"wasserausfall","name":"Wasserausfall","desc":"Kein Wasser oder Trinkwasser nicht sicher","color":"#1A7A7A","related":["stromausfall","versorgungsengpass","wasserknappheit"],"sections":[{"type":"text","paragraphs":["Aus dem Hahn kommt nichts, oder es kommt etwas — aber Behörden sagen: nicht trinken. In Deutschland öfter als die meisten denken: Rohrbruch, Verunreinigung, Wartungsarbeiten.","Meist nach Stunden bis einem Tag behoben. Mit dem Wasservorrat aus dem Kit gut zu überbrücken."]},{"type":"text","paragraphs":["Hahn läuft tropfenweise oder gar nicht. Stadtwerke senden ein Abkochgebot per NINA, Radio oder Aushang. Wasser ist trüb, riecht oder schmeckt ungewöhnlich. Nachbarn bestätigen dasselbe."]},{"type":"steps","steps":["NINA und Stadtwerke prüfen — was ist betroffen, wie lange?","Restdruck nutzen: Badewanne, Eimer, Flaschen sofort füllen","Bei Abkochgebot: nur abgekochtes oder Flaschenwasser — auch zum Zähneputzen","Geschirrspüler und Waschmaschine nicht starten","Vorrat checken — wie lange reicht er für alle?"]},{"type":"stay_go","stay":{"label":"Bleiben","text":"Vorräte vorhanden, Ausfall voraussichtlich kurz, niemand im Haushalt ist auf medizinisch reines Wasser angewiesen."},"go":{"label":"Gehen","text":"Jemand braucht reines Wasser für Dialyse, Inhalation oder Säuglingsnahrung; Ausfall dauert über deine Vorräte hinaus."}},{"type":"text","paragraphs":["Trinkwasser einteilen: 3 Liter pro Person und Tag ist das absolute Minimum für Trinken, Kochen und Zähneputzen. Mehr ist besser, gerade bei Hitze.","Toilette nur sparsam spülen, ggf. mit Eimer Brauch- oder Regenwasser. Pflanzen vertragen ein paar Tage; Haustiere brauchen frisches Wasser zuerst."]},{"type":"kit_ref","items":["droplets","archive","banknote","radio"]},{"type":"text","paragraphs":["Ältere Nachbarn haben oft kleinere Vorräte als du — kurz fragen reicht. Familie draußen Bescheid geben, dass sie zu Hause nichts aus dem Hahn trinken.","Kindern erklären, dass das unangenehm, aber kein Notfall ist."]},{"type":"text_warning","paragraphs":["Stadtwerke geben Entwarnung über NINA, Radio oder Aushang. Bei Abkochgebot: erst nach offizieller Aufhebung wieder direkt aus dem Hahn."],"warning":"Erste Liter aus den Leitungen ablaufen lassen — Stagnationswasser nicht trinken. Kit-Vorrat sofort wieder auffüllen, solange du dran denkst."}]},{"key":"gasausfall","name":"Gasausfall","desc":"Kein Gas für Heizung, Warmwasser oder Herd","color":"#A07520","related":["heizungsausfall","stromausfall","versorgungsengpass"],"sections":[{"type":"text","paragraphs":["Die Gasversorgung fällt aus. Zwei sehr unterschiedliche Fälle: ein flächendeckender Versorgungsausfall vom Anbieter, oder ein Leck bei dir oder im Haus. Die Reaktion ist komplett anders.","Bei einem Leck zählen Sekunden. Bei einem Versorgungsausfall hast du Zeit, ruhig zu planen."]},{"type":"text","paragraphs":["Heizung läuft nicht, Herd zündet nicht, Warmwasser bleibt kalt. Bei Versorgungsausfall melden Stadtwerke und NINA.","Bei Leck: deutlicher Geruch nach faulen Eiern (Schwefelbeimischung), Zischen aus Leitung oder Gerät, Schwindel oder Kopfschmerz ohne Grund."]},{"type":"steps","steps":["Bei Geruch oder Zischen: keine Schalter betätigen — kein Licht, kein Handy, keine Klingel","Hauptabsperrhahn schließen (meist im Keller oder am Zähler)","Alle Fenster und Türen weit öffnen","Alle aus der Wohnung — von draußen 112 oder Gas-Notruf des Anbieters","Bei reinem Versorgungsausfall: NINA prüfen, Kit aktivieren, ruhig bleiben"],"warning":"Kein offenes Feuer, keine elektrischen Schalter, kein Handy in der Wohnung — Funken können das Gas-Luft-Gemisch zünden."},{"type":"stay_go","stay":{"label":"Bleiben","text":"Reiner Versorgungsausfall ohne Leck-Verdacht. Wohnung über 15 °C. Vorräte für mehrere Tage."},"go":{"label":"Gehen","text":"Verdacht auf ein Leck — dann sofort raus, Nachbarn warnen, von draußen Notruf wählen. Auch bei Versorgungsausfall gehen, wenn jemand auf elektrische Heizung zur Überbrückung angewiesen ist und die nicht da ist."}},{"type":"text","paragraphs":["Bei Versorgungsausfall: Wohnung warm halten — Türen zu unbenutzten Räumen schließen, alle in einen Raum, Schichten anziehen.","Kalt essen oder mit Camping-Kocher draußen oder am offenen Fenster. Niemals improvisierte Gas- oder Benzinkocher in geschlossenen Räumen — Erstickungsgefahr durch Kohlenmonoxid."]},{"type":"kit_ref","items":["layers","flashlight","archive","radio","banknote"]},{"type":"text_plan","paragraphs":["Bei Leck: alle Familienmitglieder sofort informieren — niemand betritt das Haus, bevor die Feuerwehr es freigibt. Treffpunkt aus dem Plan nutzen.","Bei Versorgungsausfall: Notruf nicht blockieren — Updates über NINA und Radio."],"plan_ref":"treffpunkt"},{"type":"text_warning","paragraphs":["Bei Leck: Feuerwehr gibt das Haus frei. Bei Versorgungsausfall: Stadtwerke melden Wiederherstellung."],"warning":"Nach einem Leck: Geräte vom Fachbetrieb prüfen lassen, bevor du Heizung oder Herd wieder nutzt. Auch wenn alles normal aussieht."}]},{"key":"wohnungsbrand","name":"Wohnungsbrand","desc":"Es brennt in der Wohnung oder im Haus","color":"#B0421A","related":["evakuierung","industrie","vegetationsbrand"],"sections":[{"type":"text","paragraphs":["Es brennt bei dir oder im Haus. Die meisten Brände starten klein — überhitzte Pfanne, Kerze ohne Aufsicht, defekte Mehrfachsteckdose, ein Akku, der heißläuft. Ohne Reaktion wird daraus innerhalb weniger Minuten ein Vollbrand.","Die wichtigste Regel ist umgekehrt zu fast jeder anderen Notlage: raus, nicht reingehen. Sachen sind ersetzbar, du nicht."]},{"type":"text","paragraphs":["Rauchmelder schreit — nachts oft das einzige Signal, weil schlafende Menschen Rauch nicht riechen. Brandgeruch in der Luft, auch ohne sichtbare Flammen (schwelende Elektronik oder Plastik riecht stechend, anders als Kerzen oder Kochen). Hitze hinter einer geschlossenen Tür. Sichtbarer Rauch unter Türen oder im Treppenhaus. Bei dichtem Rauch ist Sicht und Atmen innerhalb von Minuten weg."]},{"type":"steps","steps":["Alle in der Wohnung warnen — laut, kurz, deutlich: 'Es brennt, raus jetzt!'","Türen hinter dir schließen — verlangsamt das Feuer dramatisch und kostet keine Sekunde","Aus dem Haus gehen, Treppenhaus benutzen, niemals den Aufzug","Von draußen 112 anrufen — Adresse, Hausnummer, Stockwerk, was brennt","An einem festen Treffpunkt vor dem Haus sammeln und Köpfe zählen"],"warning":"Niemals zurück in die Wohnung — auch nicht für Handy, Tasche, Dokumente oder Haustier. Zurück ins brennende Haus kostet jedes Jahr Menschen das Leben. Nichts in der Wohnung ist es wert."},{"type":"stay_go","stay":{"label":"Bleiben","text":"Selten und nur, wenn der Brand sehr klein war (Geschirrtuch, umgekippte Kerze) und du ihn vollständig gelöscht hast. Auch dann: 112 anrufen, gut lüften, mindestens eine Stunde wach bleiben und auf erneutes Aufflammen achten."},"go":{"label":"Gehen","text":"Standard. Bei Rauchentwicklung, sichtbaren Flammen, Hitze hinter einer Tür oder Geruch nach brennender Elektronik sofort raus. Nicht löschen versuchen, wenn das Feuer größer als ein Papierkorb ist. Bei Fettbrand niemals Wasser — Deckel drauf, Hitze aus."}},{"type":"text","paragraphs":["Vor dem Haus warten, bis die Feuerwehr da ist. Niemand betritt die Wohnung, auch nicht für Sekunden. Die Feuerwehr braucht eine Minute, um die Tür zu öffnen — diese Minute ist günstiger als deine Lunge.","Wenn das Treppenhaus schon verraucht ist und du nicht raus kannst: Wohnungstür zu, Türritzen mit nassen Tüchern abdichten, ans Fenster gehen, 112 anrufen, mit hellem Tuch winken. Nicht aus dem Fenster springen — das ist tödlicher als auf die Feuerwehr zu warten."]},{"type":"kit_ref","items":["cross-circle","file-text","folder","flashlight"]},{"type":"text_plan","paragraphs":["Ein fester Treffpunkt vor dem Haus oder bei einem festen Nachbarn ist hier mehr wert als bei jedem anderen Notfall. 'Wer fehlt?' ist die erste Frage der Feuerwehr — und die einzige, die wirklich zählt.","Kindern den Treffpunkt regelmäßig zeigen, nicht nur sagen. Im Rauch denken Kinder nicht; Routine schon. Auch der Weg vom Kinderzimmer raus sollte einmal mit dem Kind durchgegangen worden sein."],"plan_ref":"treffpunkt"},{"type":"text_warning","paragraphs":["Feuerwehr gibt die Wohnung frei. Bei kleinen Bränden meist innerhalb weniger Stunden, sonst Tage."],"warning":"Auch nach einem scheinbar kleinen Brand: Strom abgeklemmt lassen, bis ein Elektriker prüft. Glutnester in Wänden und Möbeln können sich noch Stunden später entzünden — erst nach offizieller Freigabe wieder schlafen. Rauchmelder, die ausgelöst haben, sind danach unzuverlässig und gehören ersetzt. Hausverwaltung und Versicherung zeitnah informieren."}]},{"key":"heizungsausfall","name":"Heizungsausfall","desc":"Die Wohnung wird kalt oder bleibt kalt","color":"#2560A0","related":["stromausfall","gasausfall","wintereinbruch"],"sections":[{"type":"text","paragraphs":["Heizung funktioniert nicht — Defekt, Strom- oder Gasausfall, leerer Tank. Von November bis März ein echtes Problem, in den anderen Monaten meist erträglich.","Mit ein paar einfachen Schritten bleibt die Wohnung lange genug warm zum Überbrücken."]},{"type":"text","paragraphs":["Heizkörper bleiben kalt trotz aufgedrehtem Thermostat. Raumtemperatur sinkt unter 18 °C. Boden und Wände fühlen sich kühler an als sonst — die Wärme strahlt nirgends mehr nach."]},{"type":"steps","steps":["Ursache prüfen: Strom da? Gas da? Brenner zeigt Fehlercode?","Vermieter, Hausverwaltung oder Heizungsdienst anrufen","Türen zu unbenutzten Räumen schließen","Familie und Aktivität in einen Raum zusammenziehen — gemeinsam wärmer","Fenster geschlossen halten; nur kurz und kräftig stoßlüften, wenn unbedingt nötig"]},{"type":"stay_go","stay":{"label":"Bleiben","text":"Raumtemperatur über 14 °C, kurzer Ausfall absehbar, niemand gesundheitlich besonders gefährdet."},"go":{"label":"Gehen","text":"Säuglinge, ältere Personen oder chronisch Kranke im Haushalt; Temperatur fällt unter 12 °C; Ausfall dauert länger als einen Tag."}},{"type":"text","paragraphs":["Schichten statt einer dicken Jacke — drei dünne wärmen besser als ein Pullover. Mütze und Socken nicht vergessen, der meiste Wärmeverlust geht über Kopf und Füße.","Heißgetränke regelmäßig. Bewegung wärmt mehr als Stillsitzen. Schlafsack auf Sofa oder Bett legen, auch tagsüber."]},{"type":"kit_ref","items":["layers","flashlight","archive","banknote","radio"]},{"type":"text","paragraphs":["Familienmitglieder mit Risiko zuerst — Säuglinge, ältere Personen, Menschen mit Atemwegserkrankungen.","Bei Nachbarn fragen, ob ein warmer Raum geteilt werden kann. Manche Kommunen öffnen bei längeren Ausfällen Wärmepunkte; im Lokalradio wird das bekannt gegeben."]},{"type":"text_warning","paragraphs":["Heizung läuft wieder. Raumtemperatur stabil über 18 °C — das dauert nach längerem Ausfall einige Stunden."],"warning":"Niemals Holzkohlegrill, Camping-Kocher oder offenes Feuer in der Wohnung als Heizungsersatz. Kohlenmonoxid ist geruchlos und tötet im Schlaf."}]},{"key":"industrie","name":"Industrieunfall","desc":"Chemische oder industrielle Gefahr in der Nähe","color":"#7A8A20","related":["evakuierung","kommunikation"],"sections":[{"type":"text","paragraphs":["Eine Fabrik oder Chemieanlage in der Nähe hat etwas Gefährliches freigesetzt. Die zentrale Anweisung ist hier umgekehrt zu den meisten Notlagen: nicht raus, sondern rein und dichtmachen.","Du erlebst das vermutlich nie. Aber wenn doch, zählen die ersten 10 Minuten enorm."]},{"type":"text","paragraphs":["NINA sendet eine Warnung mit konkreten Anweisungen. Laute Explosion oder große Rauchwolke gesehen. Ungewöhnlicher Geruch draußen — chemisch, brennend, beißend. Auffällig viele Einsatzfahrzeuge in eine Richtung."]},{"type":"steps","steps":["Sofort rein, falls draußen — Kinder und Tiere mitnehmen","Alle Fenster, Türen und Lüftungsöffnungen schließen","Mechanische Lüftung und Klimaanlage ausschalten","NINA und Radio einschalten — die Anweisungen variieren je nach Stoff","Von Fenstern wegbleiben, in einem Innenraum sammeln"],"warning":"Die Gefahr kann unsichtbar und geruchlos sein. Fenster geschlossen halten, auch wenn 'nichts zu spüren' ist."},{"type":"stay_go","stay":{"label":"Bleiben","text":"In den meisten Fällen: drinnen bleiben. Schutz im Gebäude ist die offizielle Empfehlung des deutschen Zivilschutzes für solche Lagen."},"go":{"label":"Gehen","text":"Behörden ordnen ausdrücklich Evakuierung an, oder das Gebäude selbst ist akut bedroht (Brand, Einsturzrisiko)."}},{"type":"text","paragraphs":["Bei ernstem Alarm: Türritzen mit feuchten Handtüchern oder Klebeband abdichten. Nur zentralen Raum nutzen, Telefon nur für Notfälle.","Anweisungen genau folgen — Behörden sagen explizit, wann gelüftet werden darf. Keine eigenen Experimente, auch wenn die Wohnung schwer riecht."]},{"type":"kit_ref","items":["radio","battery-charging","mask","hand","droplets"]},{"type":"text","paragraphs":["Familienmitglieder draußen per SMS anweisen, in das nächste Gebäude zu gehen — egal welches. Nicht losfahren, um sie abzuholen.","Schulen, Kitas und Arbeitsplätze haben eigene Schutzraum-Protokolle. Vertrau darauf, lass die Kinder dort, bis Entwarnung kommt."]},{"type":"text_warning","paragraphs":["NINA oder Radio geben ausdrückliche Entwarnung. Erst danach Fenster öffnen — auch wenn der Geruch weg ist."],"warning":"Wer Symptome hatte (Augenreizung, Husten, Schwindel): beim Hausarzt oder über 116 117 abklären lassen. Manche Reizstoffe wirken zeitverzögert."}]},{"key":"hitzewelle","name":"Hitzewelle","desc":"Gefährliche Hitze für mehrere Tage","color":"#C4521A","related":["stromausfall","wasserknappheit"],"sections":[{"type":"text","paragraphs":["Mehrere Tage über 30 °C, oft mit Nächten über 20 °C. In Deutschland zunehmend häufig — und gefährlicher, als die meisten denken. Hitzewellen fordern in den meisten Jahren mehr Tote als Stürme oder Hochwasser.","Das Risiko baut sich langsam auf und wirkt unspektakulär. Genau deshalb wird es unterschätzt."]},{"type":"text","paragraphs":["DWD sendet eine Hitzewarnung für deine Region. Die Wohnung kühlt nachts nicht mehr ab. Bei dir oder im Haushalt: Kopfschmerz, Müdigkeit, Übelkeit, Schwindel, deutlich weniger Urin als sonst — alles frühe Warnzeichen."]},{"type":"steps","steps":["Fenster und Rollläden tagsüber komplett zu — Hitze draußen halten","Nachts und vor 8 Uhr morgens kräftig stoßlüften","Wasserflasche immer in Reichweite — auch ohne Durst trinken","Sport und körperliche Anstrengung draußen verschieben","Kühlsten Raum identifizieren — meist Nordseite, Erdgeschoss oder Keller"]},{"type":"stay_go","stay":{"label":"Bleiben","text":"Wohnung bleibt unter 28 °C, alle kommen klar, niemand zeigt Symptome."},"go":{"label":"Gehen","text":"Wohnung über 30 °C auch nachts, jemand zeigt Symptome, oder du wohnst unterm Dach. Bibliothek, Einkaufszentrum, Museum, Kirche oder Schwimmbad sind kühlere Tagesziele."}},{"type":"text","paragraphs":["Mindestens alle zwei Stunden trinken, auch ohne Durst — Durst kommt bei Hitze verspätet. Etwas Salziges dazu, du verlierst Salz mit dem Schweiß.","Lauwarm duschen, nicht kalt — kalte Duschen verengen die Gefäße und wärmen am Ende mehr. Nasse Tücher um Hand- und Fußgelenke, leichte Baumwolle, kühle Kompressen im Nacken."]},{"type":"kit_ref","items":["droplets","archive"]},{"type":"text","paragraphs":["Ältere Verwandte und Nachbarn täglich kontrollieren — sie spüren Durst weniger und kühlen schlechter ab. Ein Anruf am Tag reicht oft.","Kinder beobachten, sie überhitzen schneller. Haustiere brauchen Schatten, frisches Wasser, abends Gassi statt mittags. Auto bei Hitze niemals als Wartezimmer, auch nicht für 'nur fünf Minuten'."]},{"type":"text_warning","paragraphs":["DWD hebt die Hitzewarnung auf. Nachttemperaturen unter 18 °C, Tageswerte erträglich."],"warning":"Bei anhaltenden Symptomen — starker Kopfschmerz, Verwirrtheit, kein Schwitzen mehr — Hausarzt oder 116 117. Bei Bewusstseinsstörung sofort 112."}]},{"key":"unterwegs","name":"Unterwegs feststecken","desc":"Du kommst nicht weiter oder nicht nach Hause","color":"#6B6560","related":["kommunikation","unwetter","wintereinbruch"],"sections":[{"type":"text","paragraphs":["Du bist nicht zu Hause und kommst nicht zurück — Bahnausfall, Sturm, gesperrte Straßen, Streik, Stau ohne Ende. Häufiger als die schlimmen Szenarien und kann von Stunden bis Tage dauern.","Die meiste Vorbereitung dafür hast du schon: Plan, Kontakte, Bargeld. Jetzt geht es um Ruhe und sinnvolle Schritte."]},{"type":"text","paragraphs":["Zug fällt aus, Bahnhof ist gesperrt. Stau ohne Ende, Tankstellen leer. Hotels in der Region ausgebucht. Familie zu Hause meldet, dass du heute nicht zurückkommst."]},{"type":"steps","steps":["Tief durchatmen — kein akuter Notfall","Akku checken, Stromsparmodus an, Helligkeit runter","Familie informieren: wo bist du, was ist der Stand?","Verkehrsapps und NINA prüfen — wie lange dauert die Störung?","Festen Anhaltspunkt suchen: Bahnhof, Hotel-Lobby, Krankenhaus, Polizei"]},{"type":"stay_go","stay":{"label":"Bleiben","text":"In einem sicheren öffentlichen Gebäude. Bei Nacht, Sturm oder fremder Umgebung — bleiben ist fast immer richtig."},"go":{"label":"Gehen","text":"Tageslicht, bekannter Weg, klares erreichbares Ziel. Niemals zu Fuß auf Autobahnen oder bei extremem Wetter."}},{"type":"text","paragraphs":["Wasser und Snacks kaufen, solange möglich — Bargeld ist hier dein bester Freund. Warme Schicht anziehen, falls die Nacht kalt wird.","Schlafplatz: Hotel, Bekannte in der Nähe, Notunterkunft. Bahnhöfe öffnen oft bei großen Störungen ihre Wartesäle und stellen Decken bereit."]},{"type":"kit_ref","items":["banknote","file-text","battery-charging","layers"]},{"type":"text_plan","paragraphs":["Treffpunkt-Logik umkehren: nicht du gehst zum Treffpunkt, sondern Familie weiß, wo du bist, und kommt klar. Falls die Verbindung wackelt: feste Uhrzeit für den nächsten Anruf vereinbaren.","Den Kontakt außerhalb der Region als Vermittler einsetzen — ein Anruf statt zehn."],"plan_ref":"kontakt"},{"type":"text_warning","paragraphs":["Verbindung wieder offen, Verkehr läuft, du bist auf dem Weg nach Hause oder am Ziel."],"warning":"Beim nächsten Mal: kleines Notfallpaket im Auto oder Rucksack. Eine Powerbank, eine Notfalldecke, 50 € Bargeld machen einen großen Unterschied."}]}],"scenarios_secondary":[{"key":"wintereinbruch","name":"Wintereinbruch","desc":"Schnee, Eis oder extreme Kälte","color":"#5A8AB5","related":["heizungsausfall","unwetter","stromausfall"],"sections":[{"type":"text","paragraphs":["Plötzliche extreme Kälte, viel Schnee oder Eisregen. Verkehr bricht zusammen, Stromleitungen können brechen, Heizungen kommen an Grenzen.","In Deutschland regional sehr unterschiedlich, aber in einzelnen Wintern auch im Flachland heftig. Mit Vorbereitung gut beherrschbar."]},{"type":"text","paragraphs":["DWD-Warnung vor Schnee, Glätte oder strenger Kälte. Verkehrsmeldungen häufen sich. Schulen melden früher Schluss. Streufahrzeuge im Dauereinsatz."]},{"type":"steps","steps":["Vorräte checken — bei starkem Schnee könnten 1–2 Tage ohne Einkauf werden","Heizung prüfen: läuft, Reserve da?","Wege ums Haus räumen und streuen","Auto vollgetankt, Schneeketten oder Winterausrüstung griffbereit","Nicht nötige Fahrten verschieben — kein Heldentum"]},{"type":"stay_go","stay":{"label":"Bleiben","text":"Wohnung warm, Vorräte da, kein zwingender Termin. Drinnen ist fast immer richtig."},"go":{"label":"Gehen","text":"Medizinischer Termin, der nicht wartet, oder du musst zur Arbeit in der Klinik, Pflege oder beim Rettungsdienst — dann mit Reserve und gefülltem Tank."}},{"type":"text","paragraphs":["Bei Stromausfall durch Eis oder Schneelast: dem Stromausfall-Plan folgen. Heizung in Reserve halten, falls es länger dauert.","Bei Glätte zu Fuß: kleine Schritte, Schwerpunkt nach vorn, Hände möglichst nicht in den Taschen. Sturzgefahr ist die Hauptgefahr für Erwachsene."]},{"type":"kit_ref","items":["layers","flashlight","archive","droplets","radio"]},{"type":"text","paragraphs":["Ältere Nachbarn fragen, ob jemand Einkäufe oder Streuen übernimmt. Sie sind die am stärksten Gefährdeten — Stürze, Unterkühlung, isoliert wegen schlechter Wege.","Kindern den Spaß lassen — Schnee ist toll. Aber Mütze und Handschuhe sind nicht verhandelbar, und nach 30 Minuten kurz ins Warme."]},{"type":"text_warning","paragraphs":["Tauwetter, Verkehr läuft wieder, Schulen sind wieder offen."],"warning":"Tauwasser kann Keller fluten — Pumpen prüfen. Dachlast bei wechselndem Frost und Tau ist trügerisch; bei großen Schneemengen Statik nicht selbst einschätzen."}]},{"key":"strahlenunfall","name":"Strahlenunfall","desc":"Radiologische oder nukleare Freisetzung","color":"#6B3D7A","related":["industrie","evakuierung"],"sections":[{"type":"text","paragraphs":["Eine radiologische oder nukleare Anlage hat etwas freigesetzt — sehr selten, aber wenn, dann zählen die ersten Stunden. Behörden in Deutschland reagieren in solchen Lagen sehr schnell.","Deine Aufgabe ist einfach: rein, dichtmachen, NINA hören."]},{"type":"text","paragraphs":["NINA sendet eine spezifische Warnung mit klaren Anweisungen. Sirenen mit dem Schutzraum-Signal (auf- und abschwellender Heulton). Behörden über Lautsprecherwagen oder im Radio."]},{"type":"steps","steps":["Sofort rein — Kinder und Haustiere mitnehmen","Fenster, Türen und Lüftungen schließen, Klimaanlage aus","NINA und Radio einschalten, auf konkrete Anweisungen warten","Innenraum aufsuchen, möglichst ohne Außenfenster (Bad, Innenflur)","Jodtabletten erst nehmen, wenn Behörden es ausdrücklich anordnen — nicht prophylaktisch"],"warning":"Niemals selbst entscheiden, zu evakuieren. Behörden kennen die Ausbreitung; eigene Routen können dich näher an die Quelle bringen."},{"type":"stay_go","stay":{"label":"Bleiben","text":"Drinnen bleiben — fast immer die richtige Antwort. Wände, Decken und Boden schirmen viel Strahlung ab. Bis Behörden ausdrücklich etwas anderes sagen."},"go":{"label":"Gehen","text":"Behörden ordnen Evakuierung mit klarer Route und Zielort an — und nur dann."}},{"type":"text","paragraphs":["Wenn du gerade von draußen kommst: Außenkleidung in einer verschlossenen Tüte ablegen, duschen, Haare gründlich waschen.","Lebensmittel aus dem Garten oder offene Lagerung nicht verwenden, bis Behörden Entwarnung geben. Verpacktes oder im geschlossenen Schrank gelagertes ist unbedenklich."]},{"type":"kit_ref","items":["radio","battery-charging","archive","droplets"]},{"type":"text","paragraphs":["Familienmitglieder draußen sofort per SMS in das nächste Gebäude schicken — nicht nach Hause fahren lassen, das verlängert die Exposition.","Schulen und Kitas haben eigene Schutzpläne. Vertrau darauf, lass die Kinder dort, bis Behörden Entwarnung geben oder die Schule sie organisiert übergibt."]},{"type":"text_warning","paragraphs":["Behörden geben offizielle Entwarnung über NINA, Radio und Lautsprecher."],"warning":"Anweisungen zu Lebensmitteln, Wasser, Kleidung genau befolgen — auch wenn sie übervorsichtig wirken. Bei körperlichen Symptomen sofort beim Hausarzt oder über 116 117 melden."}]},{"key":"wasserknappheit","name":"Wasserknappheit","desc":"Trinkwasser wird knapp oder eingeschränkt","color":"#1A7A7A","related":["wasserausfall","hitzewelle","versorgungsengpass"],"sections":[{"type":"text","paragraphs":["Anders als ein plötzlicher Ausfall: Wasser wird über Tage oder Wochen knapper oder rationiert. In Deutschland bisher in trockenen Sommern und einzelnen Regionen, mit dem Klima zunehmend.","Die gute Nachricht: das entwickelt sich langsam genug, dass du planen kannst."]},{"type":"text","paragraphs":["Behörden ordnen Sparmaßnahmen an — kein Rasensprengen, keine Autowäsche, kein Pool füllen. Der Druck im Hahn ist niedriger als sonst, abends teilweise nichts mehr. Lokale Berichte über trockene Brunnen."]},{"type":"steps","steps":["Vorrat aufstocken — keine Hamsterkäufe, nur eine Reserve aufbauen","Eigenen Verbrauch ehrlich anschauen: kürzer duschen, Spülkasten reduzieren","Spül- und Waschmaschine nur voll laufen lassen","Garten und Pflanzen mit Regen- oder Brauchwasser","Behördenanweisungen genau befolgen — Verstöße werden geahndet"]},{"type":"stay_go","stay":{"label":"Bleiben","text":"Reserven angepasst, Verbrauch reduziert, niemand braucht spezielles medizinisches Wasser, das nicht da ist."},"go":{"label":"Gehen","text":"Jemand braucht reines Wasser für Dialyse, Säuglingsnahrung oder eine Erkrankung, die mehr Flüssigkeit fordert. Bei Hitzewelle parallel auch eher gehen."}},{"type":"text","paragraphs":["Bei Hitze gilt: Trinken hat Vorrang vor allem. Auch in der Knappheit nicht zu wenig — Dehydrierung ist gefährlicher als Sparen.","Restwasser von Spülen oder Duschen nicht wegschütten — für Toilette, Pflanzen oder Wischen sammeln. Eine Schüssel im Spülbecken hilft enorm."]},{"type":"kit_ref","items":["droplets","archive","banknote"]},{"type":"text","paragraphs":["Ältere Verwandte und Nachbarn fragen, ob sie zurechtkommen — sie reduzieren oft zu stark und trinken dann selbst zu wenig.","Kindern erklären, warum gespart wird. Ein Wasserzähler im Bad oder ein Becher beim Zähneputzen macht das anschaulich."]},{"type":"text_warning","paragraphs":["Behörden heben die Maßnahmen auf, Pegel und Grundwasser haben sich erholt."],"warning":"Beim Wiederanstellen der Außenbewässerung erst mal kurz spülen lassen. Reserve im Kit auf das gewohnte Niveau auffüllen — das nächste trockene Jahr kommt."}]},{"key":"vegetationsbrand","name":"Vegetationsbrand","desc":"Feuer oder Rauch in deiner Region","color":"#B05E1A","related":["evakuierung","industrie","unwetter"],"sections":[{"type":"text","paragraphs":["Wald-, Heide- oder Feldbrand in der Nähe — oder Rauch von einem entfernten Brand zieht in deine Region. In Deutschland wegen trockener Sommer zunehmend häufiger.","Für Anwohner ist der Rauch oft das größere Problem als das Feuer selbst, und er kann hunderte Kilometer weit ziehen."]},{"type":"text","paragraphs":["NINA-Warnung oder DWD-Hinweis. Brandgeruch in der Luft, Sicht durch Rauch eingeschränkt. Asche fällt sichtbar zu Boden. Husten, Augenreizung, Kratzen im Hals."]},{"type":"steps","steps":["Fenster und Türen schließen, Lüftung aus","Bei Atemwegsproblemen: feuchtes Tuch oder FFP2-Maske vor Mund und Nase","NINA hören — Evakuierung droht? Wind dreht?","Sport und Anstrengung draußen ausfallen lassen","Nicht selbst zum Brand fahren, um zu schauen — du blockierst Einsatzkräfte"]},{"type":"stay_go","stay":{"label":"Bleiben","text":"Brand ist weiter weg, nur Rauch — drinnen mit geschlossenen Fenstern. Atemwegskranke evtl. mit FFP2-Maske auch drinnen."},"go":{"label":"Gehen","text":"Behörden ordnen Evakuierung an, oder das Feuer ist sichtbar in deiner Richtung. Wind dreht auf dich zu."}},{"type":"text","paragraphs":["Drinnen bleiben, bis der Rauch deutlich nachlässt oder Behörden Entwarnung geben — auch wenn es draußen 'klar' aussieht, sind Feinpartikel oft länger in der Luft.","Bei längerer Rauchbelastung: einen Raum als 'Reinraum' wählen, dort schlafen, mit feuchten Tüchern Türritzen abdichten. Das senkt die Belastung deutlich."]},{"type":"kit_ref","items":["mask","droplets","archive","radio"]},{"type":"text","paragraphs":["Bei eigenen Symptomen oder bei Kindern und Älteren mit Atemwegsproblemen frühzeitig den Hausarzt oder 116 117 anrufen — nicht erst, wenn es schlimm wird.","Haustieren ebenfalls drinnen; Hunde nur kurz auf Toilette, gar nicht spazieren. Pferde und andere Tiere im Stall in den hintersten Bereich."]},{"type":"text_warning","paragraphs":["Brand gelöscht oder unter Kontrolle, Rauchbelastung deutlich gesunken, Behörden geben Entwarnung."],"warning":"Auch nach dem Brand können kleine Glutnester wieder auflodern. Bei sichtbarem Rauch immer 112 anrufen — auch tagelang nach dem Hauptbrand."}]},{"key":"versorgungsengpass","name":"Versorgungsengpass","desc":"Einkaufen, Lieferungen oder Alltag stocken","color":"#3D6B4A","related":["wasserknappheit","stromausfall","kommunikation"],"sections":[{"type":"text","paragraphs":["Lieferketten stocken: Supermarktregale dauerhaft leer in bestimmten Bereichen, Apotheken können Standardmedikamente nicht halten, Tankstellen melden Engpässe.","Nichts explodiert, aber der Alltag wird zäh. Mit gut bestücktem Kit fast unsichtbar."]},{"type":"text","paragraphs":["Bestimmte Produkte fehlen über Wochen — nicht nur in einem Geschäft, sondern in mehreren. Apotheken vertrösten bei Standardmedikamenten. Lieferdienste melden Verzögerungen. Berichte in Lokalmedien."]},{"type":"steps","steps":["Vorräte ehrlich anschauen — keine Hamsterkäufe, aber Reserven sinnvoll auffüllen","Medikamente: Rezepte rechtzeitig erneuern, nicht erst wenn die Packung leer ist","Bargeld bereithalten — bei Lieferengpässen wackelt manchmal die Kartenzahlung","Alternative Quellen: Wochenmärkte, Hofläden, Online-Direktbezug","Solidarisch bleiben — Engpass wird schlimmer, wenn alle hamstern"]},{"type":"stay_go","stay":{"label":"Bleiben","text":"Vorräte für 1–2 Wochen, Medikamente bestellt, Alltag mit kleineren Anpassungen weiter möglich."},"go":{"label":"Gehen","text":"Es geht um lebensnotwendige Medikamente, die nirgends mehr verfügbar sind — dann Kontakt mit Hausarzt oder Krankenhaus, nicht selbst rumtelefonieren ohne Plan."}},{"type":"text","paragraphs":["Vorräte rotieren, nicht horten: was in den Schrank kommt, wird auch wieder gegessen. Sonst hat man in einem Jahr nur abgelaufene Konserven.","Kleinen Wocheneinkauf weiter machen wie immer. Engpässe verteilen sich oft auf einzelne Produkte; Alternativen finden sich fast immer."]},{"type":"kit_ref","items":["archive","pill","banknote","droplets"]},{"type":"text","paragraphs":["Nachbarschaftliches Tauschen funktioniert oft besser als Einzelkampf — wer Mehl hat, bekommt Eier, und umgekehrt.","Ältere Nachbarn brauchen oft Hilfe beim Anstehen oder bei der Suche nach speziellen Produkten. Kurz fragen reicht."]},{"type":"text_warning","paragraphs":["Regale füllen sich wieder, Apotheken liefern wieder regelmäßig, Lieferzeiten normalisieren sich."],"warning":"Reserven jetzt auf das gewohnte Niveau bringen, nicht über. Was du nicht regelmäßig isst, gehört nicht in deinen Vorrat."}]},{"key":"infektionsausbruch","name":"Infektionsausbruch","desc":"Ansteckende Krankheit im Haushalt oder in der Region","color":"#A04A6B","related":["versorgungsengpass","kommunikation"],"sections":[{"type":"text","paragraphs":["Eine ansteckende Krankheit verbreitet sich — im Haushalt, im Wohngebiet oder regional. Reicht von schwerer Grippe bis zu seltenen Erregern. Behörden geben Hinweise.","Hier zählt: ruhige Hygiene und das Befolgen offizieller Anweisungen. Keine Panik, kein Heldentum."]},{"type":"text","paragraphs":["RKI oder Gesundheitsamt warnen. Symptome im Umfeld häufen sich. Hausarzt empfiehlt Schutzmaßnahmen. Schulen oder Kitas melden Ausbruch oder schließen vorübergehend."]},{"type":"steps","steps":["Offizielle Quellen lesen — RKI, Hausarzt, lokales Gesundheitsamt","Erkrankte im Haushalt isolieren — eigenes Zimmer, eigenes Bad, wenn möglich","Hygiene konsequent: Hände waschen, regelmäßig lüften, Abstand bei Symptomen","Bei eigenen Symptomen: telefonisch beim Hausarzt oder 116 117 melden, nicht in die Praxis fahren","Vorräte für 1–2 Wochen prüfen, falls Quarantäne kommt"]},{"type":"stay_go","stay":{"label":"Bleiben","text":"Niemand schwer krank, Versorgung organisierbar, Quarantäne zu Hause möglich."},"go":{"label":"Gehen","text":"Schwere Symptome (Atemnot, anhaltend hohes Fieber, starke Schmerzen, Verwirrtheit) — dann Hausarzt anrufen oder 112; bei akuter Atemnot direkt 112."}},{"type":"text","paragraphs":["Wenn jemand zu Hause krank ist: gemeinsame Flächen häufig wischen, Handtücher trennen, Geschirr separat spülen.","Auf sich selbst auch achten: genug schlafen, gut essen, raus an die frische Luft, wenn nicht selbst krank. Pflegende werden oft als Zweite krank."]},{"type":"kit_ref","items":["mask","hand","pill","archive","droplets"]},{"type":"text","paragraphs":["Familienmitglieder anderswo informieren, dass Quarantäne läuft — sie können Einkäufe vor die Tür stellen. Den Kontakt außerhalb der Region als Vermittler nutzen, falls jemand schnell Hilfe braucht.","Kinder verstehen das gut, wenn man es ruhig erklärt. Sie spüren Anspannung schneller als jede Erklärung."]},{"type":"text_warning","paragraphs":["Symptome im Haushalt klingen ab, Behörden heben Maßnahmen auf, Schulen und Kitas öffnen wieder."],"warning":"Vorräte erst nach offizieller Entwarnung wieder reduzieren. FFP2-Masken und Hygieneartikel im Kit halten — der nächste Ausbruch kommt irgendwann."}]},{"key":"unsicher","name":"Ich bin nicht sicher","desc":"Hilf mir, die passende Situation zu finden","color":"#6B6560","related":[],"sections":[{"type":"text","paragraphs":["Wenn du nicht weißt, was los ist, mach erstmal nichts Schnelles. Atme. Schau dich um. Drei ehrliche Fragen führen meist zur richtigen Situation.","Diese Seite ist ein Notnagel, kein Szenario — sie hilft dir, das passende zu finden."]},{"type":"text","paragraphs":["Frage 1: Ist jemand verletzt oder reagiert nicht? → Erste Hilfe öffnen, 112 anrufen.","Frage 2: Funktioniert etwas Großes nicht (Strom, Wasser, Gas, Netz)? → entsprechendes Szenario unter Notfälle.","Frage 3: Sagen Behörden über NINA oder Sirenen etwas? → Anweisungen folgen, dann passendes Szenario öffnen."]},{"type":"steps","steps":["Setz dich kurz hin — eine Minute kostet nichts und hilft enorm","Schau aus dem Fenster — was siehst du, was hörst du?","Frag jemanden im Haushalt oder einen Nachbarn — vier Augen sehen mehr","NINA-App und lokales Radio öffnen — gibt es offizielle Meldungen?","Wenn du eine Idee hast, das passende Szenario öffnen. Wenn nicht: 112 anrufen — die hören zu"],"warning":"Im Zweifel ist 112 immer richtig. Disponenten nehmen sich Zeit, helfen einzuschätzen, und schicken Hilfe nur, wenn nötig."},{"type":"stay_go","stay":{"label":"Bleiben","text":"Kein akuter Notfall sichtbar, niemand verletzt, draußen ist es ruhig — meist genügt es zu beobachten und ein passendes Szenario zu finden."},"go":{"label":"Gehen","text":"Sichtbare Gefahr (Brand, Wasser, Rauch, Verletzte) — geh nach den Regeln des passenden Szenarios. Ohne klares Szenario ist drinnen bleiben fast immer richtig, bis die Lage klar ist."}},{"type":"text","paragraphs":["Wenn die Lage sich nicht von selbst klärt: ruhig bleiben, weiter NINA und Radio prüfen, mit Nachbarn abgleichen.","Wenn du Symptome bei dir oder anderen bemerkst — Husten, Augenreizung, Schwindel, ungewöhnliche Müdigkeit — ist das ein Hinweis, dass es einen Auslöser gibt. Dann nach drinnen, Fenster zu, NINA prüfen."]},{"type":"kit_ref","items":["radio","battery-charging","flashlight","droplets"]},{"type":"text_plan","paragraphs":["Familie kurz informieren: 'Mir geht's gut, ich klär gerade was los ist.' Keine Spekulation, keine langen Anrufe.","Wer am Familienplan mitgearbeitet hat, weiß meist auch, wo geprüft wird. Den Kontakt außerhalb der Region informieren, wenn die Lage länger unklar bleibt."],"plan_ref":"treffpunkt"},{"type":"text_warning","paragraphs":["Du hast die Situation eingeordnet — entweder über ein Szenario, einen Anruf bei 112 oder weil sich rausstellt: nichts davon, alles ruhig."],"warning":"Wenn du am Ende ohne klare Antwort bleibst, aber der Bauch sagt 'irgendwas stimmt nicht' — vertrau dem. 112 oder der Hausarzt sind kein Aufwand, sondern dafür da."}]}]};
