let MAP_CENTER, CATEGORIES, POI_DATA;
let activeCategories;

// ============================================================
// APP STATE
// ============================================================
const state = { screen:'home', scenario:null, tab:0, planValues:{} };
let C = null;

// ============================================================
// INIT
// ============================================================
async function init() {
  if (typeof CONTENT !== 'undefined') {
    C = CONTENT;
  } else {
    try {
      const lang = document.documentElement.lang || 'de';
      const res = await fetch(`content/${lang}.json`);
      C = await res.json();
    } catch(e) {
      document.getElementById('app-screens').innerHTML =
        '<div style="padding:40px 20px;font-size:14px;color:#B03A2E;">Inhalt konnte nicht geladen werden.<br>Bitte starte über einen lokalen Server: <code>python3 -m http.server 8000</code></div>';
      return;
    }
  }

  if (typeof LOCATIONS !== 'undefined') {
    MAP_CENTER = { lat: LOCATIONS.center.lat, lng: LOCATIONS.center.lng, name: LOCATIONS.center.name };
    CATEGORIES = LOCATIONS.categories;
    POI_DATA   = LOCATIONS.pois;
  } else {
    try {
      const res = await fetch('content/locations.json');
      const L = await res.json();
      MAP_CENTER = { lat: L.center.lat, lng: L.center.lng, name: L.center.name };
      CATEGORIES = L.categories;
      POI_DATA   = L.pois;
    } catch(e) {
      document.getElementById('app-screens').innerHTML =
        '<div style="padding:40px 20px;font-size:14px;color:#B03A2E;">Standortdaten konnten nicht geladen werden.<br>Bitte starte über einen lokalen Server: <code>python3 -m http.server 8000</code></div>';
      return;
    }
  }

  activeCategories = new Set(CATEGORIES.filter(c => c.default_on !== false).map(c => c.id));
  render();
  restoreFromStorage();
}

// ============================================================
// RENDER
// ============================================================
function render() {
  document.title = C.brand.name;
  document.getElementById('alert-text').textContent = C.ui.alert_bar;
  document.getElementById('alert-chevron').innerHTML = ic('chevron-right','rgba(255,255,255,0.7)',14);
  const root = document.getElementById('app-screens');
  root.innerHTML = buildHome() + buildScenarioList() + buildScenarioDetail() + buildKit() + buildHilfe() + buildPlan() + buildKarte();
  setupDelegation();
  showScreen('home');
}

// CHANGE: centralised event delegation — replaces 20+ inline onclick handlers
// on repeated elements (nav-cards, scenario-items, kit-items, hilfe-cards, chips)
function setupDelegation() {
  document.getElementById('app-screens').addEventListener('click', function(e) {
    const el = e.target.closest('[data-action]');
    if (!el) return;
    switch(el.dataset.action) {
      case 'show-screen':
        showScreen(el.dataset.screen);
        break;
      case 'show-scenario':
        App.showScenario(el.dataset.key);
        break;
      case 'switch-tab':
        App.switchTab(parseInt(el.dataset.tab, 10));
        break;
      case 'toggle-kit': {
        const item = el.closest('button.kit-item');
        if (item) App.toggleKit(item);
        break;
      }
      case 'toggle-hilfe': {
        const card = el.closest('.hilfe-card');
        if (card) App.toggleHilfe(card, el);
        break;
      }
      case 'toggle-hilfe-sub': {
        e.stopPropagation();
        const card = el.closest('.hilfe-sub-card');
        if (card) App.toggleHilfeSub(card, el);
        break;
      }
      case 'toggle-weitere':
        App.toggleWeitere();
        break;
    }
  });
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  const el = document.getElementById('screen-' + id);
  if (el) {
    el.classList.add('active');
    const sa = el.querySelector('.scroll-area');
    if (sa) sa.scrollTop = 0;
    el.querySelectorAll('.nav-btn').forEach((b,i) => {
      b.classList.toggle('active', ['home','notfaelle','kit','hilfe','karte','plan'][i] === id
        || (id === 'scenario' && i === 1));
    });
    state.screen = id;
    if (id === 'karte') { setTimeout(() => initMap(), 80); setTimeout(() => updateInfoBar(), 10); }
    // WCAG 2.4.3: move keyboard focus to the screen heading on every navigation.
    // tabindex="-1" makes non-interactive headings programmatically focusable.
    // preventScroll avoids fighting with the scrollTop=0 reset above.
    const heading = el.querySelector('h1, h2');
    if (heading) {
      heading.setAttribute('tabindex', '-1');
      setTimeout(() => heading.focus({ preventScroll: true }), 50);
    }
  }
}

// ============================================================
// MAP INIT (lazy)
// ============================================================
let mapObj = null;
let mapReady = false;
const markersByCategory = {};

function generateCircle(cLng, cLat, radiusKm, n=72) {
  const coords = [];
  for (let i = 0; i <= n; i++) {
    const a = (i / n) * 2 * Math.PI;
    const dLat = radiusKm / 110.574;
    const dLng = radiusKm / (111.32 * Math.cos(cLat * Math.PI / 180));
    coords.push([cLng + dLng * Math.cos(a), cLat + dLat * Math.sin(a)]);
  }
  return { type:'Feature', geometry:{ type:'Polygon', coordinates:[coords] }, properties:{} };
}

function initMap() {
  if (mapReady) {
    if (mapObj) setTimeout(() => mapObj && mapObj.resize(), 50);
    return;
  }
  if (!window.maplibregl) {
    if (!document.getElementById('maplibre-js')) {
      const css = document.createElement('link');
      css.rel = 'stylesheet';
      css.href = 'https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css';
      document.head.appendChild(css);
      const js = document.createElement('script');
      js.id = 'maplibre-js';
      js.src = 'https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js';
      js.onload = () => _doInitMap();
      js.onerror = () => {
        // WCAG offline fix: MapLibre failed to load (no internet connection)
        const bar = document.getElementById('map-info-bar');
        if (bar) bar.textContent = 'Karte offline nicht verfügbar. Einmal mit Internetverbindung öffnen um Karte zu laden.';
        bar && (bar.style.whiteSpace = 'normal');
      };
      document.head.appendChild(js);
    }
    return;
  }
  _doInitMap();
}

function _doInitMap() {
  if (mapReady) return;
  const container = document.getElementById('map');
  if (!container || container.offsetHeight === 0) {
    setTimeout(_doInitMap, 60);
    return;
  }
  mapReady = true;
  mapObj = new maplibregl.Map({
    container: 'map',
    style: 'https://basemaps.cartocdn.com/gl/positron-gl-style/style.json',
    center: [MAP_CENTER.lng, MAP_CENTER.lat],
    zoom: 11.2,
    attributionControl: false,
  });
  mapObj.on('load', () => {
    mapObj.addSource('radius', { type:'geojson', data: generateCircle(MAP_CENTER.lng, MAP_CENTER.lat, (typeof LOCATIONS !== 'undefined' ? LOCATIONS.radius_km : null) || 10) });
    mapObj.addLayer({ id:'radius-fill', type:'fill', source:'radius', paint:{ 'fill-color':'#C4521A', 'fill-opacity':0.05 } });
    mapObj.addLayer({ id:'radius-line', type:'line', source:'radius', paint:{ 'line-color':'#C4521A', 'line-width':1.5, 'line-dasharray':[4,3], 'line-opacity':0.6 } });
    const homeDot = document.createElement('div');
    homeDot.className = 'home-dot-marker';
    new maplibregl.Marker({ element:homeDot, anchor:'center' }).setLngLat([MAP_CENTER.lng, MAP_CENTER.lat]).addTo(mapObj);
    CATEGORIES.forEach(cat => {
      markersByCategory[cat.id] = [];
      POI_DATA[cat.id].forEach(poi => {
        const el = document.createElement('div');
        el.className = 'poi-marker';
        el.style.background = cat.bg;
        el.style.borderColor = cat.color;
        el.innerHTML = ic(cat.icon, cat.color, 14, 1.5);
        const popup = new maplibregl.Popup({ offset:18, closeButton:true, maxWidth:'200px' })
          .setHTML(`<div style="font-family:'DM Sans',sans-serif;">
            <div style="font-size:13px;font-weight:500;color:#1A1714;margin-bottom:3px;">${poi.name}</div>
            <div style="font-size:11px;color:#6B6560;line-height:1.4;">${poi.addr}</div>
            ${poi.phone !== '–' ? `<div style="font-size:12px;color:${cat.color};margin-top:6px;font-weight:500;">📞 ${poi.phone}</div>` : ''}
          </div>`);
        const marker = new maplibregl.Marker({ element:el, anchor:'center' }).setLngLat([poi.lng, poi.lat]).setPopup(popup).addTo(mapObj);
        markersByCategory[cat.id].push(marker);
      });
    });
    updateInfoBar();
  });
}

function toggleCategory(id) {
  if (activeCategories.has(id)) { activeCategories.delete(id); } else { activeCategories.add(id); }
  CATEGORIES.forEach(cat => {
    const visible = activeCategories.has(cat.id);
    (markersByCategory[cat.id] || []).forEach(m => { m.getElement().style.display = visible ? 'flex' : 'none'; });
  });
  document.querySelectorAll('.map-filter-chip').forEach(chip => {
    const cid = chip.dataset.cat;
    const cat = CATEGORIES.find(c => c.id === cid);
    if (!cat) return;
    const isActive = activeCategories.has(cid);
    chip.classList.toggle('dimmed', !isActive);
    chip.setAttribute('aria-pressed', isActive);
    if (isActive) {
      chip.style.background = cat.bg;
      chip.style.borderColor = cat.color;
      chip.style.color = cat.color;
    }
  });
  updateInfoBar();
}

function updateInfoBar() {
  const bar = document.getElementById('map-info-bar');
  if (!bar) return;
  const visibleTotal = [...activeCategories].reduce((sum, id) => sum + (POI_DATA[id]?.length || 0), 0);
  const grandTotal   = Object.values(POI_DATA).reduce((sum, arr) => sum + arr.length, 0);
  bar.textContent = `${visibleTotal} von ${grandTotal} Standorten sichtbar`;
  const numEl = document.getElementById('map-count-num');
  const subEl = document.getElementById('map-count-sub');
  if (numEl) numEl.textContent = grandTotal;
  if (subEl) {
    const cats = [...activeCategories].length;
    const allCats = CATEGORIES.length;
    subEl.textContent = cats < allCats
      ? `${visibleTotal} sichtbar · ${allCats - cats} Kategorie${allCats-cats===1?'':'n'} ausgeblendet`
      : 'alle Kategorien sichtbar';
  }
}

    }
    const body = renderHilfeBody(item);
    return `<div class="hilfe-card">
      <button class="hilfe-card-header" type="button" data-action="toggle-hilfe" aria-expanded="false">
        <div class="hilfe-card-icon" style="background:var(--red-light);" aria-hidden="true">${ic(item.icon,'#B03A2E',20)}</div>
        <div class="hilfe-card-info"><div class="hilfe-card-title">${item.title}</div><div class="hilfe-card-sub">${item.subtitle}</div></div>
        <div class="hilfe-toggle" aria-hidden="true">${ic('chevron-down','currentColor',16)}</div>
      </button>
      <div class="hilfe-body" role="region" aria-label="${item.title}">${body}</div>
    </div>`;
  }).join('');
  return `<section class="screen" id="screen-hilfe" aria-label="${C.ui.firstaid_title}">
<header class="top-bar">
  <button class="back-btn" type="button" onclick="showScreen('home')" aria-label="Zurück zur Startseite">${ic('chevron-left','currentColor',16)}</button>
  <div><h2 class="top-bar-title">${C.ui.firstaid_title}</h2><div class="top-bar-sub">${C.ui.firstaid_subtitle}</div></div>
</header>
<div class="scroll-area">
  <div style="margin:12px 16px 10px;">
    <div class="tip-card" style="margin:0;background:var(--red-light);border-color:rgba(176,58,46,0.2);" role="note">
      <span aria-hidden="true">${ic('phone','#B03A2E',18)}</span>
      <div><div class="tip-title" style="color:var(--red);">${C.ui.firstaid_call_title}</div>
      <div class="tip-text">${C.ui.firstaid_call_body}</div></div>
    </div>
  </div>
  ${cards}
  <div style="height:16px;"></div>
</div>
${navBar()}</section>`;
}

// ============================================================
// PLAN SCREEN
// CHANGE: field-label div → <label for="plan-{id}"> for proper form association
// ============================================================
function buildPlan() {
  const sections = C.plan_fields.map(sec => {
    const fields = sec.fields.map(f =>
      `<div class="field-group">
        <label class="field-label" for="plan-${f.id}">${f.label}</label>
        <input class="field-input" id="plan-${f.id}" placeholder="${f.placeholder}" oninput="App.updatePreview()" autocomplete="off" />
        ${f.hint ? `<div class="field-hint">${f.hint}</div>` : ''}
      </div>`).join('');
    return `<div class="plan-section">
      <h3 class="plan-section-title">${sec.section_title}</h3>
      <div class="plan-section-desc">${sec.section_desc}</div>
      ${fields}
    </div><div class="divider"></div>`;
  }).join('');
  return `<section class="screen" id="screen-plan" aria-label="${C.ui.plan_title}">
<header class="top-bar">
  <button class="back-btn" type="button" onclick="showScreen('home')" aria-label="Zurück zur Startseite">${ic('chevron-left','currentColor',16)}</button>
  <div><h2 class="top-bar-title">${C.ui.plan_title}</h2><div class="top-bar-sub">${C.ui.plan_subtitle}</div></div>
</header>
<div class="scroll-area">
  <div class="plan-section"><div class="plan-section-desc" style="margin-bottom:0;padding-top:4px;">${C.ui.plan_intro}</div></div>
  <div class="divider"></div>
  ${sections}
  <button class="save-btn" type="button" onclick="App.savePlan()">${C.ui.plan_save_button}</button>
  <div class="saved-msg" id="saved-msg" role="status" aria-live="polite">${C.ui.plan_saved_message}</div>
</div>
${navBar()}</section>`;
}

// ============================================================
// ACTIONS
// CHANGE: renamed from A to App for clarity;
// toggleHilfe / toggleHilfeSub now update aria-expanded;
// toggleKit now updates aria-pressed;
// switchTab now updates aria-selected;
// storage catch blocks now log warnings instead of silently failing
// ============================================================
const App = {
  findScenario(key) {
    return C.scenarios.find(x => x.key === key)
        || (C.scenarios_secondary || []).find(x => x.key === key);
  },

  showScenario(key) {
    const s = this.findScenario(key);
    if (!s) return;
    state.scenario = key;
    document.getElementById('scenario-title').textContent = s.name;
    const tabs = document.getElementById('section-tabs');
    // CHANGE: tabs get role="tab" and aria-selected
    tabs.innerHTML = s.sections.map((sec,i) =>
      `<button class="tab-btn${i===0?' active':''}" type="button" role="tab"
       aria-selected="${i===0}" data-action="switch-tab" data-tab="${i}">${C.ui.tab_labels[i]||('Tab '+(i+1))}</button>`).join('');
    this.renderTab(s, 0);
    const chips = document.getElementById('related-chips');
    // CHANGE: related-chip → <button>
    chips.innerHTML = (s.related||[]).map(r => {
      const rel = this.findScenario(r);
      return rel ? `<button class="related-chip" type="button" data-action="show-scenario" data-key="${r}">${rel.name}</button>` : '';
    }).join('');
    showScreen('scenario');
  },

  switchTab(i) {
    const s = this.findScenario(state.scenario);
    if (!s) return;
    state.tab = i;
    // CHANGE: update both active class and aria-selected
    document.querySelectorAll('#section-tabs .tab-btn').forEach((b,j) => {
      b.classList.toggle('active', j===i);
      b.setAttribute('aria-selected', String(j===i));
    });
    this.renderTab(s, i);
    document.querySelector('#screen-scenario .scroll-area').scrollTop = 0;
  },

  renderTab(s, i) {
    const sec = s.sections[i];
    if (!sec) return;
    const el = document.getElementById('scenario-content');
    el.innerHTML = `<h3 class="section-heading">${C.ui.tab_full_labels[i]||''}</h3>` + this.renderSection(sec);
  },

  renderSection(sec) {
    if (sec.type === 'text' || sec.type === 'text_warning') {
      let html = `<div class="section-body">${sec.paragraphs.map(p=>`<p>${p}</p>`).join('')}</div>`;
      if (sec.warning) html += `<div class="warning-box" role="note">${sec.warning}</div>`;
      return html;
    }
    if (sec.type === 'text_plan') {
      let html = `<div class="section-body">${sec.paragraphs.map(p=>`<p>${p}</p>`).join('')}</div>`;
      if (sec.plan_ref) {
        const v = state.planValues[sec.plan_ref] || '';
        html += `<div style="background:var(--accent-light);border-radius:var(--radius-sm);padding:11px 13px;margin-top:12px;font-size:13px;">
          <span style="color:var(--text2);">Dein Treffpunkt: </span>
          <span data-plan-preview="${sec.plan_ref}" style="color:${v?'var(--green)':'var(--accent)'};font-weight:500;">${v||C.ui.plan_ref_not_entered}</span>
        </div>`;
      }
      return html;
    }
    if (sec.type === 'steps') {
      let html = `<ul class="steps">${sec.steps.map((s,i)=>`<li class="step"><div class="step-num" aria-hidden="true">${i+1}</div><div class="step-text">${s}</div></li>`).join('')}</ul>`;
      if (sec.warning) html += `<div class="warning-box" role="note">${sec.warning}</div>`;
      return html;
    }
    if (sec.type === 'stay_go') {
      let rows = '';
      if (sec.go_only) {
        rows = `<div class="stay-go-row"><span class="badge badge-go">${sec.go.label}</span><span class="stay-go-text">${sec.go.text}</span></div>`;
        if (sec.note) rows += `<div class="stay-go-row"><span class="badge badge-warning">${sec.note.label}</span><span class="stay-go-text">${sec.note.text}</span></div>`;
      } else {
        rows = `<div class="stay-go-row"><span class="badge badge-stay">${sec.stay.label}</span><span class="stay-go-text">${sec.stay.text}</span></div>
                <div class="stay-go-row"><span class="badge badge-go">${sec.go.label}</span><span class="stay-go-text">${sec.go.text}</span></div>`;
        if (sec.warning) rows += `<div class="warning-box" role="note">${sec.warning}</div>`;
      }
      return `<div class="stay-go">${rows}</div>`;
    }
    if (sec.type === 'kit_ref') {
      const allItems = [...C.kit.items_included, ...C.kit.items_personal];
      // CHANGE: display-only kit items use .kit-item-display (not interactive button)
      const items = sec.items.map(key => {
        const it = allItems.find(x => x.icon === key);
        return it ? `<div class="kit-item-display">
          <div class="kit-icon-wrap" aria-hidden="true">${ic(it.icon,it.color,22)}</div>
          <span class="kit-name">${it.label}</span>
        </div>` : '';
      }).join('');
      return `<div class="section-body"><p>Hol diese Sachen aus deinem Kit:</p></div><div class="kit-full-card kit-items" style="margin-top:4px;">${items}</div>`;
    }
    return '';
  },

  // CHANGE: updates aria-pressed on the kit button
  toggleKit(item) {
    const check = item.querySelector('.kit-check');
    check.classList.toggle('checked');
    const isChecked = check.classList.contains('checked');
    item.setAttribute('aria-pressed', String(isChecked));
    this.updateKitProgress();
    this.saveKitState();
  },

  // CHANGE: silent catch → logs warning to aid debugging
  saveKitState() {
    try {
      const checks = [...document.querySelectorAll('#screen-kit button.kit-item')].map(item => ({
        label: item.querySelector('.kit-name').textContent,
        checked: item.querySelector('.kit-check').classList.contains('checked')
      }));
      localStorage.setItem('rustenburgh_kit', JSON.stringify(checks));
    } catch(e) {
      console.warn('Rustenburgh: could not save kit state to localStorage:', e);
    }
  },

  updateKitProgress() {
    const all = document.querySelectorAll('#screen-kit .kit-check');
    const done = document.querySelectorAll('#screen-kit .kit-check.checked');
    const pct = Math.round((done.length / all.length) * 100);
    const bar = document.getElementById('kit-progress-bar');
    if (bar) {
      bar.style.width = pct + '%';
      // CHANGE: update progressbar aria-valuenow
      const progressEl = bar.parentElement;
      if (progressEl) progressEl.setAttribute('aria-valuenow', pct);
      document.getElementById('kit-count-label').textContent = `${done.length} ${C.ui.kit_progress_of} ${all.length} ${C.ui.kit_progress_done}`;
      document.getElementById('kit-percent-label').textContent = pct + '%';
      const hint = document.getElementById('kit-nav-hint');
      if (hint) {
        hint.textContent = pct===100 ? C.ui.kit_nav_complete : `${done.length} ${C.ui.kit_progress_of} ${all.length}`;
        hint.className = pct===100 ? 'nav-card-hint ok' : 'nav-card-hint';
      }
    }
  },

  // CHANGE: toggle .open on the card container; update aria-expanded on the header button
  toggleHilfe(card, btn) {
    card.classList.toggle('open');
    const isOpen = card.classList.contains('open');
    if (btn) btn.setAttribute('aria-expanded', String(isOpen));
  },

  // CHANGE: toggle .open on sub-card; update aria-expanded on sub-header button
  toggleHilfeSub(card, btn) {
    card.classList.toggle('open');
    const isOpen = card.classList.contains('open');
    if (btn) btn.setAttribute('aria-expanded', String(isOpen));
  },

  toggleWeitere() {
    const list = document.getElementById('weitere-list');
    const toggle = document.getElementById('weitere-toggle');
    if (!list || !toggle) return;
    list.classList.toggle('open');
    toggle.classList.toggle('open');
    // CHANGE: update aria-expanded on the overflow button
    toggle.setAttribute('aria-expanded', String(list.classList.contains('open')));
  },

  updatePreview() {
    const allFields = C.plan_fields.flatMap(s => s.fields);
    allFields.forEach(f => {
      const input = document.getElementById(`plan-${f.id}`);
      if (!input) return;
      state.planValues[f.id] = input.value;
      if (f.preview) {
        const el = document.getElementById(`preview-${f.id}`);
        if (el) { el.textContent = input.value || C.ui.plan_not_entered; el.className = 'plan-val ' + (input.value ? 'filled' : 'empty'); }
      }
    });
    document.querySelectorAll('[data-plan-preview]').forEach(el => {
      const key = el.dataset.planPreview;
      const val = state.planValues[key] || '';
      el.textContent = val || C.ui.plan_ref_not_entered;
      el.style.color = val ? 'var(--green)' : 'var(--accent)';
    });
  },

  // CHANGE: silent catch → logs warning; save-btn now sets aria-live msg
  savePlan() {
    this.updatePreview();
    const required = C.plan_fields.flatMap(s => s.fields).filter(f => f.preview);
    const missing = required.filter(f => !state.planValues[f.id]?.trim()).length;
    const hint = document.getElementById('plan-nav-hint');
    if (hint) {
      hint.textContent = missing === 0 ? C.ui.plan_complete : `${missing} ${missing===1 ? C.ui.plan_missing_singular : C.ui.plan_missing_plural}`;
      hint.className = missing === 0 ? 'nav-card-hint ok' : 'nav-card-hint warn';
    }
    try {
      localStorage.setItem('rustenburgh_plan', JSON.stringify(state.planValues));
    } catch(e) {
      console.warn('Rustenburgh: could not save plan to localStorage:', e);
    }
    const msg = document.getElementById('saved-msg');
    if (msg) { msg.style.display = 'block'; setTimeout(() => msg.style.display = 'none', 3000); }
  },

  ninaAlert() {
    alert(`${C.ui.alert_popup_title}\n\n${C.ui.alert_popup_body}`);
  }
};

// ============================================================
// RESTORE FROM STORAGE
// CHANGE: silent catches → log warnings; kit restore updates aria-pressed
// ============================================================
function restoreFromStorage() {
  try {
    const saved = localStorage.getItem('rustenburgh_plan');
    if (saved) {
      const values = JSON.parse(saved);
      Object.entries(values).forEach(([id, val]) => {
        const input = document.getElementById(`plan-${id}`);
        if (input && val) { input.value = val; state.planValues[id] = val; }
      });
      App.updatePreview();
      const required = C.plan_fields.flatMap(s => s.fields).filter(f => f.preview);
      const missing = required.filter(f => !state.planValues[f.id]?.trim()).length;
      const hint = document.getElementById('plan-nav-hint');
      if (hint) {
        hint.textContent = missing === 0 ? C.ui.plan_complete : `${missing} ${missing===1 ? C.ui.plan_missing_singular : C.ui.plan_missing_plural}`;
        hint.className = missing === 0 ? 'nav-card-hint ok' : 'nav-card-hint warn';
      }
    }
  } catch(e) {
    console.warn('Rustenburgh: could not restore plan from localStorage:', e);
  }
  try {
    const saved = localStorage.getItem('rustenburgh_kit');
    if (saved) {
      const checks = JSON.parse(saved);
      const kitItems = [...document.querySelectorAll('#screen-kit button.kit-item')];
      checks.forEach(({ label, checked }) => {
        const item = kitItems.find(el => el.querySelector('.kit-name').textContent === label);
        if (item && checked) {
          const c = item.querySelector('.kit-check');
          c.classList.add('checked');
          c.innerHTML = ic('check','white',13);
          // CHANGE: restore aria-pressed state
          item.setAttribute('aria-pressed', 'true');
        }
      });
      App.updateKitProgress();
    }
  } catch(e) {
    console.warn('Rustenburgh: could not restore kit state from localStorage:', e);
  }
}

init();
</script>
</body>
</html>
