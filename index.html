<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Rustenburgh — Karte Mockup</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#F6F3EE;--bg2:#FFFFFF;--bg3:#EDEAE4;--text:#1A1714;--text2:#6B6560;--text3:#A09990;--accent:#C4521A;--accent-light:#F9EDE5;--green:#3D6B4A;--green-light:#E8F2EB;--red:#B03A2E;--red-light:#FAECEA;--amber:#A0720A;--amber-light:#FDF3DC;--blue:#2560A0;--blue-light:#E8F0FB;--border:rgba(26,23,20,0.1);--border2:rgba(26,23,20,0.06);--shadow:0 1px 3px rgba(26,23,20,0.07),0 4px 16px rgba(26,23,20,0.04);--radius:14px;--radius-sm:9px;--font-display:'Playfair Display',Georgia,serif;--font-body:'DM Sans',-apple-system,BlinkMacSystemFont,sans-serif;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:var(--font-body);background:#C8C4BE;display:flex;justify-content:center;align-items:flex-start;min-height:100vh;padding:28px 16px;}
.phone{width:393px;min-height:852px;background:var(--bg);border-radius:48px;overflow:hidden;box-shadow:0 24px 72px rgba(0,0,0,0.28),0 0 0 1px rgba(0,0,0,0.12);position:relative;display:flex;flex-direction:column;height:852px;}
.status-bar{background:var(--bg);padding:16px 26px 8px;display:flex;justify-content:space-between;align-items:center;font-size:12px;font-weight:500;color:var(--text);flex-shrink:0;}
.status-icons{display:flex;align-items:center;gap:5px;}
.alert-bar{background:var(--accent);padding:9px 18px;display:flex;align-items:center;gap:10px;cursor:pointer;transition:background .18s;flex-shrink:0;}
.alert-bar:hover{background:#B5481A;}
.alert-pulse{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,0.95);flex-shrink:0;animation:pulse 2.2s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.4;transform:scale(0.85)}}
.alert-text{font-size:12px;color:rgba(255,255,255,0.95);line-height:1.35;flex:1;}
#app-screens{flex:1;display:flex;flex-direction:column;overflow:hidden;min-height:0;}
.screen{display:none;flex-direction:column;flex:1;overflow:hidden;min-height:0;}
.screen.active{display:flex;}
.scroll-area{overflow-y:auto;flex:1;-webkit-overflow-scrolling:touch;}
.scroll-area::-webkit-scrollbar{display:none;}
.top-bar{padding:14px 18px 12px;display:flex;align-items:center;gap:12px;background:var(--bg);border-bottom:0.5px solid var(--border);flex-shrink:0;}
.back-btn{width:34px;height:34px;border-radius:50%;background:var(--bg3);border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text);flex-shrink:0;transition:background .15s;}
.back-btn:hover{background:var(--border);}
.top-bar-title{font-family:var(--font-display);font-size:18px;font-weight:600;color:var(--text);}
.top-bar-sub{font-size:11px;color:var(--text3);margin-top:1px;}
.brand-header{padding:22px 20px 14px;background:var(--bg);}
.brand-name{font-family:var(--font-display);font-size:26px;font-weight:600;color:var(--text);letter-spacing:-0.5px;}
.brand-tagline-de{font-size:13px;color:var(--text2);margin-top:3px;line-height:1.4;}
.brand-tagline-en{font-size:11px;color:var(--text3);margin-top:2px;font-style:italic;}
.nav-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:0 16px 14px;}
.nav-card{background:var(--bg2);border-radius:var(--radius);padding:16px 14px 14px;border:0.5px solid var(--border2);cursor:pointer;transition:transform .14s,box-shadow .14s;box-shadow:var(--shadow);}
.nav-card:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(26,23,20,0.1);}
.nav-card:active{transform:scale(0.975);}
.nav-card.alert-card{border-color:rgba(196,82,26,0.25);}
.nav-icon-wrap{width:40px;height:40px;border-radius:11px;display:flex;align-items:center;justify-content:center;margin-bottom:11px;}
.nav-card-label{font-size:13px;font-weight:500;color:var(--text);}
.nav-card-hint{font-size:11px;color:var(--text3);margin-top:3px;}
.nav-card-hint.warn{color:var(--accent);}
.nav-card-hint.ok{color:var(--green);}
/* Full-width map preview card */
.map-preview-card{display:flex;align-items:center;gap:14px;padding:14px 16px;margin:0 16px 14px;background:var(--bg2);border-radius:var(--radius);border:0.5px solid rgba(196,82,26,0.2);cursor:pointer;transition:transform .14s,box-shadow .14s;box-shadow:var(--shadow);position:relative;overflow:hidden;}
.map-preview-card:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(26,23,20,0.1);}
.map-preview-card:active{transform:scale(0.99);}
.map-preview-card .nav-icon-wrap{margin-bottom:0;flex-shrink:0;}
.map-preview-bg{position:absolute;right:-10px;top:50%;transform:translateY(-50%);opacity:0.06;font-size:80px;pointer-events:none;}
.plan-preview{margin:0 16px 14px;background:var(--bg2);border-radius:var(--radius);padding:14px 16px;border:0.5px solid var(--border2);box-shadow:var(--shadow);cursor:pointer;}
.plan-preview-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:11px;}
.plan-preview-title{font-size:11px;font-weight:500;color:var(--text2);text-transform:uppercase;letter-spacing:0.9px;}
.plan-row{display:flex;align-items:center;justify-content:space-between;padding:6px 0;border-bottom:0.5px solid var(--border2);}
.plan-row:last-child{border-bottom:none;}
.plan-key{font-size:12px;color:var(--text2);}
.plan-val{font-size:12px;font-weight:500;}
.plan-val.empty{color:var(--accent);}
.plan-val.filled{color:var(--green);}
.tip-card{margin:0 16px 6px;background:var(--green-light);border-radius:var(--radius);padding:14px 16px;border:0.5px solid rgba(61,107,74,0.18);display:flex;gap:12px;align-items:flex-start;}
.tip-title{font-size:12px;font-weight:500;color:var(--green);margin-bottom:3px;}
.tip-text{font-size:12px;color:var(--text);line-height:1.5;}
.scenario-list{padding:8px 0 16px;}
.scenario-section-label{font-size:11px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:0.9px;padding:12px 20px 6px;}
.scenario-item{display:flex;align-items:center;padding:13px 20px;cursor:pointer;border-bottom:0.5px solid var(--border2);transition:background .13s;gap:14px;}
.scenario-item:hover{background:var(--bg3);}
.scenario-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.scenario-info{flex:1;}
.scenario-name{font-size:14px;font-weight:500;color:var(--text);}
.scenario-desc{font-size:11px;color:var(--text3);margin-top:2px;}
.section-tabs{display:flex;overflow-x:auto;padding:10px 14px;gap:6px;background:var(--bg);border-bottom:0.5px solid var(--border);flex-shrink:0;}
.section-tabs::-webkit-scrollbar{display:none;}
.tab-btn{flex-shrink:0;padding:5px 11px;border-radius:20px;border:0.5px solid var(--border);background:var(--bg2);font-size:11px;color:var(--text2);cursor:pointer;font-family:var(--font-body);transition:all .14s;white-space:nowrap;}
.tab-btn.active{background:var(--text);color:var(--bg);border-color:var(--text);font-weight:500;}
.tab-btn:hover:not(.active){background:var(--bg3);}
.section-content{padding:20px 20px 8px;}
.section-heading{font-size:11px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:0.9px;margin-bottom:13px;}
.section-body{font-size:14px;line-height:1.72;color:var(--text);}
.section-body p{margin-bottom:10px;}
.section-body p:last-child{margin-bottom:0;}
.steps{list-style:none;margin-bottom:4px;}
.step{display:flex;gap:11px;margin-bottom:10px;align-items:flex-start;}
.step-num{width:22px;height:22px;border-radius:50%;background:var(--accent);color:white;font-size:11px;font-weight:500;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;}
.step-text{font-size:13.5px;line-height:1.62;color:var(--text);}
.stay-go{background:var(--bg3);border-radius:var(--radius-sm);padding:13px 14px;margin-bottom:4px;}
.stay-go-row{display:flex;gap:10px;align-items:flex-start;margin-bottom:8px;}
.stay-go-row:last-child{margin-bottom:0;}
.badge{flex-shrink:0;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:500;white-space:nowrap;margin-top:2px;}
.badge-stay{background:var(--green-light);color:var(--green);}
.badge-go{background:var(--red-light);color:var(--red);}
.badge-warning{background:var(--amber-light);color:var(--amber);}
.stay-go-text{font-size:13px;line-height:1.5;color:var(--text);}
.warning-box{background:var(--amber-light);border-left:2.5px solid var(--amber);border-radius:0 var(--radius-sm) var(--radius-sm) 0;padding:11px 13px;margin:12px 0 4px;font-size:13px;line-height:1.52;color:var(--text);}
.kit-items{margin-bottom:4px;}
.kit-item{display:flex;align-items:center;gap:13px;padding:10px 0;border-bottom:0.5px solid var(--border2);cursor:pointer;}
.kit-item:last-child{border-bottom:none;}
.kit-icon-wrap{width:30px;height:30px;flex-shrink:0;display:flex;align-items:center;justify-content:center;}
.kit-name{font-size:13px;color:var(--text);flex:1;line-height:1.4;}
.kit-check{width:21px;height:21px;border-radius:6px;border:1.5px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s;background:var(--bg2);}
.kit-check.checked{background:var(--green);border-color:var(--green);}
.related-section{padding:16px 20px;border-top:0.5px solid var(--border2);}
.related-title{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:0.9px;margin-bottom:10px;}
.related-chips{display:flex;flex-wrap:wrap;gap:7px;}
.related-chip{padding:6px 12px;background:var(--bg3);border-radius:20px;font-size:12px;color:var(--text2);cursor:pointer;border:0.5px solid var(--border);transition:background .13s;}
.related-chip:hover{background:var(--border);}
.kit-full-section{padding:16px 18px 6px;}
.kit-full-title{font-size:11px;font-weight:500;color:var(--text2);text-transform:uppercase;letter-spacing:0.9px;margin-bottom:11px;}
.kit-full-card{background:var(--bg2);border-radius:var(--radius);padding:4px 16px;border:0.5px solid var(--border);margin-bottom:10px;box-shadow:var(--shadow);}
.kit-progress-label{font-size:12px;color:var(--text2);margin:12px 18px 7px;display:flex;justify-content:space-between;}
.kit-progress{margin:0 18px 16px;background:var(--bg3);border-radius:20px;height:5px;overflow:hidden;}
.kit-progress-bar{height:100%;background:var(--green);border-radius:20px;transition:width .35s ease;}
.plan-section{padding:18px 18px 6px;}
.plan-section-title{font-family:var(--font-display);font-size:16px;font-weight:600;color:var(--text);margin-bottom:4px;}
.plan-section-desc{font-size:12px;color:var(--text2);margin-bottom:16px;line-height:1.55;}
.field-group{margin-bottom:13px;}
.field-label{font-size:11px;font-weight:500;color:var(--text2);text-transform:uppercase;letter-spacing:0.7px;margin-bottom:6px;}
.field-input{width:100%;padding:11px 13px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--bg2);font-family:var(--font-body);font-size:14px;color:var(--text);outline:none;transition:border-color .15s;}
.field-input:focus{border-color:var(--accent);}
.field-input::placeholder{color:var(--text3);}
.field-hint{font-size:11px;color:var(--text3);margin-top:4px;line-height:1.45;}
.save-btn{width:calc(100% - 36px);margin:10px 18px 18px;padding:14px;background:var(--text);color:var(--bg);border:none;border-radius:var(--radius);font-family:var(--font-body);font-size:14px;font-weight:500;cursor:pointer;transition:background .15s;}
.save-btn:hover{background:#2A2623;}
.saved-msg{text-align:center;font-size:12px;color:var(--green);padding-bottom:4px;display:none;}
.divider{height:0.5px;background:var(--border2);margin:0 18px;}
.hilfe-card{margin:0 16px 10px;background:var(--bg2);border-radius:var(--radius);overflow:hidden;border:0.5px solid var(--border);box-shadow:var(--shadow);cursor:pointer;}
.hilfe-card-header{padding:14px 16px;display:flex;align-items:center;justify-content:space-between;gap:12px;}
.hilfe-card-icon{width:36px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.hilfe-card-info{flex:1;}
.hilfe-card-title{font-size:14px;font-weight:500;color:var(--text);}
.hilfe-card-sub{font-size:11px;color:var(--text3);margin-top:2px;}
.hilfe-toggle{color:var(--text3);transition:transform .2s;flex-shrink:0;}
.hilfe-card.open .hilfe-toggle{transform:rotate(180deg);}
.hilfe-body{display:none;padding:4px 16px 16px;border-top:0.5px solid var(--border2);}
.hilfe-card.open .hilfe-body{display:block;}
.hilfe-step{display:flex;gap:10px;padding:8px 0;border-bottom:0.5px solid var(--border2);align-items:flex-start;}
.hilfe-step:last-child{border-bottom:none;}
.hilfe-num{width:24px;height:24px;border-radius:50%;background:var(--red-light);color:var(--red);font-size:11px;font-weight:600;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px;}
.hilfe-text{font-size:13px;line-height:1.52;color:var(--text);padding-top:3px;}
.fast-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px;}
.fast-item{background:var(--red-light);border-radius:var(--radius-sm);padding:11px 12px;}
.fast-letter{font-family:var(--font-display);font-size:22px;font-weight:600;color:var(--red);}
.fast-word{font-size:11px;font-weight:500;color:var(--red);margin-top:1px;}
.fast-desc{font-size:11px;color:var(--text2);margin-top:4px;line-height:1.4;}
.bottom-nav{display:flex;background:var(--bg2);border-top:0.5px solid var(--border);padding:8px 0 22px;flex-shrink:0;}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;padding:5px 0;cursor:pointer;background:none;border:none;font-family:var(--font-body);transition:opacity .13s;}
.nav-btn:active{opacity:0.55;}
.nav-btn-label{font-size:9.5px;color:var(--text3);font-weight:400;}
.nav-btn.active .nav-btn-label{color:var(--accent);font-weight:500;}

/* =========================================
   MAP SCREEN STYLES
   ========================================= */
.map-filter-bar{display:flex;overflow-x:auto;padding:8px 12px;gap:6px;background:var(--bg);border-bottom:0.5px solid var(--border);flex-shrink:0;-webkit-overflow-scrolling:touch;}
.map-filter-bar::-webkit-scrollbar{display:none;}
.map-filter-chip{flex-shrink:0;padding:5px 10px;border-radius:20px;border:1px solid;font-size:11px;font-family:var(--font-body);font-weight:500;cursor:pointer;white-space:nowrap;transition:all .14s;display:flex;align-items:center;gap:4px;}
.map-filter-chip.dimmed{background:var(--bg2)!important;border-color:var(--border)!important;color:var(--text3)!important;opacity:0.65;}
.chip-count{display:inline-block;background:rgba(0,0,0,0.09);border-radius:8px;padding:0 5px;font-size:9.5px;margin-left:3px;font-weight:600;line-height:16px;}
.map-filter-chip.dimmed .chip-count{background:rgba(0,0,0,0.06);}
.map-count-bar{padding:7px 14px 6px;display:flex;align-items:center;justify-content:space-between;background:var(--bg);border-bottom:0.5px solid var(--border);flex-shrink:0;}
.map-count-total{font-family:var(--font-display);font-size:15px;font-weight:600;color:var(--text);letter-spacing:-0.2px;}
.map-count-total span{color:var(--accent);}
.map-count-sub{font-size:10.5px;color:var(--text3);}
.map-count-radius{display:flex;align-items:center;gap:5px;font-size:10.5px;color:var(--text2);background:var(--bg2);border:0.5px solid var(--border);border-radius:12px;padding:3px 9px;}
.screen-map-inner{flex:1;position:relative;min-height:0;}
#map{position:absolute;top:0;left:0;right:0;bottom:0;}
.map-offline-badge{margin-left:auto;padding:3px 9px;background:var(--green-light);color:var(--green);border-radius:20px;font-size:10px;font-weight:500;flex-shrink:0;}
.map-attribution{position:absolute;bottom:8px;right:8px;font-size:9px;color:rgba(26,23,20,0.5);background:rgba(255,255,255,0.82);padding:2px 7px;border-radius:4px;pointer-events:none;z-index:10;font-family:var(--font-body);}
.map-center-dot{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:10px;height:10px;background:var(--accent);border-radius:50%;border:2px solid white;box-shadow:0 0 0 4px rgba(196,82,26,0.2);pointer-events:none;z-index:5;}
.map-info-bar{position:absolute;top:10px;left:50%;transform:translateX(-50%);background:rgba(255,255,255,0.92);border-radius:20px;padding:4px 12px;font-size:10px;color:var(--text2);font-family:var(--font-body);pointer-events:none;z-index:10;backdrop-filter:blur(4px);border:0.5px solid var(--border);white-space:nowrap;}

/* MapLibre popup override */
.maplibregl-popup-content{font-family:var(--font-body)!important;border-radius:10px!important;padding:10px 12px!important;box-shadow:0 4px 20px rgba(0,0,0,0.13)!important;border:0.5px solid var(--border)!important;}
.maplibregl-popup-close-button{font-size:16px;color:var(--text3);top:4px;right:6px;}
.maplibregl-ctrl-attrib{display:none!important;}
.maplibregl-ctrl-logo{display:none!important;}
.maplibregl-ctrl-bottom-right,.maplibregl-ctrl-bottom-left{display:none!important;}

/* POI marker */
.poi-marker{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,0.18);transition:transform .15s;border:1.5px solid;}
.poi-marker:hover{transform:scale(1.18);}
.home-dot-marker{width:12px;height:12px;border-radius:50%;background:var(--accent);border:2.5px solid white;box-shadow:0 0 0 4px rgba(196,82,26,0.22),0 2px 8px rgba(196,82,26,0.3);cursor:default;}

@media(max-width:430px){body{padding:0;background:var(--bg);}.phone{width:100%;border-radius:0;min-height:100vh;height:auto;box-shadow:none;}.screen{height:auto;}.screen-map-inner{height:400px;position:relative;flex:none;}}
</style>
</head>
<body>
<div class="phone">
  <div class="status-bar">
    <span>9:41</span>
    <div class="status-icons">
      <svg width="16" height="12" viewBox="0 0 16 12" fill="currentColor"><rect x="0" y="3" width="3" height="9" rx="1" opacity="0.3"/><rect x="4.5" y="2" width="3" height="10" rx="1" opacity="0.5"/><rect x="9" y="0.5" width="3" height="11.5" rx="1" opacity="0.75"/><rect x="13.5" y="0" width="2.5" height="12" rx="1"/></svg>
      <svg width="16" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M1.42 9a16 16 0 0121.16 0M5 12.55a11 11 0 0114.08 0M8.53 16.11a6 6 0 016.95 0M12 20h.01"/></svg>
      <svg width="25" height="12" viewBox="0 0 25 12" fill="currentColor"><rect x="0.5" y="0.5" width="20" height="11" rx="3.5" stroke="currentColor" stroke-opacity="0.35" fill="none"/><rect x="1.5" y="1.5" width="17" height="9" rx="2.5" fill="currentColor"/><rect x="21.5" y="3.5" width="2.5" height="5" rx="1.25" fill="currentColor" opacity="0.4"/></svg>
    </div>
  </div>
  <div class="alert-bar" onclick="A.ninaAlert()">
    <div class="alert-pulse"></div>
    <div class="alert-text" id="alert-text"></div>
    <div id="alert-chevron"></div>
  </div>
  <div id="app-screens"></div>
</div>

<script>
// ============================================================
// ICONS

 Gebäude"},"go":{"label":"Sofort gehen","text":"Behörden ordnen Evakuierung an. Wasser dringt ins Erdgeschoss. Fluchtweg könnte bald gesperrt sein."}},{"type":"text","paragraphs":["Bei Evakuierung: Kit, Dokumente, Medikamente, Handy und warme Kleidung — nicht mehr. Nur offizielle Routen. Nicht in Hochwasserwasser waten — es enthält Abwasser und Chemikalien.","Schäden sofort fotografieren für die Versicherung sobald es sicher ist."]},{"type":"kit_ref","items":["package","folder","pill","droplets","radio","battery-charging"]},{"type":"text_plan","paragraphs":["Jetzt wird dein Familienplan wichtig. Im Notfallzentrum sofort registrieren damit getrennte Familienmitglieder dich finden können."],"plan_ref":"treffpunkt"},{"type":"text_warning","paragraphs":["Offizielle Entwarnung über NINA oder Radio. Wasser vollständig zurückgegangen."],"warning":"Vor Betreten: Gaskontrolle, Strukturschäden prüfen. Strom erst nach Fachinspektion einschalten."}]},{"key":"evakuierung","name":"Evakuierung","desc":"Behörden ordnen Verlassen an","color":"#A07520","related":["hochwasser","industrie","kommunikation"],"sections":[{"type":"text","paragraphs":["Evakuierung bedeutet: Behörden sagen dir, sofort zu gehen. In Deutschland passiert das öfter als man denkt — WWII-Bomben werden mehrmals jährlich gefunden.","Deutsche Behörden sind sehr gut organisiert. Dein Job ist es, schnell und ruhig zu gehen."]},{"type":"text","paragraphs":["NINA sendet eine Evakuierungswarnung für deine Postleitzahl. Polizei oder Feuerwehr mit Lautsprechern in deiner Straße. Lokales Radio kündigt einen Evakuierungsradius an — und deine Adresse liegt darin."]},{"type":"steps","steps":["Warnung über NINA oder Radio bestätigen","Vorgepacktes Kit greifen — dafür ist es da","Gas, Strom und Wasser am Haupthahn abschalten","Medikamente und Dokumente mitnehmen falls nicht im Kit","Haus abschließen und gehen — nicht zögern"],"warning":"Der häufigste Fehler: zu lange warten. Frühes Gehen hält Straßen frei für Rettungskräfte."},{"type":"stay_go","go_only":true,"go":{"label":"Gehen — immer","text":"Bei einer Evakuierungsanordnung gibt es keine Bleiben-Option. Behörden haben das Risiko bewertet."},"note":{"label":"Einzige Frage","text":"Wie schnell kannst du gehen?"}},{"type":"text","paragraphs":["Offizielle Evakuierungsroute nehmen. Zur ausgewiesenen Notunterkunft gehen — wird über NINA und Radio bekannt gegeben. Sofort registrieren. Erst zurückkehren wenn Behörden es explizit sagen."]},{"type":"kit_ref","items":["package","folder","pill","battery-charging"]},{"type":"text_plan","paragraphs":["Das ist der Moment wo dein Familienplan am meisten zählt. Im Notfallzentrum sofort registrieren."],"plan_ref":"treffpunkt"},{"type":"text_warning","paragraphs":["Behörden erteilen offiziell Entwarnung. Bei Bombenentschärfungen: meist innerhalb weniger Stunden."],"warning":"Haus vor dem Betreten prüfen. Gas- und Stromleitungen nach einer Evakuierung inspizieren lassen."}]},{"key":"unwetter","name":"Unwetter","desc":"Sturm, Starkregen, Orkan","color":"#6B6560","related":["stromausfall","evakuierung"],"sections":[{"type":"text","paragraphs":["Ein schwerer Sturm mit extremem Wind, Starkregen oder Hagel. In Deutschland meist ein Sturmtief, manchmal bis Orkan. In der Regel nach einem Tag vorbei.","Die meisten Menschen können das sicher zu Hause aussitzen — wenn sie drinnen bleiben."]},{"type":"text","paragraphs":["DWD oder NINA sendet eine Sturmwarnung. Wind nimmt spürbar und schnell zu. Bäume in der Nähe knacken oder fallen. Lokales Radio sendet Sicherheitswarnungen."]},{"type":"steps","steps":["DWD oder NINA für Schweregrad und Dauer prüfen","Sofort rein und drinnen bleiben","Alle Fenster und Rollläden schließen","Balkon und Garten räumen — alles was zum Geschoss werden könnte","Auto von Bäumen wegparken wenn schnell möglich"]},{"type":"stay_go","stay":{"label":"Fast immer bleiben","text":"Dein Haus ist beim Sturm der sicherste Ort. Draußen gehen ist die Gefahr."},"go":{"label":"Nur gehen wenn","text":"Dach sichtbar beschädigt. Behörden ordnen Evakuierung an. Du bist in einem Mobilheim."},"warning":"Nicht bei Orkan fahren. Umgestürzte Bäume verursachen die meisten Sturmtoten."},{"type":"text","paragraphs":["Von Fenstern fernbleiben während des Sturmschwerpunkts. Bei Stromausfall: Stromausfall-Guide befolgen. Erst nach offiziellem Sturm-Ende nach draußen — nicht in einer kurzen Flaute."]},{"type":"kit_ref","items":["radio","flashlight","battery-charging","droplets","archive"]},{"type":"text","paragraphs":["Sicherstellen dass alle zu Hause sind bevor der Sturm seinen Höhepunkt erreicht. Älteren Nachbarn vorher Bescheid geben — nicht während."]},{"type":"text_warning","paragraphs":["DWD hebt die Sturmwarnung auf. Wind hat deutlich und gleichmäßig nachgelassen."],"warning":"Vor dem Hinausgehen nach oben schauen — Schäden können noch stundenlang herabfallen."}]},{"key":"medizin","name":"Medizinischer Notfall","desc":"Schwere Verletzung oder Erkrankung","color":"#B03A2E","related":["kommunikation"],"sections":[{"type":"text","paragraphs":["Ein medizinischer Notfall ist wenn jemand schwer verletzt oder erkrankt ist und der Rettungsdienst verzögert oder überlastet ist.","Es geht nicht darum, professionelle Versorgung zu ersetzen. Ruhig bleiben und zwei oder drei grundlegende Maßnahmen kennen macht einen enormen Unterschied."]},{"type":"text","paragraphs":["Person bewusstlos oder nicht ansprechbar. Starke Blutung. Atembeschwerden. Herzinfarktzeichen: Brustschmerzen, Schmerzen im linken Arm, Schweißausbruch. Schlaganfall (FAST-Test). Kind hat etwas Gefährliches geschluckt."]},{"type":"steps","steps":["Sofort 112 anrufen — das zuerst, noch vor der Hilfe","In der Leitung bleiben — der Disponent führt dich durch","Wenn bewusstlos und atmet nicht normal: HLW beginnen","Bei starker Blutung: festen dauerhaften Druck ausüben","Person mit möglicher Wirbelsäulenverletzung nicht bewegen"],"warning":"112-Disponenten führen dich in Echtzeit. Du musst nicht alles wissen — du musst nur anrufen."},{"type":"stay_go","stay":{"label":"Bei der Person bleiben","text":"In fast allen Fällen. Bewegung kann es schlimmer machen."},"go":{"label":"Ausnahmen","text":"Feuer, Gas oder Wasser — dann erst aus der Gefahr, dann behandeln."}},{"type":"text","paragraphs":["Person warm und beruhigt halten. Zeitpunkt der Symptome und Medikamente notieren — Sanitäter werden fragen.","Jemanden nach draußen schicken um den Krankenwagen einzuweisen wenn die Adresse schwer zu finden ist."]},{"type":"kit_ref","items":["cross-circle","file-text","pill","hand","flashlight"]},{"type":"text","paragraphs":["Jeder Erwachsene sollte CPR können — ein DRK-Tageskurs rettet Leben. Deine Hausadresse in jedem Familienhandy gespeichert haben.","Medikamentenliste für jeden im Haushalt im Kit aufbewahren — nicht nur im Kopf."]},{"type":"text_warning","paragraphs":["Professionelle Hilfe hat übernommen. Für weniger ernste Situationen: Person ist stabil, nächster Schritt klar."],"warning":"Erste-Hilfe-Set sofort wieder auffüllen. DRK-Kurs für den Haushalt in Betracht ziehen."}]},{"key":"versorgung","name":"Ausfall Versorgung","desc":"Wasser, Gas, Lieferketten","color":"#3D6B4A","related":["stromausfall","kommunikation"],"sections":[{"type":"text","paragraphs":["Öffentliche Infrastruktur bricht zusammen — Trinkwasser, Heizung, Gas oder Geschäfte mit leeren Regalen. Nichts explodiert, aber der Alltag wird schwierig.","Die gute Nachricht: ein gut bestücktes Kit macht das fast unsichtbar."]},{"type":"text","paragraphs":["Wasserhähne trocknen aus oder Druck sinkt deutlich. Behörden erteilen ein Abkochgebot. Gasheizung hört auf zu arbeiten. Supermarktregale dauerhaft leer. Nachbarn berichten von denselben Problemen."]},{"type":"steps","steps":["NINA und Radio prüfen — was ist betroffen und für wie lange?","Sofort Badewannen und alle Behälter mit Wasser füllen","Gas abschalten wenn Versorgungsproblem — kurz lüften","Kit-Vorräte inventarisieren — wie viele Tage reichts?","Nicht sofort in den Supermarkt stürmen — alle haben dieselbe Idee"]},{"type":"stay_go","stay":{"label":"Fast immer bleiben","text":"Zu Hause hast du deine Vorräte — du bist besser ausgestattet als irgendwo sonst."},"go":{"label":"Gehen erwägen","text":"Heizung fällt im Winter aus, Wohnung unter 10°C. Störung dauert länger als deine Vorräte."}},{"type":"text","paragraphs":["Wasser sofort rationieren: 3 Liter pro Person pro Tag ist das Minimum. Unsicheres Leitungswasser 1 Minute abkochen.","Kühlschrankinhalt zuerst essen. Ungenutzte Räume abschließen und Haushalt in wärmere Zimmer zusammenziehen."]},{"type":"kit_ref","items":["droplets","archive","radio","banknote","pill"]},{"type":"text","paragraphs":["Dieses Szenario entfaltet sich langsam genug um gemeinsam zu planen. Wasserrationierung frühzeitig festlegen.","Ältere Verwandte in der Nähe frühzeitig kontrollieren — sie sind am verwundbarsten."]},{"type":"text_warning","paragraphs":["Behörden bestätigen Versorgungswiederherstellung über NINA oder Radio."],"warning":"Kit sofort wieder auffüllen und ehrlich beurteilen was dir fehlte — das ist das beste Feedback für nächstes Mal."}]},{"key":"industrie","name":"Industrieunfall","desc":"Chemische oder industrielle Gefahr","color":"#6B3D7A","related":["evakuierung","kommunikation"],"sections":[{"type":"text","paragraphs":["Eine nahe Fabrik oder chemische Anlage hat etwas Gefährliches freigesetzt. Die Schlüsselanweisung ist das Gegenteil der meisten Notfälle: nicht nach draußen gehen. Dich einschließen.","Du wirst das wahrscheinlich nie erleben — aber wenn doch, zählen die ersten 10 Minuten enorm."]},{"type":"text","paragraphs":["NINA sendet eine Warnung mit spezifischen Anweisungen. Laute Explosion gehört oder große Rauchwolke gesehen. Ungewöhnlicher Geruch draußen — chemisch oder brennend. Rettungsfahrzeuge in großer Zahl in eine Richtung."]},{"type":"steps","steps":["Sofort rein wenn du draußen bist — Kinder und Tiere mitnehmen","Alle Fenster, Türen und Lüftungsöffnungen vollständig schließen","Mechanische Lüftung und Klimaanlage ausschalten","NINA und Radio für spezifische Anweisungen — Empfehlung variiert je nach Stoff","Von Fenstern fernbleiben"],"warning":"Die Gefahr kann unsichtbar, geruchlos oder schon über dem sicheren Expositionslevel liegen."},{"type":"stay_go","stay":{"label":"Drinnen bleiben","text":"In den meisten Fällen — In-door-Schutz (Schutzraum) laut deutschem Zivilschutz."},"go":{"label":"Nur gehen wenn","text":"Behörden explizit Evakuierung anordnen. Direktes Brandrisiko für dein Gebäude."}},{"type":"text","paragraphs":["Bei ernstem Alarm: Türspalten mit nassen Handtüchern oder Klebeband abdichten. Telefon nur für Notfälle nutzen.","Offiziellen Anweisungen genau folgen — sie sagen dir wann gelüftet werden kann."]},{"type":"kit_ref","items":["radio","battery-charging","mask","hand","droplets"]},{"type":"text","paragraphs":["Wenn Familienmitglieder draußen sind: per SMS anweisen sofort ins nächste Gebäude zu gehen. Nicht fahren um sie abzuholen.","Schulen und Arbeitsplätze haben eigene Schutzraum-Protokolle — vertraue darauf."]},{"type":"text_warning","paragraphs":["NINA oder Radio erteilen explizite Entwarnung. Fenster erst öffnen nach offiziellem Freigabe — auch wenn der Geruch weg ist."],"warning":"Wenn jemand Symptome hatte: beim Hausarzt oder 116 117 melden und untersuchen lassen."}]},{"key":"kommunikation","name":"Kommunikationsausfall","desc":"Kein Netz, kein Internet","color":"#1A7A7A","related":["stromausfall","evakuierung","industrie"],"sections":[{"type":"text","paragraphs":["Kein Mobilfunknetz, kein Internet, kein Festnetz. Keine Anrufe, keine Nachrichten, keine Karten, keine Online-Zahlungen.","Desorientierend mehr als gefährlich — aber es legt bloß wie abhängig der Alltag von Konnektivität ist."]},{"type":"text","paragraphs":["Dein Handy zeigt kein Signal oder 'Nur Notrufe'. SMS senden nicht. Du kannst niemanden auf digitalem Weg erreichen. Andere um dich herum haben dasselbe Problem — es ist nicht dein Gerät."]},{"type":"steps","steps":["Bestätigen es ist ein Netzproblem — mit Nachbarn prüfen","Sofort Batterie-Radio einschalten — deine einzige zuverlässige Informationsquelle","Handy-Akku schonen: Flugzeugmodus, weniger Helligkeit, Apps schließen","Wenn mitten in Notfall: zur nächsten Polizei- oder Feuerwache gehen","Familienplan in Erinnerung rufen — du hast für diesen Moment vorbereitet"],"warning":"Das einzige Szenario wo dein vorher vereinbarter Treffpunkt und Zeitpunkt alles bedeuten."},{"type":"stay_go","stay":{"label":"Zu Hause bleiben","text":"Zu Hause sind deine Vorräte und dort suchen Familienmitglieder dich."},"go":{"label":"Zum Treffpunkt","text":"Wenn du von der Familie getrennt warst als es begann und das ist der vereinbarte Plan."}},{"type":"text","paragraphs":["Batterie-Radio auf Deutschlandfunk (90,2 FM). Handy-Akku rücksichtslos schonen.","SMS vor Anrufen versuchen wenn Signal kurz zurückkommt. Bargeld ist jetzt unerlässlich — Kartenzahlung funktioniert nicht."]},{"type":"kit_ref","items":["radio","battery-charging","banknote","file-text"]},{"type":"text_plan","paragraphs":["Dieses Szenario dreht sich fast ganz um Vorbereitung vor dem Notfall. Wichtige Nummern physisch notiert haben. Feste Treffzeit vereinbart haben.","Wenn getrennt: alle gehen zum Treffpunkt zur vereinbarten Uhrzeit."],"plan_ref":"treffpunkt","plan_ref2":"uhrzeit"},{"type":"text_warning","paragraphs":["Signal kehrt zurück und aufgehaltene Nachrichten beginnen einzutreffen. Radio bestätigt Netzwerkwiederherstellung."],"warning":"Familienplan jetzt vervollständigen. Heute Telefonnummern aufschreiben."}]}]};

let MAP_CENTER, CATEGORIES, POI_DATA;
let activeCategories;

// ============================================================
// APP STATE
// ============================================================
const state = { screen:'home', scenario:null, tab:0, planValues:{} };
let C = null;

// ============================================================
// INIT
// ============================================================
async function init() {
  // ── Load content (de.json) ──
  if (typeof CONTENT !== 'undefined') {
    C = CONTENT;
  } else {
    try {
      const lang = document.documentElement.lang || 'de';
      const res = await fetch(`content/${lang}.json`);
      C = await res.json();
    } catch(e) {
      document.getElementById('app-screens').innerHTML =
        '<div style="padding:40px 20px;font-size:14px;color:#B03A2E;">Inhalt konnte nicht geladen werden.<br>Bitte starte über einen lokalen Server: <code>python3 -m http.server 8000</code></div>';
      return;
    }
  }

  // ── Load location data (locations.json) ──
  if (typeof LOCATIONS !== 'undefined') {
    MAP_CENTER = { lat: LOCATIONS.center.lat, lng: LOCATIONS.center.lng, name: LOCATIONS.center.name, radius_km: LOCATIONS.radius_km || 20 };
    CATEGORIES = LOCATIONS.categories;
    POI_DATA   = LOCATIONS.pois;
  } else {
    try {
      const res = await fetch('content/locations.json');
      const L = await res.json();
      MAP_CENTER = { lat: L.center.lat, lng: L.center.lng };
      CATEGORIES = L.categories;
      POI_DATA   = L.pois;
    } catch(e) {
      document.getElementById('app-screens').innerHTML =
        '<div style="padding:40px 20px;font-size:14px;color:#B03A2E;">Standortdaten konnten nicht geladen werden.<br>Bitte starte über einen lokalen Server: <code>python3 -m http.server 8000</code></div>';
      return;
    }
  }

  activeCategories = new Set(CATEGORIES.filter(c => c.default_on !== false).map(c => c.id));
  render();
  restoreFromStorage();
}

// ============================================================
// RENDER
// ============================================================
function render() {
  document.title = C.brand.name;
  document.getElementById('alert-text').textContent = C.ui.alert_bar;
  document.getElementById('alert-chevron').innerHTML = ic('chevron-right','rgba(255,255,255,0.7)',14);
  const root = document.getElementById('app-screens');
  root.innerHTML = buildHome() + buildScenarioList() + buildScenarioDetail() + buildKit() + buildHilfe() + buildPlan() + buildKarte();
  showScreen('home');
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  const el = document.getElementById('screen-' + id);
  if (el) {
    el.classList.add('active');
    const sa = el.querySelector('.scroll-area');
    if (sa) sa.scrollTop = 0;
    el.querySelectorAll('.nav-btn').forEach((b,i) => {
      b.classList.toggle('active', ['home','notfaelle','kit','hilfe','karte','plan'][i] === id
        || (id === 'scenario' && i === 1));
    });
    state.screen = id;
    if (id === 'karte') { setTimeout(() => initMap(), 80); setTimeout(() => updateInfoBar(), 10); }
  }
}

// ============================================================
// NAV BAR (6 items)
// ============================================================
function navBar() {
  const items = [
    ['home',     C.ui.nav_home,       'home'],
    ['notfaelle',C.ui.nav_emergencies,'shield-alert'],
    ['kit',      C.ui.nav_kit,        'package'],
    ['hilfe',    C.ui.nav_firstaid,   'heart-pulse'],
    ['karte',    'Karte',             'map-pin'],
    ['plan',     C.ui.nav_plan,       'user-circle'],
  ];
  return `<div class="bottom-nav">${items.map(([s,l,i]) =>
    `<button class="nav-btn" onclick="showScreen('${s}')">${ic(i,'var(--text3)',20)}<span class="nav-btn-label">${l}</span></button>`
  ).join('')}</div>`;
}

function buildKarte() {
  const chips = CATEGORIES.map(cat => {
    const cnt = (POI_DATA[cat.id] || []).length;
    const dimmed = cat.default_on === false;
    return `<button class="map-filter-chip ${dimmed ? 'dimmed' : ''}" data-cat="${cat.id}"
      style="${dimmed ? '' : 'background:' + cat.bg + ';border-color:' + cat.color + ';color:' + cat.color + ';'}"
      onclick="toggleCategory('${cat.id}')">${ic(cat.icon, dimmed ? 'var(--text3)' : cat.color, 13, 1.5)} ${cat.label}<span class="chip-count">${cnt}</span></button>`;
  }).join('');
  return `<div class="screen" id="screen-karte">
<div class="top-bar">
  <button class="back-btn" onclick="showScreen('home')">${ic('chevron-left','currentColor',16)}</button>
  <div style="flex:1;">
    <div class="top-bar-title">Karte</div>
    <div class="top-bar-sub">Notfallstandorte · ${MAP_CENTER.name || ""} · ${MAP_CENTER.radius_km || 20} km</div>
  </div>

// ============================================================
// MAP INIT (lazy — loads MapLibre only when Karte screen opens)
// ============================================================
let mapObj = null;
let mapReady = false;
const markersByCategory = {};

function generateCircle(cLng, cLat, radiusKm, n=72) {
  const coords = [];
  for (let i = 0; i <= n; i++) {
    const a = (i / n) * 2 * Math.PI;
    const dLat = radiusKm / 110.574;
    const dLng = radiusKm / (111.32 * Math.cos(cLat * Math.PI / 180));
    coords.push([cLng + dLng * Math.cos(a), cLat + dLat * Math.sin(a)]);
  }
  return { type:'Feature', geometry:{ type:'Polygon', coordinates:[coords] }, properties:{} };
}

function initMap() {
  if (mapReady) {
    if (mapObj) setTimeout(() => mapObj && mapObj.resize(), 50);
    return;
  }
  if (!window.maplibregl) {
    if (!document.getElementById('maplibre-js')) {
      const css = document.createElement('link');
      css.rel = 'stylesheet';
      css.href = 'https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css';
      document.head.appendChild(css);
      const js = document.createElement('script');
      js.id = 'maplibre-js';
      js.src = 'https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js';
      js.onload = () => _doInitMap();
      document.head.appendChild(js);
    }
    return;
  }
  _doInitMap();
}

function _doInitMap() {
  if (mapReady) return;
  const container = document.getElementById('map');
  if (!container || container.offsetHeight === 0) {
    setTimeout(_doInitMap, 60);
    return;
  }
  mapReady = true;

  mapObj = new maplibregl.Map({
    container: 'map',
    // PRODUCTION: swap style for Protomaps PMTiles source:
    // style: { version:8, sources:{ pm:{ type:'vector', url:'pmtiles://your.pmtiles' }}, layers:[...] }
    style: 'https://basemaps.cartocdn.com/gl/positron-gl-style/style.json',
    center: [MAP_CENTER.lng, MAP_CENTER.lat],
    zoom: 11.2,
    attributionControl: false,
  });

  mapObj.on('load', () => {
    // 20 km radius ring
    mapObj.addSource('radius', { type:'geojson', data: generateCircle(MAP_CENTER.lng, MAP_CENTER.lat, MAP_CENTER.radius_km || 20) });
    mapObj.addLayer({ id:'radius-fill', type:'fill', source:'radius',
      paint:{ 'fill-color':'#C4521A', 'fill-opacity':0.05 }
    });
    mapObj.addLayer({ id:'radius-line', type:'line', source:'radius',
      paint:{ 'line-color':'#C4521A', 'line-width':1.5, 'line-dasharray':[4,3], 'line-opacity':0.6 }
    });

    // Home dot
    const homeDot = document.createElement('div');
    homeDot.className = 'home-dot-marker';
    new maplibregl.Marker({ element:homeDot, anchor:'center' })
      .setLngLat([MAP_CENTER.lng, MAP_CENTER.lat])
      .addTo(mapObj);

    // POI markers
    CATEGORIES.forEach(cat => {
      markersByCategory[cat.id] = [];
      POI_DATA[cat.id].forEach(poi => {
        const el = document.createElement('div');
        el.className = 'poi-marker';
        el.style.background = cat.bg;
        el.style.borderColor = cat.color;
        el.innerHTML = ic(cat.icon, cat.color, 14, 1.5);

        const popup = new maplibregl.Popup({ offset:18, closeButton:true, maxWidth:'200px' })
          .setHTML(`<div style="font-family:'DM Sans',sans-serif;">
            <div style="font-size:13px;font-weight:500;color:#1A1714;margin-bottom:3px;">${poi.name}</div>
            <div style="font-size:11px;color:#6B6560;line-height:1.4;">${poi.addr}</div>
            ${poi.phone !== '–' ? `<div style="font-size:12px;color:${cat.color};margin-top:6px;font-weight:500;">📞 ${poi.phone}</div>` : ''}
          </div>`);

        const marker = new maplibregl.Marker({ element:el, anchor:'center' })
          .setLngLat([poi.lng, poi.lat])
          .setPopup(popup)
          .addTo(mapObj);

        markersByCategory[cat.id].push(marker);
      });
    });

    updateInfoBar();
  });
}

function toggleCategory(id) {
  if (activeCategories.has(id)) {
    activeCategories.delete(id);
  } else {
    activeCategories.add(id);
  }
  CATEGORIES.forEach(cat => {
    const visible = activeCategories.has(cat.id);
    (markersByCategory[cat.id] || []).forEach(m => {
      m.getElement().style.display = visible ? 'flex' : 'none';
    });
  });
  document.querySelectorAll('.map-filter-chip').forEach(chip => {
    const cid = chip.dataset.cat;
    const cat = CATEGORIES.find(c => c.id === cid);
    if (!cat) return;
    chip.classList.toggle('dimmed', !activeCategories.has(cid));
    if (activeCategories.has(cid)) {
      chip.style.background = cat.bg;
      chip.style.borderColor = cat.color;
      chip.style.color = cat.color;
    }
  });
  updateInfoBar();
}

function updateInfoBar() {
  const bar = document.getElementById('map-info-bar');
  if (!bar) return;
  const visibleTotal = [...activeCategories].reduce((sum, id) => sum + (POI_DATA[id]?.length || 0), 0);
  const grandTotal   = Object.values(POI_DATA).reduce((sum, arr) => sum + arr.length, 0);
  bar.textContent = `${visibleTotal} von ${grandTotal} Standorten sichtbar`;
  // update prominent count bar
  const numEl = document.getElementById('map-count-num');
  const subEl = document.getElementById('map-count-sub');
  if (numEl) numEl.textContent = grandTotal;
  if (subEl) {
    const cats = [...activeCategories].length;
    const allCats = CATEGORIES.length;
    subEl.textContent = cats < allCats
      ? `${visibleTotal} sichtbar · ${allCats - cats} Kategorie${allCats-cats===1?'':'n'} ausgeblendet`
      : 'alle Kategorien sichtbar';
  }
}

// ============================================================
// ACTIONS
// ============================================================
const A = {
  showScenario(key) {
    const s = C.scenarios.find(x => x.key === key);
    if (!s) return;
    state.scenario = key;
    document.getElementById('scenario-title').textContent = s.name;
    const tabs = document.getElementById('section-tabs');
    tabs.innerHTML = s.sections.map((sec,i) =>
      `<button class="tab-btn${i===0?' active':''}" onclick="A.switchTab(${i})">${C.ui.tab_labels[i]||('Tab '+(i+1))}</button>`).join('');
    this.renderTab(s, 0);
    const chips = document.getElementById('related-chips');
    chips.innerHTML = (s.related||[]).map(r => {
      const rel = C.scenarios.find(x => x.key === r);
      return rel ? `<div class="related-chip" onclick="A.showScenario('${r}')">${rel.name}</div>` : '';
    }).join('');
    showScreen('scenario');
  },

  switchTab(i) {
    const s = C.scenarios.find(x => x.key === state.scenario);
    if (!s) return;
    state.tab = i;
    document.querySelectorAll('#section-tabs .tab-btn').forEach((b,j) => b.classList.toggle('active', j===i));
    this.renderTab(s, i);
    document.querySelector('#screen-scenario .scroll-area').scrollTop = 0;
  },

  renderTab(s, i) {
    const sec = s.sections[i];
    if (!sec) return;
    const el = document.getElementById('scenario-content');
    el.innerHTML = `<div class="section-heading">${C.ui.tab_full_labels[i]||''}</div>` + this.renderSection(sec);
  },

  renderSection(sec) {
    if (sec.type === 'text' || sec.type === 'text_warning') {
      let html = `<div class="section-body">${sec.paragraphs.map(p=>`<p>${p}</p>`).join('')}</div>`;
      if (sec.warning) html += `<div class="warning-box">${sec.warning}</div>`;
      return html;
    }
    if (sec.type === 'text_plan') {
      let html = `<div class="section-body">${sec.paragraphs.map(p=>`<p>${p}</p>`).join('')}</div>`;
      if (sec.plan_ref) {
        const v = state.planValues[sec.plan_ref] || '';
        html += `<div style="background:var(--accent-light);border-radius:var(--radius-sm);padding:11px 13px;margin-top:12px;font-size:13px;">
          <span style="color:var(--text2);">Dein Treffpunkt: </span>
          <span data-plan-preview="${sec.plan_ref}" style="color:${v?'var(--green)':'var(--accent)'};">${v||C.ui.plan_ref_not_entered}</span>
        </div>`;
      }
      return html;
    }
    if (sec.type === 'steps') {
      let html = `<ul class="steps">${sec.steps.map((s,i)=>`<li class="step"><div class="step-num">${i+1}</div><div class="step-text">${s}</div></li>`).join('')}</ul>`;
      if (sec.warning) html += `<div class="warning-box">${sec.warning}</div>`;
      return html;
    }
    if (sec.type === 'stay_go') {
      let rows = '';
      if (sec.go_only) {
        rows = `<div class="stay-go-row"><span class="badge badge-go">${sec.go.label}</span><span class="stay-go-text">${sec.go.text}</span></div>`;
        if (sec.note) rows += `<div class="stay-go-row"><span class="badge badge-warning">${sec.note.label}</span><span class="stay-go-text">${sec.note.text}</span></div>`;
      } else {
        rows = `<div class="stay-go-row"><span class="badge badge-stay">${sec.stay.label}</span><span class="stay-go-text">${sec.stay.text}</span></div>
                <div class="stay-go-row"><span class="badge badge-go">${sec.go.label}</span><span class="stay-go-text">${sec.go.text}</span></div>`;
        if (sec.warning) rows += `<div class="warning-box">${sec.warning}</div>`;
      }
      return `<div class="stay-go">${rows}</div>`;
    }
    if (sec.type === 'kit_ref') {
      const allItems = [...C.kit.items_included, ...C.kit.items_personal];
      const items = sec.items.map(key => {
        const it = allItems.find(x => x.icon === key);
        return it ? `<div class="kit-item" style="cursor:default;">
          <div class="kit-icon-wrap">${ic(it.icon,it.color,22)}</div>
          <span class="kit-name">${it.label}</span>
        </div>` : '';
      }).join('');
      return `<div class="section-body"><p>Hol diese Sachen aus deinem Kit:</p></div><div class="kit-full-card kit-items" style="margin-top:4px;">${items}</div>`;
    }
    return '';
  },

  toggleKit(item) {
    const check = item.querySelector('.kit-check');
    check.classList.toggle('checked');
    this.updateKitProgress();
    this.saveKitState();
  },

  saveKitState() {
    try {
      const checks = [...document.querySelectorAll('#screen-kit .kit-item')].map(item => ({
        label: item.querySelector('.kit-name').textContent,
        checked: item.querySelector('.kit-check').classList.contains('checked')
      }));
      localStorage.setItem('rustenburgh_kit', JSON.stringify(checks));
    } catch(e) {}
  },

  updateKitProgress() {
    const all = document.querySelectorAll('#screen-kit .kit-check');
    const done = document.querySelectorAll('#screen-kit .kit-check.checked');
    const pct = Math.round((done.length / all.length) * 100);
    if (document.getElementById('kit-progress-bar')) {
      document.getElementById('kit-progress-bar').style.width = pct + '%';
      document.getElementById('kit-count-label').textContent = `${done.length} ${C.ui.kit_progress_of} ${all.length} ${C.ui.kit_progress_done}`;
      document.getElementById('kit-percent-label').textContent = pct + '%';
      const hint = document.getElementById('kit-nav-hint');
      if (hint) { hint.textContent = pct===100 ? C.ui.kit_nav_complete : `${done.length} ${C.ui.kit_progress_of} ${all.length}`; hint.className = pct===100 ? 'nav-card-hint ok' : 'nav-card-hint'; }
    }
  },

  toggleHilfe(card) { card.classList.toggle('open'); },

  updatePreview() {
    const allFields = C.plan_fields.flatMap(s => s.fields);
    allFields.forEach(f => {
      const input = document.getElementById(`plan-${f.id}`);
      if (!input) return;
      state.planValues[f.id] = input.value;
      if (f.preview) {
        const el = document.getElementById(`preview-${f.id}`);
        if (el) { el.textContent = input.value || C.ui.plan_not_entered; el.className = 'plan-val ' + (input.value ? 'filled' : 'empty'); }
      }
    });
    document.querySelectorAll('[data-plan-preview]').forEach(el => {
      const key = el.dataset.planPreview;
      const val = state.planValues[key] || '';
      el.textContent = val || C.ui.plan_ref_not_entered;
      el.style.color = val ? 'var(--green)' : 'var(--accent)';
    });
  },

  savePlan() {
    this.updatePreview();
    const required = C.plan_fields.flatMap(s => s.fields).filter(f => f.preview);
    const missing = required.filter(f => !state.planValues[f.id]?.trim()).length;
    const hint = document.getElementById('plan-nav-hint');
    if (hint) {
      hint.textContent = missing === 0 ? C.ui.plan_complete : `${missing} ${missing===1 ? C.ui.plan_missing_singular : C.ui.plan_missing_plural}`;
      hint.className = missing === 0 ? 'nav-card-hint ok' : 'nav-card-hint warn';
    }
    try { localStorage.setItem('rustenburgh_plan', JSON.stringify(state.planValues)); } catch(e) {}
    const msg = document.getElementById('saved-msg');
    if (msg) { msg.style.display = 'block'; setTimeout(() => msg.style.display = 'none', 3000); }
  },

  ninaAlert() {
    alert(`${C.ui.alert_popup_title}\n\n${C.ui.alert_popup_body}`);
  }
};

// ============================================================
// RESTORE FROM STORAGE
// ============================================================
function restoreFromStorage() {
  try {
    const saved = localStorage.getItem('rustenburgh_plan');
    if (saved) {
      const values = JSON.parse(saved);
      Object.entries(values).forEach(([id, val]) => {
        const input = document.getElementById(`plan-${id}`);
        if (input && val) { input.value = val; state.planValues[id] = val; }
      });
      A.updatePreview();
      const required = C.plan_fields.flatMap(s => s.fields).filter(f => f.preview);
      const missing = required.filter(f => !state.planValues[f.id]?.trim()).length;
      const hint = document.getElementById('plan-nav-hint');
      if (hint) {
        hint.textContent = missing === 0 ? C.ui.plan_complete : `${missing} ${missing===1 ? C.ui.plan_missing_singular : C.ui.plan_missing_plural}`;
        hint.className = missing === 0 ? 'nav-card-hint ok' : 'nav-card-hint warn';
      }
    }
  } catch(e) {}
  try {
    const saved = localStorage.getItem('rustenburgh_kit');
    if (saved) {
      const checks = JSON.parse(saved);
      const kitItems = [...document.querySelectorAll('#screen-kit .kit-item')];
      checks.forEach(({ label, checked }) => {
        const item = kitItems.find(el => el.querySelector('.kit-name').textContent === label);
        if (item && checked) {
          const c = item.querySelector('.kit-check');
          c.classList.add('checked');
          c.innerHTML = ic('check','white',13);
        }
      });
      A.updateKitProgress();
    }
  } catch(e) {}
}

init();
</script>
